<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Avatar — E-commerce Broadcast Demo</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b90a0;
    --accent: #6c8cff;
    --accent-hover: #8ba3ff;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; }
  #topbar .spacer { flex: 1; }
  #status {
    font-size: 11px; padding: 4px 10px; border-radius: 99px;
    font-weight: 500;
  }
  .status-idle { background: #2a2d3a; color: var(--text-dim); }
  .status-connecting { background: #3d3520; color: var(--yellow); }
  .status-connected { background: #1a3a2a; color: var(--green); }
  .status-error { background: #3d1a1a; color: var(--red); }
  #ratio-toggle {
    padding: 4px 12px; background: #252836;
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); font-size: 12px; cursor: pointer;
  }
  #ratio-toggle:hover { border-color: var(--accent); color: var(--text); }

  #main {
    flex: 1; display: flex; overflow: hidden;
    /* landscape (16:9) default: side-by-side */
  }
  /* portrait (9:16) mode: stacked, avatar fills top */
  body.portrait #main {
    flex-direction: column;
  }

  #avatar-panel {
    flex: 1; display: flex; flex-direction: column;
    background: #000; position: relative; min-width: 0;
    align-items: center; justify-content: center;
  }
  body.portrait #avatar-panel {
    flex: 1 1 auto;
  }

  #avatar-container {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }
  #avatar-container video {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
  }
  #avatar-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 14px; pointer-events: none;
  }
  #avatar-placeholder.hidden { display: none; }

  #right-panel {
    width: 380px; min-width: 280px;
    display: flex; flex-direction: column;
    background: var(--panel); border-left: 1px solid var(--border);
  }
  body.portrait #right-panel {
    width: 100%; min-width: 0; max-height: 220px;
    border-left: none; border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #tabs button {
    flex: 1; padding: 8px; background: none; border: none;
    color: var(--text-dim); font-size: 12px; cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  #tabs button.active {
    color: var(--text); border-bottom-color: var(--accent);
  }

  #conversation {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  body.portrait #conversation { max-height: 120px; }
  .msg {
    max-width: 90%; padding: 8px 12px; border-radius: var(--radius);
    font-size: 12px; line-height: 1.4;
  }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; }
  .msg.agent { align-self: flex-start; background: #252836; color: var(--text); }
  .msg.agent.streaming::after {
    content: '▍'; animation: blink 0.8s infinite; color: var(--accent);
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .msg.system { align-self: center; background: transparent; color: var(--text-dim); font-size: 11px; padding: 2px 8px; }
  .msg .time { font-size: 10px; opacity: 0.6; margin-top: 2px; }

  #log-panel {
    flex: 1; overflow-y: auto; padding: 10px 12px; display: none;
  }
  #log-panel.visible { display: block; }
  #log-panel pre {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; color: var(--text-dim);
    white-space: pre-wrap; word-break: break-all;
  }

  #actions {
    display: flex; gap: 6px; padding: 8px 12px; flex-shrink: 0;
    flex-wrap: wrap;
  }
  #actions button {
    padding: 5px 10px; background: #252836;
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); font-size: 11px; cursor: pointer;
  }
  #actions button:hover { border-color: var(--accent); color: var(--text); }

  #input-bar {
    display: flex; gap: 8px; padding: 8px 12px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #input-bar input {
    flex: 1; padding: 8px 12px;
    background: #252836; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 12px; outline: none;
  }
  #input-bar input:focus { border-color: var(--accent); }
  #input-bar button {
    padding: 8px 14px; background: var(--accent);
    border: none; border-radius: 6px; color: #fff;
    font-size: 12px; font-weight: 500; cursor: pointer;
  }
  #input-bar button:hover { background: var(--accent-hover); }
  #input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="topbar">
  <h1>Live Avatar — Broadcast</h1>
  <span class="spacer"></span>
  <button id="ratio-toggle" title="Toggle 16:9 / 9:16">📐 16:9</button>
  <span id="status" class="status-idle">Disconnected</span>
</div>

<div id="main">
  <div id="avatar-panel">
    <div id="avatar-container"></div>
    <div id="avatar-placeholder">Click Connect to start</div>
  </div>

  <div id="right-panel">
    <div id="tabs">
      <button id="tab-conv" class="active">Conversation</button>
      <button id="tab-log">Logs</button>
    </div>
    <div id="conversation"></div>
    <div id="log-panel"><pre id="log-content"></pre></div>

    <div id="actions">
      <button id="btn-connect">Connect</button>
      <button id="btn-disconnect" disabled>Disconnect</button>
      <button id="btn-mic" disabled>Start Mic</button>
      <button id="btn-interrupt" disabled>Interrupt</button>
      <button id="btn-clear-logs">Clear Logs</button>
    </div>
    <div id="input-bar">
      <input id="text-input" type="text" placeholder="Type a message..." disabled>
      <button id="btn-send" disabled>Send</button>
    </div>
  </div>
</div>

<script src="./sdk.js"></script>
<script>

const $status = document.getElementById('status');
const $conversation = document.getElementById('conversation');
const $logContent = document.getElementById('log-content');
const $placeholder = document.getElementById('avatar-placeholder');
const $textInput = document.getElementById('text-input');
const $btnSend = document.getElementById('btn-send');
const $btnConnect = document.getElementById('btn-connect');
const $btnDisconnect = document.getElementById('btn-disconnect');
const $btnMic = document.getElementById('btn-mic');
const $btnInterrupt = document.getElementById('btn-interrupt');
const $avatarContainer = document.getElementById('avatar-container');
const $logPanel = document.getElementById('log-panel');
const $tabConv = document.getElementById('tab-conv');
const $tabLog = document.getElementById('tab-log');
const $ratioToggle = document.getElementById('ratio-toggle');

let client = null;
let isConnected = false;

// ---- Aspect ratio toggle ----
let isPortrait = false;

function applyPortraitLayout() {
  if (!isPortrait) {
    $avatarContainer.style.width = '';
    $avatarContainer.style.height = '';
    return;
  }
  // Calculate container size to maintain 9:16 ratio
  var topbarH = document.getElementById('topbar').offsetHeight;
  var panelH = document.getElementById('right-panel').offsetHeight;
  var availH = window.innerHeight - topbarH - panelH - 20;
  var availW = window.innerWidth;
  // Container should be 9:16, fit within available space
  var idealW = availH * 9 / 16;
  if (idealW > availW) {
    idealW = availW - 20;
    availH = idealW * 16 / 9;
  }
  $avatarContainer.style.width = idealW + 'px';
  $avatarContainer.style.height = availH + 'px';
}

$ratioToggle.onclick = function() {
  isPortrait = !isPortrait;
  if (isPortrait) {
    document.body.classList.add('portrait');
    $ratioToggle.textContent = '📱 9:16';
  } else {
    document.body.classList.remove('portrait');
    $ratioToggle.textContent = '📐 16:9';
  }
  applyPortraitLayout();
};
window.addEventListener('resize', applyPortraitLayout);

function setStatus(cls, text) {
  $status.className = cls;
  $status.textContent = text;
}

var micOn = false;

function setConnected(connected) {
  isConnected = connected;
  $btnConnect.disabled = connected;
  $btnDisconnect.disabled = !connected;
  $btnMic.disabled = !connected;
  $btnInterrupt.disabled = !connected;
  $textInput.disabled = !connected;
  $btnSend.disabled = !connected;
  if (!connected) { micOn = false; $btnMic.textContent = 'Start Mic'; }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const now = new Date().toLocaleTimeString();
  div.textContent = text;
  const timeSpan = document.createElement('div');
  timeSpan.className = 'time';
  timeSpan.textContent = now;
  div.appendChild(timeSpan);
  $conversation.appendChild(div);
  $conversation.scrollTop = $conversation.scrollHeight;
}

var _agentTargetText = '';
var _agentDisplayedLen = 0;
var _agentTimer = null;
var _agentEl = null;

function typewriterStep() {
  if (_agentDisplayedLen < _agentTargetText.length) {
    _agentDisplayedLen++;
    _agentEl.textContent = _agentTargetText.substring(0, _agentDisplayedLen);
    $conversation.scrollTop = $conversation.scrollHeight;
    _agentTimer = setTimeout(typewriterStep, 30);
  } else {
    _agentTimer = null;
  }
}

function addAgentChunk(text) {
  if (!_agentEl) {
    _agentEl = document.createElement('div');
    _agentEl.className = 'msg agent streaming';
    $conversation.appendChild(_agentEl);
    _agentDisplayedLen = 0;
    _agentTargetText = '';
  }
  _agentTargetText = text;
  if (!_agentTimer) {
    _agentTimer = setTimeout(typewriterStep, 30);
  }
}

function finishAgentMsg(text) {
  _agentTargetText = text;
  function flushThenFinish() {
    if (_agentDisplayedLen < _agentTargetText.length) {
      _agentDisplayedLen++;
      _agentEl.textContent = _agentTargetText.substring(0, _agentDisplayedLen);
      $conversation.scrollTop = $conversation.scrollHeight;
      _agentTimer = setTimeout(flushThenFinish, 5);
    } else {
      _agentTimer = null;
      if (_agentEl) {
        _agentEl.classList.remove('streaming');
        var now = new Date().toLocaleTimeString();
        var timeSpan = document.createElement('div');
        timeSpan.className = 'time';
        timeSpan.textContent = now;
        _agentEl.appendChild(timeSpan);
        _agentEl = null;
      }
    }
  }
  if (_agentTimer) {
    clearTimeout(_agentTimer);
    _agentTimer = null;
  }
  flushThenFinish();
}

function isScrolledToBottom(el) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < 30;
}

async function pollLogs() {
  try {
    var res = await fetch('/api/logs');
    var lines = await res.json();
    var newText = lines.join('\n');
    if (newText !== $logContent.textContent) {
      var wasAtBottom = isScrolledToBottom($logPanel);
      $logContent.textContent = newText;
      if (wasAtBottom) {
        $logPanel.scrollTop = $logPanel.scrollHeight;
      }
    }
  } catch(e) {}
}
setInterval(pollLogs, 2000);

$tabConv.onclick = function() {
  $tabConv.classList.add('active'); $tabLog.classList.remove('active');
  document.getElementById('conversation').style.display = '';
  $logPanel.classList.remove('visible');
};
$tabLog.onclick = function() {
  $tabLog.classList.add('active'); $tabConv.classList.remove('active');
  document.getElementById('conversation').style.display = 'none';
  $logPanel.classList.add('visible');
};

$btnConnect.onclick = async function() {
  try {
    setStatus('status-connecting', 'Starting session...');
    setConnected(false);

    var res = await fetch('/api/start-session', { method: 'POST' });
    var data = await res.json();
    if (!data.success) throw new Error(data.error);

    $avatarContainer.innerHTML = '';

    client = LivekitSDK.createClient({
      connectConfig: {
        type: 'direct',
        config: {
          sfuUrl: data.sfuUrl,
          userToken: data.userToken,
        },
      },
      video: {
        containerElement: $avatarContainer,
        fitMode: 'contain',
      },
      audio: {
        output: { enabled: true, volume: 1.0, muted: false },
        input: {
          noiseSuppression: true,
          voiceIsolation: true,
          sampleRate: 24000,
          constraints: {
            echoCancellation: true,
            autoGainControl: true,
          },
        },
      },
    });

    client.events.on('sdk:connected', function() {
      setStatus('status-connected', 'Connected');
      setConnected(true);
      $placeholder.classList.add('hidden');
      // Recalculate portrait layout after video is ready
      setTimeout(applyPortraitLayout, 300);
    });

    client.events.on('sdk:disconnected', function(info) {
      setStatus('status-idle', 'Disconnected');
      setConnected(false);
      $placeholder.classList.remove('hidden');
      addMessage('system', 'Disconnected' + (info && info.reason ? ': ' + info.reason : ''));
    });

    client.events.on('sdk:error', function(info) {
      addMessage('system', 'Error: ' + info.message);
    });

    client.events.on('conversation:question:sent', function(info) {
      addMessage('user', info.text);
    });

    client.events.on('conversation:answer:chunk', function(info) {
      addAgentChunk(info.chunk);
    });

    client.events.on('conversation:answer:completed', function(info) {
      finishAgentMsg(info.fullAnswer);
    });

    client.events.on('conversation:asr:received', function(info) {
      addMessage('user', '[voice] ' + info.text);
    });

    client.events.on('conversation:asr:chunk', function(info) {
      var el = document.querySelector('.msg.user.asr-streaming');
      if (!el) {
        el = document.createElement('div');
        el.className = 'msg user asr-streaming';
        $conversation.appendChild(el);
      }
      el.textContent = '[voice] ' + info.text;
      $conversation.scrollTop = $conversation.scrollHeight;
    });

    client.events.on('media:audio:captureStarted', function() {
      addMessage('system', 'Microphone started');
    });
    client.events.on('media:audio:captureStopped', function() {
      addMessage('system', 'Microphone stopped');
    });

    await client.connect();

    // Unmute audio — SDK video starts muted for autoplay
    if (client.isMuted) {
      client.unmute();
    }
    $placeholder.classList.add('hidden');

  } catch(err) {
    console.error('Connection error:', err);
    setStatus('status-error', 'Error');
    setConnected(false);
    addMessage('system', 'Connection failed: ' + err.message);
  }
};

$btnDisconnect.onclick = async function() {
  if (client) {
    try { await client.disconnect(); } catch(e) {}
    client = null;
  }
  await fetch('/api/stop-session', { method: 'POST' });
  setStatus('status-idle', 'Disconnected');
  setConnected(false);
  $placeholder.classList.remove('hidden');
};

$btnSend.onclick = async function() {
  var text = $textInput.value.trim();
  if (!text || !client || !isConnected) return;
  $textInput.value = '';
  try {
    await client.sendTextQuestion(text);
  } catch(err) {
    console.error('Send error:', err);
    addMessage('system', 'Send failed: ' + err.message);
  }
};

$textInput.onkeydown = function(ev) {
  if (ev.key === 'Enter') $btnSend.click();
};

$btnMic.onclick = async function() {
  if (!client || !isConnected) return;
  try {
    if (micOn) {
      await client.stopAudioCapture();
      micOn = false;
      $btnMic.textContent = 'Start Mic';
    } else {
      await client.startAudioCapture();
      micOn = true;
      $btnMic.textContent = 'Stop Mic';
    }
  } catch(e) {
    console.error('Mic error:', e);
  }
};

$btnInterrupt.onclick = async function() {
  try { await fetch('/api/interrupt', { method: 'POST' }); } catch(e) {}
};

document.getElementById('btn-clear-logs').onclick = async function() {
  try {
    await fetch('/api/clear-logs', { method: 'POST' });
    $logContent.textContent = '';
  } catch(e) {}
};
</script>
</body>
</html>
