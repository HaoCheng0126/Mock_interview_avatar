<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Avatar — Talkshow</title>
<style>
  :root {
    --bg: #101114;
    --panel: #1b1d22;
    --panel-2: #23262d;
    --border: #30343d;
    --text: #eceff4;
    --text-dim: #9aa1ad;
    --accent: #4f8cff;
    --accent-hover: #75a5ff;
    --green: #57d68d;
    --red: #ff7777;
    --yellow: #f5c95f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #topbar {
    height: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 650; }
  #topbar .spacer { flex: 1; }
  .badge {
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .badge.connected { color: var(--green); border-color: #315744; background: #16271e; }
  .badge.performing { color: var(--green); border-color: #315744; background: #16271e; }
  .badge.paused { color: var(--yellow); border-color: #62542c; background: #2c2615; }
  .badge.error { color: var(--red); border-color: #643333; background: #2c1717; }
  #error-banner {
    display: none;
    padding: 10px 16px;
    background: #2c1717;
    color: var(--red);
    border-bottom: 1px solid #643333;
    font-size: 12px;
    text-align: center;
  }
  #error-banner.visible { display: block; }
  #main { flex: 1; display: flex; min-height: 0; }
  #avatar-panel {
    flex: 1;
    min-width: 0;
    background: #050506;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #avatar-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  #avatar-container video { width: 100% !important; height: 100% !important; object-fit: contain !important; }
  #avatar-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }
  #avatar-placeholder.hidden { display: none; }
  #side-panel {
    width: 420px;
    min-width: 340px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #show-card, #current-card, #status-card {
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #show-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  #show-meta { color: var(--text-dim); font-size: 12px; line-height: 1.5; }
  #current-type {
    display: inline-flex;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    background: #26364f;
    color: #bcd3ff;
    margin-bottom: 8px;
  }
  #current-title { font-weight: 650; margin-bottom: 8px; }
  #current-text {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.6;
    max-height: 150px;
    overflow: auto;
    white-space: pre-wrap;
  }
  #queue-panel {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 14px;
  }
  #queue-list { display: flex; flex-direction: column; gap: 8px; }
  .queue-row {
    border: 1px solid var(--border);
    background: var(--panel-2);
    padding: 9px 10px;
    border-radius: 6px;
  }
  .queue-row .kind { color: var(--accent); font-size: 11px; margin-bottom: 4px; }
  .queue-row .title { font-size: 13px; }
  .stat-line { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; margin: 5px 0; }
  .stat-line span:first-child { color: var(--text-dim); }
  #last-error { color: var(--red); word-break: break-word; }
  #actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px;
    border-top: 1px solid var(--border);
    background: #17191e;
  }
  button {
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 11px;
    font-size: 12px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  #btn-connect { background: var(--accent); border-color: var(--accent); color: white; }
  #btn-connect:hover { background: var(--accent-hover); }
  #btn-stop, #btn-disconnect { color: var(--red); }
  @media (max-width: 860px) {
    #main { flex-direction: column; }
    #side-panel { width: 100%; min-width: 0; height: 48%; border-left: 0; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div id="topbar">
  <h1>Live Avatar — Talkshow</h1>
  <span class="spacer"></span>
  <span id="connection-status" class="badge">Disconnected</span>
  <span id="show-state" class="badge">idle</span>
</div>
<div id="error-banner">Talkshow connection failed.</div>
<div id="main">
  <section id="avatar-panel">
    <div id="avatar-container"></div>
    <div id="avatar-placeholder">Click Connect to start the show console</div>
  </section>
  <aside id="side-panel">
    <section id="show-card">
      <div class="label">Show</div>
      <div id="show-title">Talkshow</div>
      <div id="show-meta">Not connected</div>
    </section>
    <section id="current-card">
      <div class="label">Now Speaking</div>
      <div id="current-type">idle</div>
      <div id="current-title">—</div>
      <div id="current-text">Connect to load current performance state.</div>
    </section>
    <section id="status-card">
      <div class="stat-line"><span>Queue remaining</span><strong id="queue-remaining">0</strong></div>
      <div class="stat-line"><span>Next batch</span><strong id="next-batch">not ready</strong></div>
      <div class="stat-line"><span>Last error</span><strong id="last-error">none</strong></div>
    </section>
    <section id="queue-panel">
      <div class="label">Performance Queue</div>
      <div id="queue-list">
        <div class="queue-row"><div class="kind">empty</div><div class="title">No status yet</div></div>
      </div>
    </section>
    <div id="actions">
      <button id="btn-connect" onclick="doConnect()">Connect</button>
      <button id="btn-disconnect" onclick="doDisconnect()" disabled>Disconnect</button>
      <button id="btn-start" onclick="talkshowAction('start')" disabled>Start</button>
      <button id="btn-stop" onclick="talkshowAction('stop')" disabled>Stop</button>
      <button id="btn-pause" onclick="talkshowAction('pause')" disabled>Pause</button>
      <button id="btn-resume" onclick="talkshowAction('resume')" disabled>Resume</button>
      <button id="btn-skip" onclick="talkshowAction('skip')" disabled>Skip</button>
      <button id="btn-generate" onclick="talkshowAction('generate')" disabled>Generate</button>
      <button id="btn-reload" onclick="talkshowAction('reload')" disabled>Reload</button>
    </div>
  </aside>
</div>
<script src="./node_modules/@sanseng/liveavatar-js-sdk/dist/index.full.umd.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const $avatarContainer = $('avatar-container');
const $placeholder = $('avatar-placeholder');
const $errorBanner = $('error-banner');
let client = null;
let isConnected = false;
let showRunning = false;
let pollTimer = null;

function setConnection(text, cls) {
  const el = $('connection-status');
  el.textContent = text;
  el.className = 'badge ' + (cls || '');
}

function setShowState(state) {
  const el = $('show-state');
  el.textContent = state || 'idle';
  el.className = 'badge ' + (state === 'performing' ? 'performing' : state === 'paused' ? 'paused' : '');
}

function updateButtons() {
  $('btn-connect').disabled = isConnected;
  $('btn-disconnect').disabled = !isConnected;
  $('btn-start').disabled = !isConnected || showRunning;
  $('btn-stop').disabled = !isConnected || !showRunning;
  $('btn-pause').disabled = !isConnected || !showRunning;
  $('btn-resume').disabled = !isConnected;
  $('btn-skip').disabled = !isConnected || !showRunning;
  $('btn-generate').disabled = !isConnected;
  $('btn-reload').disabled = !isConnected;
}

function renderStatus(status) {
  if (status.success === false) {
    $('show-meta').textContent = status.error || 'Not initialized';
    return;
  }
  setShowState(status.state);
  showRunning = status.state === 'performing' || status.state === 'paused';
  const item = status.currentItem;
  $('show-title').textContent = status.showTitle || 'Talkshow';
  $('show-meta').textContent = status.personaName ? ('Persona: ' + status.personaName) : 'Session active';
  $('current-type').textContent = item ? item.type : 'idle';
  $('current-title').textContent = item ? item.title : '—';
  $('current-text').textContent = item ? item.text : 'Waiting for the next performance item.';
  $('queue-remaining').textContent = status.queueRemaining || 0;
  $('next-batch').textContent = status.nextBatchReady ? 'ready' : 'not ready';
  $('last-error').textContent = status.lastError || 'none';
  const rows = [];
  if (item) rows.push('<div class="queue-row"><div class="kind">current ' + item.type + '</div><div class="title">' + escapeHtml(item.title || '') + '</div></div>');
  rows.push('<div class="queue-row"><div class="kind">queue</div><div class="title">' + (status.queueRemaining || 0) + ' item(s) remaining</div></div>');
  $('queue-list').innerHTML = rows.join('');
  updateButtons();
}

function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, function(ch) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];
  });
}

async function doConnect() {
  $errorBanner.classList.remove('visible');
  setConnection('Starting session...', '');
  isConnected = false;
  updateButtons();
  try {
    const res = await fetch('/api/start-session', { method: 'POST' });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'start-session failed');
    $avatarContainer.innerHTML = '';
    client = LivekitSDK.createClient({
      connectConfig: { type: 'direct', config: { sfuUrl: data.sfuUrl, userToken: data.userToken } },
      video: { containerElement: $avatarContainer, fitMode: 'contain' },
      audio: { output: { enabled: true, volume: 1.0, muted: false } },
    });
    client.events.on('sdk:connected', function() {
      isConnected = true;
      setConnection('Connected', 'connected');
      $placeholder.classList.add('hidden');
      updateButtons();
    });
    client.events.on('sdk:disconnected', function() {
      isConnected = false;
      showRunning = false;
      setConnection('Disconnected', '');
      setShowState('idle');
      $placeholder.classList.remove('hidden');
      updateButtons();
    });
    client.events.on('sdk:error', function(info) { console.error('SDK error:', info); });
    await client.connect();
    if (client.isMuted) client.unmute();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollTalkshowStatus, 1000);
    await pollTalkshowStatus();
  } catch (err) {
    console.error(err);
    setConnection('Error', 'error');
    $errorBanner.textContent = 'Talkshow connection failed: ' + (err && err.message ? err.message : String(err));
    $errorBanner.classList.add('visible');
    isConnected = false;
    updateButtons();
  }
}

async function doDisconnect() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (client) {
    try { await client.disconnect(); } catch (err) {}
    client = null;
  }
  try { await fetch('/api/stop-session', { method: 'POST' }); } catch (err) {}
  isConnected = false;
  showRunning = false;
  setConnection('Disconnected', '');
  setShowState('idle');
  $placeholder.classList.remove('hidden');
  renderStatus({ state: 'idle', currentItem: null, queueRemaining: 0, nextBatchReady: false, lastError: null });
  updateButtons();
}

const TALKSHOW_ENDPOINTS = {
  start: '/api/talkshow/start',
  stop: '/api/talkshow/stop',
  pause: '/api/talkshow/pause',
  resume: '/api/talkshow/resume',
  skip: '/api/talkshow/skip',
  generate: '/api/talkshow/generate',
  reload: '/api/talkshow/reload',
};

async function talkshowAction(action) {
  try {
    const res = await fetch(TALKSHOW_ENDPOINTS[action], { method: 'POST' });
    const data = await res.json();
    if (!data.success && data.success !== undefined) console.error(data.error);
    await pollTalkshowStatus();
  } catch (err) {
    console.error('talkshow action error:', err);
  }
}

async function pollTalkshowStatus() {
  if (!isConnected) return;
  try {
    const res = await fetch('/api/talkshow/status');
    const status = await res.json();
    renderStatus(status);
  } catch (err) {}
}

updateButtons();
</script>
</body>
</html>
