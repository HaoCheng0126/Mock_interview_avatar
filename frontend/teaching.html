<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小思老师 - 思维课</title>
<link rel="stylesheet" href="./teaching/whiteboard/styles.css">
<style>
  :root{
    --ink:#233044;
    --muted:#687385;
    --paper:#fffdf7;
    --line:#d8e0ea;
    --blue:#2f6fbb;
    --blue-dark:#1f528e;
    --green:#2f8f5b;
    --yellow:#f5c84b;
    --red:#d95b59;
    --side:#eaf4ff;
    --shadow:0 18px 45px rgba(40,58,78,.16);
    --radius:8px;
    --font:"Avenir Next","PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden}
  body{font-family:var(--font);color:var(--ink);background:#dfeefa}
  button{font:inherit}
  .app{height:100dvh;display:grid;grid-template-rows:56px minmax(0,1fr);position:relative}
  .topbar{display:flex;align-items:center;gap:14px;padding:0 22px;background:#fff;border-bottom:1px solid var(--line)}
  .brand{font-size:20px;font-weight:800;letter-spacing:0}
  .lesson-state{padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#f8fbff;color:var(--muted);font-size:14px;font-weight:700}
  .spacer{flex:1}
  .status{font-size:13px;font-weight:800;padding:7px 11px;border-radius:999px;background:#eef2f6;color:#657083}
  .status.connected{background:#e6f6ed;color:var(--green)}
  .status.connecting{background:#fff5d6;color:#8a6610}
  .status.error{background:#ffe7e5;color:var(--red)}
  .main{min-height:0;display:grid;grid-template-columns:minmax(280px,30%) minmax(520px,70%);gap:18px;padding:18px}
  .teacher-panel,.workspace{min-width:0;min-height:0;border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow);overflow:hidden}
  .teacher-panel{display:grid;grid-template-rows:minmax(0,1fr) auto;background:#fff}
  .avatar-stage{position:relative;min-height:0;background:#fff;display:flex;align-items:center;justify-content:center;padding:0}
  #avatar-container{width:100%;height:100%;max-width:100%;max-height:100%;overflow:hidden;background:#fff}
  #avatar-container video{width:100%!important;height:100%!important;object-fit:cover!important;object-position:center top!important}
  .avatar-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:28px;color:#dce7f4;text-align:center;font-size:20px;font-weight:800}
  .avatar-placeholder.hidden{display:none}
  .teacher-controls{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px;background:#fff;color:var(--ink)}
  .mic-state{min-width:0}
  .mic-title{font-size:14px;font-weight:900}
  .mic-help{margin-top:2px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .control-row{display:flex;gap:8px;align-items:center}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);height:40px;padding:0 14px;border-radius:var(--radius);font-weight:900;cursor:pointer}
  .btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue-dark)}
  .btn:disabled{opacity:.48;cursor:not-allowed}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.primary:hover:not(:disabled){background:var(--blue-dark);color:#fff}
  .btn.danger{background:#fff0ef;border-color:#ffc8c4;color:#b83d3b}
  .workspace{display:grid;grid-template-rows:auto auto minmax(0,1fr);background:var(--paper)}
  .live-caption{display:flex;align-items:flex-start;gap:8px;margin:0 18px;padding:8px 0;background:linear-gradient(135deg,#fef9e7,#fdf2d0);border:1px solid #f0d78c;border-top:none;border-radius:0 0 var(--radius) var(--radius);min-height:36px}
  .live-caption-name{font-size:12px;font-weight:900;color:#b8860b;white-space:nowrap;margin-top:2px;flex-shrink:0}
  .live-caption-name:not(:empty)::after{content:'：'}
  .live-caption-wrap{flex:1;min-width:0;overflow:hidden}
  .live-caption-text{font-size:15px;font-weight:800;color:#5c4a0e;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .workspace-head{display:grid;grid-template-columns:1fr auto;gap:12px;padding:18px 18px 12px;border-bottom:1px solid var(--line);background:#fff}
  .eyebrow{font-size:12px;font-weight:900;color:var(--blue);letter-spacing:.08em}
  .chapter-title{margin-top:5px;font-size:24px;line-height:1.2;font-weight:900}
  .steps{display:flex;gap:6px;align-items:center}
  .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#f7f9fb;color:var(--muted);font-size:13px;font-weight:900}
  .step-dot.done{background:#e6f6ed;border-color:#a9d8bb;color:var(--green)}
  .step-dot.active{background:var(--yellow);border-color:#e2ad21;color:#473500}
  .board{min-height:0;padding:14px 18px;overflow:auto}
  .board-card{min-height:100%;border:2px solid #bfd6ee;border-radius:var(--radius);background:#fff;box-shadow:inset 0 0 0 6px #f3f8ff;padding:18px;display:flex;flex-direction:column;overflow:hidden}
  .board-card.interaction-turn{border-color:#2f6fbb;background:#f7fbff;box-shadow:inset 0 0 0 6px #e6f2ff,0 0 0 4px rgba(47,111,187,.12)}
  .board-card.interaction-turn .board-label{color:#1f528e}
  .board-card.interaction-turn .board-title{font-size:28px;color:#173f70}
  .interaction-action{margin-top:14px;padding:12px 14px;border-radius:var(--radius);background:#eaf4ff;border:1px solid #bdd7f0;color:#1f528e;font-weight:900;font-size:17px}
  .interaction-wait{margin-top:8px;color:var(--muted);font-size:13px;font-weight:800}
  .board-label{font-size:12px;color:var(--muted);font-weight:900;margin-bottom:6px}
  .board-title{font-size:22px;line-height:1.2;font-weight:900;margin:0 0 10px;word-break:break-word}
  .board-body{font-size:17px;line-height:1.45;color:#2c3a4d;word-break:break-word;overflow-wrap:break-word}
  .white-steps{display:grid;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);max-height:160px;overflow-y:auto}
  .white-step{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start;padding:8px 10px;border:1px solid var(--line);border-radius:var(--radius);background:#fbfcfe;color:var(--muted);font-size:14px}
  .white-step.active{border-color:var(--blue);background:#eef6ff;color:var(--ink)}
  .white-step.done{background:#f5f7f9}
  .num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#e8edf3;font-weight:900;font-size:13px}
  .white-step.active .num{background:var(--blue);color:#fff}
  .visual{margin-top:18px;padding:16px;border-left:5px solid var(--yellow);background:#fff8dc;border-radius:var(--radius);font-size:18px;line-height:1.45}
  .interactive-scene{margin-top:10px;border:1px solid #bdd7f0;background:#f7fbff;border-radius:var(--radius);padding:12px}
  .scene-head{display:flex;justify-content:space-between;gap:10px;align-items:start;margin-bottom:8px}
  .scene-title{font-size:18px;font-weight:900}
  .scene-goal{font-size:12px;color:var(--blue);font-weight:900}
  .scene-prompt{font-size:15px;color:var(--muted);font-weight:800;margin-top:4px}
  .scene-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .scene-action{height:36px;border:1px solid var(--line);background:#fff;border-radius:var(--radius);padding:0 12px;font-weight:900;cursor:pointer}
  .scene-action:hover{border-color:var(--blue);color:var(--blue-dark)}
  .mirror-stage{display:grid;grid-template-columns:1fr 20px 1fr;gap:14px;align-items:center}
  .mirror-line{height:160px;border-left:5px solid #9bc6ee;border-radius:999px;box-shadow:0 0 16px rgba(47,111,187,.25)}
  .monster-card{min-height:170px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .monster-card.mirror{background:#eef6ff}
  .monster{width:96px;height:104px;border-radius:46% 46% 38% 38%;background:#8ac6a8;border:3px solid #33785a;position:relative;transition:transform .24s ease}
  .monster::before,.monster::after{content:"";position:absolute;top:28px;width:12px;height:12px;border-radius:50%;background:#213044}
  .monster::before{left:28px}.monster::after{right:28px}
  .monster-mouth{position:absolute;left:38px;top:58px;width:22px;height:10px;border-bottom:3px solid #213044;border-radius:0 0 20px 20px}
  .monster-star{position:absolute;top:22px;width:22px;height:22px;background:var(--yellow);clip-path:polygon(50% 0,61% 35%,98% 35%,68% 56%,79% 91%,50% 70%,21% 91%,32% 56%,2% 35%,39% 35%)}
  .monster-star.left{left:10px}.monster-star.right{right:10px}.monster-star.top{left:37px;top:-12px}
  .monster-hand{position:absolute;top:46px;width:40px;height:12px;background:#33785a;border-radius:999px;transform-origin:center}
  .monster-hand.left{left:-30px}.monster-hand.right{right:-30px}
  .monster-hand.up{top:12px;transform:rotate(-55deg)}
  .monster-hand.right.up{transform:rotate(55deg)}
  .letter-symbol{font-size:92px;font-weight:900;color:var(--blue-dark);font-family:Arial,Helvetica,sans-serif;line-height:1;transition:transform .24s ease}
  .letter-symbol.mirror{transform:scaleX(-1);color:#2f6fbb}
  .letter-caption{position:absolute;left:12px;top:10px;font-size:13px;font-weight:900;color:var(--muted)}
  .fold-stage{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
  .paper-card{min-height:170px;border:1px dashed #9fb3c8;border-radius:var(--radius);background:#fff;display:flex;align-items:center;justify-content:center;position:relative}
  .paper{width:118px;height:142px;background:#fff;border:2px solid #b8c6d8;border-radius:6px;box-shadow:10px 10px 0 #eef2f7;position:relative}
  .paper.folded{width:70px}
  .paper::after{content:"";position:absolute;left:50%;top:8px;bottom:8px;border-left:2px dashed #9fb3c8}
  .cut-shape{position:absolute;left:50%;top:50%;width:58px;height:58px;transform:translate(-50%,-50%);background:#d95b59}
  .paper.folded .cut-half{left:100%}
  .paper:not(.folded) .cut-open{left:50%}
  .cut-shape.cut-heart{width:44px;height:44px;transform:translate(-50%,-42%) rotate(-45deg);border-radius:10px 0 10px 0}
  .cut-shape.cut-heart::before,.cut-shape.cut-heart::after{content:"";position:absolute;width:44px;height:44px;border-radius:50%;background:inherit}
  .cut-shape.cut-heart::before{left:0;top:-22px}
  .cut-shape.cut-heart::after{left:22px;top:0}
  .cut-half.cut-heart::after{display:none}
  .cut-shape.cut-star{clip-path:polygon(50% 0,61% 35%,98% 35%,68% 56%,79% 91%,50% 70%,21% 91%,32% 56%,2% 35%,39% 35%)}
  .cut-half.cut-star{clip-path:polygon(50% 0,61% 35%,50% 35%,50% 70%,21% 91%,32% 56%,2% 35%,39% 35%)}
  .cut-shape.cut-monster{width:58px;height:64px;border-radius:48% 48% 38% 38%}
  .cut-shape.cut-monster::before,.cut-shape.cut-monster::after{content:"";position:absolute;top:-10px;width:14px;height:20px;border-radius:12px 12px 0 0;background:inherit}
  .cut-shape.cut-monster::before{left:12px;transform:rotate(-18deg)}
  .cut-shape.cut-monster::after{right:12px;transform:rotate(18deg)}
  .cut-half.cut-monster::after{display:none}
  .attribute-stage{display:grid;grid-template-columns:minmax(180px,250px) 1fr;gap:14px;align-items:stretch}
  .clue-panel{border:1px solid var(--line);border-radius:var(--radius);background:#fff;padding:14px;display:flex;flex-direction:column;gap:10px}
  .clue-title{font-size:15px;font-weight:900}
  .clue-chip{height:38px;border:2px solid var(--line);background:#fff;border-radius:999px;padding:0 12px;font-weight:900;cursor:pointer;text-align:left}
  .clue-chip.active{border-color:var(--blue);background:#eef6ff;color:var(--blue-dark)}
  .clue-result{margin-top:auto;padding:10px;border-left:5px solid var(--yellow);background:#fff8dc;border-radius:var(--radius);font-size:14px;font-weight:800;line-height:1.45}
  .clothing-grid{display:grid;grid-template-columns:repeat(3,minmax(92px,1fr));gap:10px}
  .cloth-card{min-height:132px;border:2px solid var(--line);border-radius:var(--radius);background:#fff;display:grid;grid-template-rows:1fr auto;place-items:center;padding:10px;color:var(--muted);font-weight:900;transition:border-color .18s ease,background .18s ease,transform .18s ease}
  .cloth-card.match{border-color:#8fbce8;background:#f5fbff;color:var(--ink);transform:translateY(-2px)}
  .cloth-card.target{border-color:var(--green);background:#effaf4;box-shadow:0 10px 22px rgba(47,143,91,.16)}
  .cloth-shape{width:70px;height:64px;background:#8ab4e8;border:3px solid rgba(35,48,68,.18);border-radius:12px 12px 18px 18px;position:relative}
  .cloth-shape::before,.cloth-shape::after{content:"";position:absolute;top:10px;width:22px;height:28px;background:inherit;border:inherit;border-radius:12px}
  .cloth-shape::before{left:-18px;transform:rotate(18deg)}
  .cloth-shape::after{right:-18px;transform:rotate(-18deg)}
  .cloth-shape.red{background:#df5f5c}.cloth-shape.blue{background:#6da0df}.cloth-shape.yellow{background:#f3cb58}.cloth-shape.green{background:#72ba89}
  .cloth-pocket{position:absolute;right:10px;bottom:12px;width:22px;height:18px;border:3px solid rgba(255,255,255,.8);border-top:none;border-radius:0 0 8px 8px}
  .cloth-label{font-size:13px;text-align:center;line-height:1.25}
  .quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;position:relative;z-index:2}
  .quiz-timer{text-align:center;font-size:26px;font-weight:900;padding:8px 0;color:var(--ink);transition:color .3s}
  .quiz-timer.urgent{color:#e03e3e;animation:timerPulse .6s ease-in-out infinite}
  @keyframes timerPulse{50%{transform:scale(1.08);opacity:.7}}
  .option{min-height:74px;border:2px solid var(--line);background:#fff;border-radius:var(--radius);padding:14px 16px;text-align:left;cursor:pointer;font-size:19px;font-weight:900;color:var(--ink);position:relative;z-index:3}
  .option:hover:not(:disabled){border-color:var(--blue);box-shadow:0 8px 20px rgba(47,111,187,.15)}
  .option:disabled{opacity:.58;cursor:not-allowed}
  .result.good{border-color:#9bd9b5;background:#f0fbf5}
  .result.try{border-color:#ffc8c4;background:#fff4f3}
  .transcript{border-top:1px solid var(--line);background:#fff;padding:12px 16px;display:flex;flex-direction:column;min-height:0}
  .transcript-title{font-size:13px;color:var(--muted);font-weight:900;margin-bottom:8px}
  .transcript-list{min-height:0;height:100%;overflow:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px}
  .talk{width:100%;padding:7px 10px;border-radius:var(--radius);font-size:14px;line-height:1.42;border:1px solid var(--line);background:#f9fbfe}
  .talk.user{align-self:flex-end;background:#eaf4ff;border-color:#bdd7f0}
  .talk.agent{align-self:flex-start;background:#fff}
  .talk.classmate{align-self:flex-start;background:#f0f7ff;border-color:#cbe0f5}
  .talk .who{display:block;font-size:11px;color:var(--muted);font-weight:900;margin-bottom:3px}
  .transcript-toggle{position:absolute;right:18px;bottom:18px;z-index:35;height:44px;border-radius:999px;box-shadow:var(--shadow)}
  .transcript-drawer{position:absolute;top:56px;right:0;bottom:0;width:min(390px,88vw);z-index:30;background:#fff;border-left:1px solid var(--line);box-shadow:-18px 0 45px rgba(40,58,78,.18);transform:translateX(100%);transition:transform .22s ease;display:grid;grid-template-rows:auto minmax(0,1fr)}
  .transcript-drawer.open{transform:translateX(0)}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .drawer-title{font-size:16px;font-weight:900}
  .drawer-close{width:36px;height:36px;padding:0}
  .speaker,.live-text{display:none}
  .live-name{font-size:12px;color:var(--muted);font-weight:900}
  .live-message{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .transcript-drawer .transcript-list{height:100%;padding:12px}
  .voice-btn{width:48px;height:48px;min-width:48px;padding:0;display:inline-flex;align-items:center;justify-content:center;position:relative;border-radius:50%}
  .mic-glyph{position:relative;width:15px;height:23px;border:3px solid currentColor;border-radius:999px}
  .mic-glyph::before{content:"";position:absolute;left:50%;bottom:-10px;width:3px;height:8px;background:currentColor;transform:translateX(-50%)}
  .mic-glyph::after{content:"";position:absolute;left:50%;bottom:-14px;width:17px;height:3px;border-radius:999px;background:currentColor;transform:translateX(-50%)}
  .mic-slash{position:absolute;width:31px;height:3px;border-radius:999px;background:currentColor;transform:rotate(-42deg);opacity:0}
  .mic-wave{position:absolute;inset:6px;border:2px solid currentColor;border-radius:50%;opacity:0;transform:scale(.72)}
  .voice-btn.muted .mic-slash{opacity:1}
  .voice-btn.recording .mic-wave{animation:micPulse 1.05s ease-out infinite}
  @keyframes micPulse{0%{opacity:.75;transform:scale(.72)}100%{opacity:0;transform:scale(1.28)}}
  .voice-btn.recording{background:#fff0ef;border-color:#ffc8c4;color:#b83d3b}
  .voice-btn.interaction-ready{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 0 0 rgba(47,111,187,.35);animation:answerPulse 1.35s ease-out infinite}
  .voice-btn.interaction-ready .mic-wave{animation:micPulse 1.05s ease-out infinite}
  @keyframes answerPulse{0%{box-shadow:0 0 0 0 rgba(47,111,187,.35)}100%{box-shadow:0 0 0 12px rgba(47,111,187,0)}}
  .log{display:none}
  @media (max-width:900px){
    .app{grid-template-rows:52px minmax(0,1fr)}
    .main{grid-template-columns:1fr;grid-template-rows:40% 60%;gap:10px;padding:10px}
    .avatar-stage{padding:0}
    #avatar-container{width:100%;height:100%;max-width:100%}
    .teacher-controls{grid-template-columns:1fr}
    .workspace-head{padding:12px 14px}
    .chapter-title{font-size:19px}
    .board{padding:12px}
    .board-card{padding:16px}
    .board-title{font-size:22px}
    .board-body{font-size:18px}
    .quiz-options{grid-template-columns:1fr}
    .attribute-stage{grid-template-columns:1fr}
    .clothing-grid{grid-template-columns:repeat(2,minmax(92px,1fr))}
    .transcript-drawer{top:52px}
    .voice-btn{width:44px;height:44px;min-width:44px}
  }
  /* Course selection modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
  .modal-overlay.hidden{display:none}
  .modal{background:#fff;border-radius:16px;width:min(640px,92vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.25)}
  .modal-head{display:flex;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line)}
  .modal-head h2{font-size:18px;margin:0;flex:1}
  .modal-close{width:32px;height:32px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)}
  .modal-tabs{display:flex;gap:4px;padding:12px 24px;border-bottom:1px solid var(--line)}
  .modal-tab{padding:6px 16px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer}
  .modal-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .modal-body{flex:1;overflow-y:auto;padding:16px 24px}
  .course-group-title{font-size:13px;color:var(--muted);font-weight:700;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--line)}
  .course-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
  .course-card:hover{border-color:var(--blue)}
  .course-card.current{border-color:var(--green);background:#f6fdf8}
  .course-card .c-info{flex:1;min-width:0}
  .course-card .c-title{font-size:15px;font-weight:700}
  .course-card .c-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .course-card .c-badge{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700}
  .c-badge.current{background:var(--green);color:#fff}
  .c-badge.select{background:var(--blue);color:#fff}
  .course-card .c-btn{height:32px;padding:0 14px;border:1px solid var(--blue);border-radius:var(--radius);background:#fff;color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
  .course-card .c-btn:hover{background:var(--blue);color:#fff}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">小思老师思维课</div>
    <div id="lesson-state" class="lesson-state">准备上课</div>
    <button id="btn-courses" class="btn" style="font-size:13px">📚 选课</button>

        <div id="live-name" class="live-name">课堂提示</div>
        <div id="live-message" class="live-message">准备好后连接老师。</div>

<script src="./sdk.js"></script>
<script type="module" src="./teaching/whiteboard/index.js"></script>
<script>
const el = id => document.getElementById(id);
const statusEl = el('status');
const lessonStateEl = el('lesson-state');
const chapterTitleEl = el('chapter-title');
const placeholderEl = el('avatar-placeholder');
const avatarContainer = el('avatar-container');
const boardCard = el('board-card');
const boardLabel = el('board-label');
const boardTitle = el('board-title');
const boardBody = el('board-body');
const whiteSteps = el('white-steps');
const visualEl = el('visual');
const interactiveSceneEl = el('interactive-scene');
const quizTimer = el('quiz-timer');
const quizOptions = el('quiz-options');
let quizTimerInterval = null;
const liveName = el('live-name');
const liveMessage = el('live-message');
const transcriptList = el('transcript-list');
const speaker = el('speaker');
const micTitle = el('mic-title');
const micHelp = el('mic-help');
const btnConnect = el('btn-connect');
const btnDisconnect = el('btn-disconnect');
const btnVoice = el('btn-voice');
const btnTranscript = el('btn-transcript');
const btnTranscriptClose = el('btn-transcript-close');
const transcriptDrawer = el('transcript-drawer');
const stepsEl = el('steps');

let client = null;
let connected = false;
let micOn = false;
let micMode = null;
let currentChapterData = null;
let _ws = null;
let _wsReconnectTimer = null;
let _wsReconnectAttempts = 0;
let _audioPlaySeq = 0;
let currentInteraction = null;
let currentQuiz = null;
let selectedAnswer = null;
let transcriptSeen = new Set();
let displayedWhiteboardIndex = null;

function setStatus(kind, text){
  statusEl.className = 'status' + (kind ? ' ' + kind : '');
  statusEl.textContent = text;
}

function setLive(name, text){
  liveName.textContent = name || '课堂提示';
  liveMessage.textContent = text || '';
  speaker.textContent = (name || '提示').slice(0, 2);
  var capName = el('live-caption-name');
  var capText = el('live-caption-text');
  if (capName) capName.textContent = (name === '课堂提示') ? '' : (name || '');
  if (capText) capText.textContent = text || '';
}

function normalizeTranscriptText(text){
  return (text || '').replace(/\s+/g, '').trim();
}

function transcriptKey(role, text, name){
  if (role === 'classmate') return role + ':' + normalizeTranscriptText(text);
  return role + ':' + (name || '') + ':' + normalizeTranscriptText(text);
}

function appendTranscript(role, text, name){
  if (!text) return;
  const key = transcriptKey(role, text, name);
  if (transcriptSeen.has(key)) return;
  transcriptSeen.add(key);
  const row = document.createElement('div');
  row.className = 'talk ' + role;
  const who = document.createElement('span');
  who.className = 'who';
  who.textContent = name || (role === 'user' ? '我' : role === 'classmate' ? '小明' : '小思老师');
  const body = document.createElement('span');
  body.textContent = text;
  row.append(who, body);
  transcriptList.appendChild(row);
  while (transcriptList.children.length > 40) transcriptList.removeChild(transcriptList.firstChild);
  transcriptList.scrollTop = transcriptList.scrollHeight;
}

function resetSessionState(){
  transcriptList.innerHTML = '';
  transcriptSeen.clear();
  currentInteraction = null;
  currentQuiz = null;
  stopQuizTimer();
  selectedAnswer = null;
  displayedWhiteboardIndex = null;
  currentChapterData = null;
  lastMsgSeq = 0;
  lastComponentSeq = 0;
  _audioPlaySeq = 0;
  resetBoard();
}

function setMic(on, mode){
  micOn = on;
  micMode = on ? mode : null;
  micTitle.textContent = on ? '麦克风已打开' : '麦克风关闭';
  micHelp.textContent = on ? '再点一次语音输入，就会关闭麦克风。' : '你可以自己打开或关闭麦克风。';
  updateVoiceButton();
}

function updateVoiceButton(){
  const canSpeak = connected && !currentQuiz;
  btnVoice.disabled = !micOn && !canSpeak;
  btnVoice.setAttribute('aria-label', micOn ? '关闭麦克风' : '语音输入');
  btnVoice.title = micOn ? '关闭麦克风' : '语音输入';
  btnVoice.classList.toggle('recording', micOn);
  btnVoice.classList.toggle('muted', !micOn);
  btnVoice.classList.toggle('primary', micOn);
  btnVoice.classList.toggle('interaction-ready', Boolean(currentInteraction) && !micOn);
}

function setCoursePickerEnabled(enabled){
  btnCourses.disabled = !enabled;
  btnCourses.setAttribute('aria-disabled', enabled ? 'false' : 'true');
  btnCourses.title = enabled ? '选择课程' : '课程进行中，结束后可选课';
}

async function markCourseEnded(){
  stopClassmateAudio();
  await stopMic(false);
  connected = false;
  if (client) {
    try { await client.disconnect(); } catch(e) {}
    client = null;
  }
  setStatus('', '未连接');
  placeholderEl.classList.remove('hidden');
  btnConnect.disabled = false;
  btnDisconnect.disabled = true;
  setCoursePickerEnabled(true);
  updateVoiceButton();
}

function resetBoard(){
  whiteSteps.innerHTML = '';
  delete whiteSteps.dataset.chapter;
  delete whiteSteps.dataset.total;
  visualEl.hidden = true;
  interactiveSceneEl.hidden = true;
  quizOptions.innerHTML = '';
  selectedAnswer = null;
  displayedWhiteboardIndex = null;
}

function setBoard(kind, title, body){
  boardCard.classList.remove('result','good','try','interaction-turn');
  boardLabel.textContent = kind;
  boardTitle.textContent = title;
  boardBody.textContent = body || '';
}

function updateStateLabel(state){
  const map = {
    idle:'准备上课',
    lecturing:'老师讲解',
    waiting_interact:'等你回答',
    processing_interact:'老师在想',
    answering:'问答时间',
    transitioning:'回到课堂',
    quizzing:'小测验',
    quiz_result:'看答案'
  };
  lessonStateEl.textContent = map[state] || state || '课堂中';
}

function renderChapterSteps(currentIndex, total){
  const count = Math.max(0, Number(total || 0));
  const current = Math.max(0, Number(currentIndex || 0));
  if (!count) return;
  if (Number(stepsEl.dataset.count || 0) !== count) {
    stepsEl.innerHTML = '';
    stepsEl.dataset.count = String(count);
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      dot.textContent = String(i + 1);
      stepsEl.appendChild(dot);
    }
  }
  [...stepsEl.children].forEach((dot, index) => {
    dot.classList.toggle('done', index < current);
    dot.classList.toggle('active', index === current);
  });
}

function renderWhiteboard(data){
  stopQuizTimer();
  currentQuiz = null;
  displayedWhiteboardIndex = data.step_num - 1;
  var chapterTitle = (currentChapterData && currentChapterData.title) || '';
  var stepLabel = '第 ' + data.step_num + ' 步 / 共 ' + data.step_total + ' 步';
  setBoard(stepLabel, chapterTitle || data.text, data.text || '');
  interactiveSceneEl.hidden = true;
  interactiveSceneEl.innerHTML = '';
  quizOptions.innerHTML = '';
  if (currentChapterData && currentChapterData.id === data.chapter_id && currentChapterData.skeleton) {
    renderChapterContent(currentChapterData, data.step_num - 1);
  } else if (whiteSteps.dataset.chapter !== data.chapter_id || Number(whiteSteps.dataset.total || 0) !== data.step_total) {
    whiteSteps.innerHTML = '';
    whiteSteps.dataset.chapter = data.chapter_id;
    whiteSteps.dataset.total = data.step_total;
    for (let i = 1; i <= data.step_total; i++) {
      const row = document.createElement('div');
      row.className = 'white-step';
      row.dataset.step = String(i);
      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = String(i);
      const text = document.createElement('div');
      text.textContent = i === data.step_num ? data.text : '待讲解';
      row.append(num, text);
      whiteSteps.appendChild(row);
    }
  }
  whiteSteps.querySelectorAll('.white-step').forEach(row => {
    const n = Number(row.dataset.step);
    row.classList.toggle('active', n === data.step_num);
    row.classList.toggle('done', n < data.step_num);
    if (n === data.step_num) row.lastChild.textContent = data.text || '';
  });
}

function skeletonText(item){
  if (item && typeof item === 'object') return item.text || '';
  return item || '';
}

function renderChapterContent(chapter, activeIndex){
  const skeleton = Array.isArray(chapter && chapter.skeleton) ? chapter.skeleton : [];
  if (!skeleton.length) return;
  if (whiteSteps.dataset.chapter !== chapter.id || Number(whiteSteps.dataset.total || 0) !== skeleton.length) {
    whiteSteps.innerHTML = '';
    whiteSteps.dataset.chapter = chapter.id;
    whiteSteps.dataset.total = String(skeleton.length);
    skeleton.forEach((text, index) => {
      const row = document.createElement('div');
      row.className = 'white-step';
      row.dataset.step = String(index + 1);
      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = String(index + 1);
      const body = document.createElement('div');
      body.textContent = skeletonText(text);
      row.append(num, body);
      whiteSteps.appendChild(row);
    });
  }
  whiteSteps.querySelectorAll('.white-step').forEach(row => {
    const n = Number(row.dataset.step) - 1;
    row.classList.toggle('active', n === activeIndex);
    row.classList.toggle('done', n < activeIndex);
  });
}

function renderVisual(v){
  if (!v) return;
  visualEl.hidden = false;
  visualEl.textContent = [v.title, v.content].filter(Boolean).join('：');
}

function renderInteraction(info){
  currentInteraction = info;
  currentQuiz = null;
  stopQuizTimer();
  quizOptions.innerHTML = '';
  selectedAnswer = null;
  displayedWhiteboardIndex = null;
  if (currentChapterData && currentChapterData.id === info.chapter_id) {
    renderChapterContent(currentChapterData, -1);
  }
  setBoard('轮到你回答啦', info.text, '点蓝色麦克风，然后说一句你的想法。');
  boardCard.classList.add('interaction-turn');
  const action = document.createElement('div');
  action.className = 'interaction-action';
  action.textContent = '点蓝色麦克风，说出你的答案';
  const wait = document.createElement('div');
  wait.className = 'interaction-wait';
  wait.textContent = '等待你的答案，小明也在思考。';
  boardBody.append(document.createElement('br'), action, wait);
  micTitle.textContent = '轮到你回答';
  micHelp.textContent = '点蓝色麦克风，然后说一句就可以。';
  setLive('小思老师', info.text);
  updateVoiceButton();
}

function renderQuiz(q){
  currentQuiz = q;
  currentInteraction = null;
  setMic(false, null);
  interactiveSceneEl.hidden = true;
  resetBoard();
  setBoard('小测验', q.question, '选一个你认为最有道理的答案。');
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.key + '. ' + opt.text;
    btn.onclick = async () => {
      if (selectedAnswer) return;
      selectedAnswer = opt.key;
      quizOptions.querySelectorAll('button').forEach(b => b.disabled = true);
      btn.style.borderColor = 'var(--blue)';
      await fetch('/api/teaching/quiz-answer', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chapter_id:q.chapter_id, answer:opt.key})
      });
      setLive('课堂提示', '已提交，等老师讲答案。');
    };
    quizOptions.appendChild(btn);
  });
  updateVoiceButton();
  if (q.started_at && q.timeout_s) {
    console.log('⏱  renderQuiz: starting timer, started_at=' + q.started_at + ' timeout_s=' + q.timeout_s);
    startQuizTimer(q.started_at, q.timeout_s);
  } else {
    console.log('⏱  renderQuiz: NO timer fields, q.started_at=' + q.started_at + ' q.timeout_s=' + q.timeout_s);
  }
}

function startQuizTimer(startedAt, timeoutS){
  console.log('⏱  startQuizTimer called, startedAt=' + startedAt + ' timeoutS=' + timeoutS);
  stopQuizTimer();
  const endAt = new Date(startedAt).getTime() + timeoutS * 1000;
  quizTimer.hidden = false;
  const tick = () => {
    const left = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
    const m = String(Math.floor(left / 60)).padStart(2, '0');
    const s = String(left % 60).padStart(2, '0');
    quizTimer.textContent = '⏱ ' + m + ':' + s;
    quizTimer.classList.toggle('urgent', left <= 15);
    if (left <= 0) stopQuizTimer();
  };
  tick();
  quizTimerInterval = setInterval(tick, 1000);
}

function stopQuizTimer(){
  if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }
  quizTimer.hidden = true;
  quizTimer.classList.remove('urgent');
}

function renderQuizResult(data){
  stopQuizTimer();
  currentQuiz = null;
  resetBoard();
  boardCard.classList.add('result', data.correct ? 'good' : 'try');
  setBoard(data.correct ? '答对了' : '再想一步', data.correct ? '你的判断很清楚。' : '这个地方容易被绕进去。', data.explanation || '');
  if (data.correct_answer) {
    visualEl.hidden = false;
    visualEl.textContent = '正确答案：' + data.correct_answer;
  }
}

function renderClassmate(data){
  setLive(data.speaker || '小明', data.text || '');
  appendTranscript('classmate', data.text || '', data.speaker || '小明');
}

// Audio queue — ensures classmates speak one at a time, never overlapping
let _audioQueue = [];
let _audioPlaying = false;
let _currentClassmateAudio = null;
let _audioGeneration = 0;

async function _processAudioQueue(){
  if (_audioPlaying) return;
  const generation = _audioGeneration;
  while (_audioQueue.length > 0){
    if (generation !== _audioGeneration) break;
    _audioPlaying = true;
    const data = _audioQueue.shift();
    const audio = new Audio(data.url);
    _currentClassmateAudio = audio;
    audio.volume = 0.85;
    try {
      await new Promise((resolve, reject) => {
        audio.onended = resolve;
        audio.onpause = resolve;
        audio.onerror = resolve;  // don't stall queue on load error
        audio.play().catch(resolve);
      });
    } catch(e){}
    if (_currentClassmateAudio === audio) _currentClassmateAudio = null;
    if (generation !== _audioGeneration) break;
  }
  if (generation === _audioGeneration) _audioPlaying = false;
}

function playAudio(data){
  if (!data || !data.url) return;
  _audioQueue.push(data);
  _processAudioQueue();
}

function stopClassmateAudio(){
  _audioGeneration += 1;
  _audioQueue = [];
  if (_currentClassmateAudio) {
    try {
      _currentClassmateAudio.pause();
      _currentClassmateAudio.currentTime = 0;
    } catch(e) {}
    _currentClassmateAudio = null;
  }
  _audioPlaying = false;
}

async function startMic(mode){
  if (!connected || !client || micOn) return;
  stopClassmateAudio();
  setLive('课堂提示', '正在打开麦克风，看到提示后再说。');
  btnVoice.disabled = true;
  micTitle.textContent = '麦克风正在打开';
  micHelp.textContent = '蓝牙输入可能需要一点点时间。';
  try {
    if (mode === 'qa') {
      await fetch('/api/teaching/raise-hand', {method:'POST'});
    }
    await client.startAudioCapture();
    setLive('课堂提示', '可以开始说了。');
    setMic(true, mode);
  } catch(e) {
    if (mode === 'qa') {
      try { await fetch('/api/teaching/cancel-hand', {method:'POST'}); } catch(_) {}
    }
    setMic(false, null);
    setLive('课堂提示', '麦克风没有打开，请检查浏览器或蓝牙输入。');
  }
}

async function stopMic(cancelQa){
  const wasInteraction = micMode === 'interaction';
  if (client && micOn) {
    try { await client.stopAudioCapture(); } catch(e) {}
  }
  if (cancelQa && micMode === 'qa') {
    await fetch('/api/teaching/cancel-hand', {method:'POST'});
  }
  if (wasInteraction) currentInteraction = null;
  setMic(false, null);
}

btnVoice.onclick = () => {
  if (micOn) {
    stopMic(false);
  } else {
    startMic(currentInteraction ? 'interaction' : 'qa');
  }
};

function setTranscriptOpen(open){
  transcriptDrawer.classList.toggle('open', open);
  transcriptDrawer.setAttribute('aria-hidden', open ? 'false' : 'true');
}

btnTranscript.onclick = () => setTranscriptOpen(!transcriptDrawer.classList.contains('open'));
btnTranscriptClose.onclick = () => setTranscriptOpen(false);

var btnSkip = el('btn-skip');
btnSkip.onclick = async () => {
  btnSkip.disabled = true;
  try {
    const res = await fetch('/api/teaching/skip-chapter', {method:'POST'});
    const data = await res.json();
    if (data.success) {
      setLive('课堂提示', '已跳到：' + data.chapter.title);
    } else {
      setLive('课堂提示', data.error || '无法跳转');
    }
  } catch(e) {
    setLive('课堂提示', '跳转失败');
  }
  btnSkip.disabled = false;
};

// ── WebSocket + HTTP polling (WS primary, polling fallback) ──

let lastMsgSeq = 0;
let lastComponentSeq = 0;

function connectWs(){
  if (_ws) { try { _ws.close(); } catch(e) {} }
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = protocol + '//' + location.host + '/api/teaching/ws';
  _ws = new WebSocket(url);
  _ws.onopen = () => {
    console.log('🔌 WS connected');
    _wsReconnectAttempts = 0;
    // WS working — disable polling until WS drops
    if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  };
  _ws.onmessage = (ev) => {
    try {
      const m = JSON.parse(ev.data);
      if (m.type === 'state_sync') {
        if (m.courseEnded) { markCourseEnded(); return; }
        updateStateLabel(m.state);
        renderChapterSteps(m.currentChapterIndex, m.totalChapters);
        if (m.currentChapter) {
          currentChapterData = m.currentChapter;
          if (m.currentChapter.title) chapterTitleEl.textContent = m.currentChapter.title;
          if (m.currentChapter.skeleton) renderChapterContent(m.currentChapter, displayedWhiteboardIndex ?? 0);
        }
        if (m.quiz && m.state === 'quizzing') renderQuiz(m.quiz);
        if (m.interaction && m.state === 'waiting_interact') renderInteraction(m.interaction);
        if (m.visual) renderVisual(m.visual);
        updateVoiceButton();
      } else if (m.type === 'message') {
        if (m.role === 'agent') {
          setLive('小思老师', m.text);
          appendTranscript('agent', m.text, '小思老师');
        } else if (m.role === 'user') {
          appendTranscript('user', m.text, '我');
        } else if (m.role === 'classmate') {
          const cn = m.name || '小明';
          setLive(cn, m.text);
          appendTranscript('classmate', m.text, cn);
        }
      } else if (m.type === 'component') {
        handleComponent({type: m.component, action: m.action, data: m.data});
      }
    } catch(e) {}
  };
  _ws.onclose = () => {
    console.log('🔌 WS closed');
    // Fallback to polling
    if (!_pollTimer && connected) _pollTimer = setInterval(pollStatus, 700);
    scheduleWsReconnect();
  };
  _ws.onerror = () => {
    console.log('🔌 WS error');
    // Fallback to polling immediately
    if (!_pollTimer && connected) _pollTimer = setInterval(pollStatus, 700);
  };
}

function scheduleWsReconnect(){
  if (_wsReconnectTimer || _wsReconnectAttempts >= 5) return;
  const delay = Math.min(1000 * Math.pow(2, _wsReconnectAttempts), 16000);
  _wsReconnectAttempts++;
  console.log('🔌 WS reconnect in ' + (delay/1000) + 's (attempt ' + _wsReconnectAttempts + ')');
  _wsReconnectTimer = setTimeout(() => {
    _wsReconnectTimer = null;
    if (connected) connectWs();
  }, delay);
}

function disconnectWs(){
  if (_wsReconnectTimer) { clearTimeout(_wsReconnectTimer); _wsReconnectTimer = null; }
  _wsReconnectAttempts = 5;
  if (_ws) { try { _ws.close(); } catch(e) {}; _ws = null; }
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

let _pollTimer = null;

async function pollStatus(){
  btnConnect.disabled = connected;
  btnDisconnect.disabled = !connected;
  if (!connected) return;
  try {
    const res = await fetch('/api/teaching/status');
    const s = await res.json();
    if (s.courseEnded) { await markCourseEnded(); return; }
    updateStateLabel(s.state);
    renderChapterSteps(s.currentChapterIndex, s.totalChapters);
    if (s.currentChapter) {
      currentChapterData = s.currentChapter;
      if (s.currentChapter.title) chapterTitleEl.textContent = s.currentChapter.title;
    }
    if (s.messages) {
      for (const m of s.messages) {
        if (m.seq > lastMsgSeq) {
          lastMsgSeq = m.seq;
          if (m.role === 'agent') {
            setLive('小思老师', m.text);
            appendTranscript('agent', m.text, '小思老师');
          } else if (m.role === 'user') {
            appendTranscript('user', m.text, '我');
          } else if (m.role === 'classmate') {
            const cn = m.name || '小明';
            setLive(cn, m.text);
            appendTranscript('classmate', m.text, cn);
          }
        }
      }
    }
    if (s.components) s.components.forEach(handleComponent);
    if (!s.interaction && currentChapterData && currentChapterData.skeleton) {
      renderChapterContent(currentChapterData, displayedWhiteboardIndex ?? (s.currentSkeletonIndex || 0));
    }
    if (s.interaction && s.state === 'waiting_interact') renderInteraction(s.interaction);
    if (s.quiz && s.state === 'quizzing') {
      if (!currentQuiz || currentQuiz.chapter_id !== s.quiz.chapter_id) renderQuiz(s.quiz);
      if (!quizTimerInterval && s.quiz.started_at && s.quiz.timeout_s) startQuizTimer(s.quiz.started_at, s.quiz.timeout_s);
    }
    if (!s.quiz || s.state !== 'quizzing') stopQuizTimer();
    if (s.visual) renderVisual(s.visual);
    if (!s.interaction) currentInteraction = null;
    updateVoiceButton();
  } catch(e) {}
}

function handleComponent(c){
  if (c.seq != null && c.seq <= lastComponentSeq) return;
  if (c.seq != null) lastComponentSeq = c.seq;
  if (c.type === 'whiteboard_step') { renderWhiteboard(c.data); }
  else if (c.type === 'interactive_scene') { window.renderInteractiveScene(c.data); }
  else if (c.type === 'chapter_indicator') {
    if (c.data.title) chapterTitleEl.textContent = c.data.title;
    if (c.data.chapter_id) currentChapterData = {id:c.data.chapter_id, title:c.data.title || ''};
    renderChapterSteps(c.data.chapter_index, c.data.total_chapters);
  }
  else if (c.type === 'visual_card' || c.type === 'mindmap' || c.type === 'card') renderVisual(c.data);
  else if (c.type === 'interaction_prompt') { renderInteraction(c.data); }
  else if (c.type === 'quiz') { renderQuiz(c.data); }
  else if (c.type === 'quiz_result') { renderQuizResult(c.data); }
  else if (c.type === 'classmate_message') renderClassmate(c.data);
  else if (c.type === 'play_audio') {
    if (c.action === 'stop') stopClassmateAudio();
    else playAudio(c.data);
  }
}

btnConnect.onclick = async () => {
  try {
    setStatus('connecting', '连接中');
    setCoursePickerEnabled(false);
    resetSessionState();
    const res = await fetch('/api/start-session', {method:'POST'});
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '连接失败');
    avatarContainer.innerHTML = '';
    client = LivekitSDK.createClient({
      connectConfig:{type:'direct',config:{sfuUrl:data.sfuUrl,userToken:data.userToken}},
      video:{containerElement:avatarContainer,fitMode:'cover'},
      audio:{output:{enabled:true,volume:1,muted:false},input:{noiseSuppression:true,voiceIsolation:true,sampleRate:16000,constraints:{echoCancellation:true,autoGainControl:true}}}
    });
    client.events.on('sdk:connected', async () => {
      connected = true;
      setStatus('connected', '已连接');
      placeholderEl.classList.add('hidden');
      btnConnect.disabled = true;
      btnDisconnect.disabled = false;
      setCoursePickerEnabled(false);
      setMic(false, null);
      setLive('课堂提示', '老师已连接，麦克风仍然关闭。');
      await fetch('/api/teaching/start', {method:'POST'});
      connectWs();
    });
    client.events.on('sdk:disconnected', async () => {
      disconnectWs();
      await stopMic(false);
      connected = false;
      setStatus('', '未连接');
      placeholderEl.classList.remove('hidden');
      btnConnect.disabled = false;
      btnDisconnect.disabled = true;
      setCoursePickerEnabled(true);
      setMic(false, null);
    });
    client.events.on('sdk:error', info => {
      setStatus('error', '错误');
      setLive('课堂提示', info && info.message ? info.message : '连接出现问题');
    });
    await client.connect();
    if (client.isMuted) client.unmute();
  } catch(err) {
    console.error(err);
    connected = false;
    setStatus('error', '错误');
    btnConnect.disabled = false;
    btnDisconnect.disabled = true;
    setCoursePickerEnabled(true);
    const msg = err instanceof TypeError
      ? '请先启动 teaching agent 服务，再连接老师。'
      : (err.message || '连接失败');
    setLive('课堂提示', msg);
    updateVoiceButton();
  }
};

btnDisconnect.onclick = async () => {
  disconnectWs();
  stopClassmateAudio();
  await stopMic(false);
  if (client) {
    try { await client.disconnect(); } catch(e) {}
    client = null;
  }
  await fetch('/api/teaching/stop', {method:'POST'});
  connected = false;
  setStatus('', '未连接');
  placeholderEl.classList.remove('hidden');
  btnConnect.disabled = false;
  btnDisconnect.disabled = true;
  setCoursePickerEnabled(true);
  updateVoiceButton();
  setLive('课堂提示', '已断开。');
};

// ── Course selection ──
const btnCourses = el('btn-courses');
const modalOverlay = document.createElement('div');
modalOverlay.className = 'modal-overlay hidden';
modalOverlay.innerHTML = `<div class="modal">
  <div class="modal-head"><h2>📚 选择课程</h2><button class="modal-close">&times;</button></div>
  <div class="modal-tabs" id="modal-tabs"></div>
  <div class="modal-body" id="modal-body"></div>
</div>`;
document.body.appendChild(modalOverlay);

modalOverlay.querySelector('.modal-close').onclick = () => modalOverlay.classList.add('hidden');
modalOverlay.onclick = e => { if (e.target === modalOverlay) modalOverlay.classList.add('hidden'); };

let _coursesData = null;
let _courseFilter = 'all';

async function openCourses(){
  if (connected) { setLive('课堂提示', '请先断开连接再选课。'); return; }
  modalOverlay.classList.remove('hidden');
  if (_coursesData) { _renderCourses(); return; }
  try {
    const res = await fetch('/api/teaching/courses');
    _coursesData = await res.json();
    _renderCourses();
  } catch(e){ setLive('课堂提示', '获取课程列表失败。'); }
}

function _renderCourses(){
  const tabs = el('modal-tabs');
  const body = el('modal-body');
  tabs.innerHTML = '';
  body.innerHTML = '';

  const allTab = document.createElement('button');
  allTab.className = 'modal-tab' + (_courseFilter === 'all' ? ' active' : '');
  allTab.textContent = '全部';
  allTab.onclick = () => { _courseFilter = 'all'; _renderCourses(); };
  tabs.appendChild(allTab);

  for (const g of (_coursesData.groups || [])){
    const tab = document.createElement('button');
    tab.className = 'modal-tab' + (_courseFilter === g.age ? ' active' : '');
    tab.textContent = g.age + '岁';
    tab.onclick = () => { _courseFilter = g.age; _renderCourses(); };
    tabs.appendChild(tab);
  }

  for (const g of (_coursesData.groups || [])){
    if (_courseFilter !== 'all' && _courseFilter !== g.age) continue;
    const title = document.createElement('div');
    title.className = 'course-group-title';
    title.textContent = g.label + ' · ' + g.strategy;
    body.appendChild(title);

    for (const c of g.courses){
      const card = document.createElement('div');
      card.className = 'course-card' + (c.name === _coursesData.current ? ' current' : '');
      const isCurrent = c.name === _coursesData.current;
      card.innerHTML =
        `<div class="c-info">
          <div class="c-title">${escHtml(c.title)}</div>
          <div class="c-meta">${c.chapters} 章节 · ${c.age}岁</div>
        </div>
        ${isCurrent
          ? '<span class="c-badge current">当前</span>'
          : '<button class="c-btn">选此课</button>'
        }`;
      if (!isCurrent){
        card.querySelector('.c-btn').onclick = async (ev) => {
          ev.stopPropagation();
          await selectCourse(c.name);
        };
      }
      card.onclick = () => { if (!isCurrent) selectCourse(c.name); };
      body.appendChild(card);
    }
  }
}

async function selectCourse(courseName){
  try {
    const res = await fetch('/api/teaching/courses/select', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({course_name:courseName})
    });
    const d = await res.json();
    if (d.success){
      _coursesData.current = courseName;
      const info = d.course;
      if (info && info.title) {
        const age = (courseName.match(/_(\d+-\d+)$/) || ['','4-10'])[1];
        const parts = [age + '岁', info.title];
        if (info.chapters) parts.push(info.chapters + '章');
        el('current-course').textContent = parts.join(' · ');
      }
      for (const g of _coursesData.groups){
        for (const c of g.courses){
          if (c.name === courseName) {
            setLive('课堂提示', '已选择：' + c.title + ' — 连接老师开始上课。');
            break;
          }
        }
      }
      modalOverlay.classList.add('hidden');
      _renderCourses();
    } else {
      setLive('课堂提示', '选课失败：' + (d.error || '未知错误'));
    }
  } catch(e){ setLive('课堂提示', '选课请求失败。'); }
}

async function loadCurrentCourse(){
  try {
    const res = await fetch('/api/teaching/courses/current');
    const d = await res.json();
    if (d.title) {
      const parts = [d.age + '岁', d.title];
      if (d.chapters) parts.push(d.chapters + '章');
      el('current-course').textContent = parts.join(' · ');
    }
  } catch(e){}
}
function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
btnCourses.onclick = openCourses;
loadCurrentCourse();
</script>
