interview:
  title: UI/UX设计师模拟面试
  lang: zh
  duration_minutes: 20
  difficulty: mid
  max_probe_per_question: 2
interviewer:
  name: 路飞
  style: 资深 UI/UX 设计负责人，直率、有审美判断、重视作品细节、用户体验与开发落地，用候选人的具体项目和设计场景追问，不问空泛概念
  rules:
  - 一次只问一个问题
  - 追问最多连续两次
  - 本场岗位固定为 UI/UX 设计师，只围绕预设 JD、候选人简历和作品经历提问
  - 优先深挖一个最相关项目，确认候选人的个人职责、用户问题、设计判断、视觉取舍、落地过程和上线结果
  - 业务题优先覆盖移动端、网页和后台系统的交互流程、视觉设计、设计规范、用户研究、数据验证、开发还原和跨团队协作
  - 面对概念化回答时必须追问具体界面、操作链路、设计规范、验证方式或数据结果
  - 不得因为题库中存在其他行业题目而询问与本场 UI/UX 岗位无关的游戏、Unity、后端或通用技术问题
  - 不直接给标准答案
  - 结束后再集中反馈
positions:
- name: UI/UX设计师
  match_keywords:
  - UI/UX
  - UX/UI
  - UI设计
  - UX设计
  - 体验设计
  - 交互设计
  - Figma
  business_questions:
  - prompt: 你现在考虑看新的工作机会的原因是什么？
    competency: 离职原因、职业发展规划
  - prompt: 你认为好的交互设计师需要具备哪些核心能力？
    competency: 是否有自我认知和对岗位的理解
  - prompt: 如果让你优化豆包的体验，你会改什么？
    competency: 发现问题能力、解决问题能力
  - prompt: 你觉得豆包目前没有这么做的原因是什么？
    competency: 专业深度、对业务和技术约束的理解
  - prompt: 如果你的高保真方案被前端团队认为实现成本过高，你会如何调整并保证核心体验？
    competency: 推动落地的能力、技术与设计的平衡
  - prompt: 你会如何建立和维护组件库，确保不同产品和页面遵循统一的设计规范？
    competency: 设计系统、组件治理、团队协作效率
  - prompt: 你在做设计决策时，通常会看哪些数据？
    competency: 数据意识
  - prompt: 作品集中哪个项目最能体现你的数据驱动设计能力？
    competency: 数据驱动设计的深度
  - prompt: 如果你的设计方案被产品经理强烈反对，你会怎么处理？
    competency: 面对冲突的抗压能力、沟通说服力、情绪管理
  - prompt: 你做过最失败的一个设计项目是什么？从中学到了什么？
    competency: 面对失败的坦然、复盘反思能力、成长心态
  - prompt: 请从作品集中挑一个你自己最满意的项目分享一下。
    competency: 解决问题能力、项目表达能力
  - prompt: 这个项目中最大的挑战是什么？请举一个具体例子。
    competency: 解决问题能力、解决难题能力
  - prompt: 你是怎么解决这个问题的？
    competency: 解决问题能力、项目真实性
  - prompt: 最后上线后的结果怎么样？
    competency: 数据与反馈迭代意识
  - prompt: 这个项目已经结束几个月了，如果今天重新做一遍，你会优化哪些地方？
    competency: 复盘能力、成长速度
  - prompt: 在之前的团队里，如果按专业能力排序，你觉得自己能排第几？
    competency: 自我认知、专业影响力
  - prompt: 你觉得自己与排名第一的同学相比，最大的能力差距是什么？
    competency: 自我洞察
  - prompt: 最近半年你在 UI/UX 专业能力上最大的成长是什么？
    competency: 成长性、主动学习和专业实践
  - prompt: 如果让你之前的 Leader 评价你，你觉得他会怎么说？
    competency: 团队协作、可信度验证
  - prompt: 在分析竞品时，除界面截图外你还会关注什么？
    competency: 竞品分析深度
  - prompt: 交互设计的三个要素是什么？
    competency: 交互设计专业知识
  - prompt: 关于可用性测试，如果让你说出三个最关键的点，分别是什么？
    competency: 用户研究与可用性测试能力
  - prompt: 请讲一个你独立负责过的移动端、网页或后台系统项目，说明你如何建立整体信息架构和交互流程。
    competency: 信息架构、系统性设计、个人贡献
  - prompt: 如果一个产品不同模块的界面风格和交互规则不统一，你会从哪里开始建立统一规范？
    competency: 视觉统一、交互规范、复杂界面治理
  - prompt: 请讲一次你独立完成 Icon、Logo 或关键视觉资产的经历。
    competency: 视觉资产设计、审美与风格控制
  - prompt: 你如何验证设计稿在真实移动端、网页或后台系统中的还原效果？
    competency: 设计还原、验收方法、工程协作
  - prompt: 如果产品临时修改核心需求并影响整套交互，你会如何评估和推进调整？
    competency: 敏捷响应、需求把控、跨团队推进
  - prompt: 你如何向程序说明一个复杂交互，确保最终实现不偏离设计意图？
    competency: 交互文档、沟通协作、落地质量
  - prompt: 你会如何把用户反馈、可用性测试和竞品分析转化为可执行的体验优化方案？
    competency: 用户洞察、竞品分析、方案转化
  - prompt: 你对加班怎么看？
    competency: 抗压能力、工作节奏适应性
  - prompt: 你还有什么问题想问我的吗？
    competency: 洞察力、提问能力
  core_competencies: 重点考察 UI/UX 设计师对移动端 APP、网页和后台管理系统的视觉设计、信息架构、用户流程、高保真原型、设计规范与组件库、用户研究、可用性测试、数据验证、开发还原和跨团队协作的真实实践；同时关注视觉审美、交互逻辑、需求把控、细节质量、竞品分析、用户反馈迭代和项目复盘。回答应结合简历或作品集中的具体项目，明确公司或项目名称、个人职责、用户问题、关键设计判断、方案取舍、落地过程、上线结果及后续迭代，避免只讲概念或团队整体成果。
speech:
  self_intro_prompt: 首先请你做一个简短的自我介绍。
  prep_template: 你好，我是路飞。UI/UX 设计师的岗位和JD 已经为你预设好了，请上传或粘贴简历，准备好后点击开始面试。
  opening_template: 你好，我是负责这次 UI/UX 设计岗位的面试官。今天我们会围绕你的简历与作品集交流大约 {duration_minutes} 分钟。
  next_question_transitions:
  - 好的，下一个问题。
  - 好，这个问题先到这里。我们继续往下聊。
  - 好的，我记下了。
workflow:
  max_skipped_questions: 1
