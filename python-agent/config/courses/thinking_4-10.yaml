course:
  title: 思维小达人 — 第一课：火眼金睛辨对错
  lang: zh
  default_tts_speed: 0.9
  persona:
    name: 小思老师
    style: 亲和活泼
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.9
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子

      '
    personality: '- 你是「小思老师」，一位面向4-10岁小朋友的思维课老师

      - 你像幼儿园老师一样亲切可爱，小朋友们都喜欢你

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒

      '
    environment: '- 你正在给4-10岁的小朋友上一堂在线思维课

      - 教室里有你（老师）、小明（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问

      '
    tone: '- 声音温暖甜美，语速稍慢

      - 像在讲睡前故事一样温柔

      - 每句话不超过15个字，用短句

      - 用小朋友熟悉的事物打比方：玩具、小动物、吃东西、玩游戏

      - 称呼学生为「小朋友」或「你」

      '
    goal: '- 把给定的讲课要点扩展成3-5句生动有趣的口语讲解

      - 让小朋友理解知识点，同时感受到被鼓励和尊重

      - 在提出思考问题后给小朋友留思考的时间，不要自问自答

      '
    workflow: '- 1. 用生活化的例子引入要点

      - 2. 自然地讲解核心内容

      - 3. 如果要点是提问性的，只提问不回答

      - 4. 用一句鼓励的话收尾

      '
    scope: '- 只扩展当前这一个要点，不要讲到后面的内容

      - 不要输出任何括号注释或舞台指导

      - 不要输出任何markdown格式

      - 输出长度：3-5句，总共不超过100字

      '
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards:
    - id: what_is_logic
      title: 什么是火眼金睛？🧐
      content: 就是学会判断别人说的话对不对！
      image: /assets/card-logic-kids.png
    - id: fallacy_traps
      title: 三个小陷阱 🕳️
      content: 大家都这样、大人说的都对、只能选一个
      image: /assets/card-fallacy-traps.png
chapters:
- id: intro
  title: 小故事：大家都说对，就是对吗？
  skeleton:
  - text: 讲一个小故事：森林里的小动物们都往东边跑，小兔子问为什么，大家说"因为大家都在跑呀！"
    experience:
      primitive: logic_grid
      goal: 用故事引入从众谬误，激发思考
      prompt: 小朋友，听老师讲一个森林小故事——小动物们都在往东边跑，小兔子想知道为什么。你觉得小兔子应该怎么做？
      props:
        mode: truth_table
        rows:
        - 小兔子跟着跑
        - 小兔子停下来问清楚
  - text: 问小朋友：你觉得这些小动物做得对吗？如果是你，你会跟着跑吗？
    experience:
      primitive: logic_grid
      goal: 引导小朋友思考"大家都这样做"不等于"这样做是对的"
      prompt: 想一想，如果所有小朋友都在做一件事，是不是代表这件事一定正确？屏幕上有两个选项，选一个说说你的理由。
      props:
        mode: truth_table
        rows:
        - 跟着大家一起做一定是对的
        - 要自己想想对不对再做
  - text: 引出今天的主题：不能因为做的人多，就觉得一件事情是对的哦！
    experience:
      primitive: sort_order
      goal: 巩固今天的关键思维方法——独立思考比跟风更重要
      prompt: 看看屏幕上的几个想法，哪一个和其他的不一样？找到它就能发现我们今天要学的秘诀！
      props:
        mode: oddone
        items:
        - label: 因为大家都这样做，所以一定是对的
          value: 1
        - label: 数一数有多少人这样做
          value: 1
        - label: 自己先想一想对不对
          value: 2
        oddOneIdx: 2
  interaction:
    prompt: 如果是你，你会跟着大家一起跑吗？为什么呀？
    expect_keywords:
    - 会
    - 不会
    - 跑
    - 不跑
  visual:
    type: card
    ref: what_is_logic
- id: fallacy_types
  title: 三种常见的「小陷阱」
  skeleton:
  - text: 第一个小陷阱叫"大家都这样"：别的小朋友都在吃糖，但这不代表你也一定要吃糖哦
    experience:
      primitive: logic_grid
      goal: 讲解从众谬误，用生活化的例子帮助学生识别
      prompt: 屏幕上有几个想法，你觉得哪个是"大家都这样"的小陷阱？点一点，看看你选对了没有！
      props:
        mode: truth_table
        rows:
        - 大家都在吃糖，所以我也要吃
        - 糖很甜可以吃一点
        - 偶尔吃糖没关系
  - text: 第二个小陷阱叫"大人说的都对"：爸爸妈妈和老师很厉害，但他们有时候也会弄错呢
    experience:
      primitive: logic_grid
      goal: 讲解权威谬误，帮助建立理性思考习惯
      prompt: 你的朋友说"因为我妈妈说的，所以一定是真的"——你觉得这句话对吗？看看屏幕上的选择，哪个是你的答案？
      props:
        mode: truth_table
        rows:
        - 大人说的肯定都对
        - 大人说的要想想对不对
        - 大人也会犯错的时候
  - text: 第三个小陷阱叫"只能选一个"：就像不是只有红色和蓝色，世界上还有很多好看的颜色！
    experience:
      primitive: logic_grid
      goal: 讲解非黑即白谬误，拓展思维多样性
      prompt: 如果有朋友说"你要么喜欢画画，要么喜欢唱歌，不能两个都喜欢"，你觉得他说得对吗？点出你的想法吧！
      props:
        mode: truth_table
        rows:
        - 只能喜欢一个
        - 两个都可以喜欢
        - 也可以不喜欢
  quiz:
    question: 小明说：'我们班同学都有这个玩具，所以我也一定要买！' 小明掉进了哪个小陷阱呀？
    options:
    - key: A
      text: 「大家都这样」陷阱 🐑
      correct: true
    - key: B
      text: 「大人说的都对」陷阱 👨‍🏫
      correct: false
    - key: C
      text: 「只能选一个」陷阱 🎨
      correct: false
    explanation_correct: 太棒了！🌟 小明因为'别人都有'就想要，这就是「大家都这样」小陷阱！你真是火眼金睛！
    explanation_wrong: 差一点点就对了！💪 再想想，小明是因为'班里的同学都有'才想要的，跟大人没关系哦～
  visual:
    type: card
    ref: fallacy_traps
- id: practice
  title: 来练一练你的火眼金睛！
  skeleton:
  - text: 现在我们来当小侦探，看看下面这些话对不对！
    experience:
      primitive: logic_grid
      goal: 进入实践环节，综合运用所学的三种陷阱识别方法
      prompt: 小侦探出场啦！屏幕上会出现几句话，你的任务是用火眼金睛找出每句话里的问题。准备好了吗？
      props:
        mode: truth_table
        rows:
        - 大家都跳所以我也跳
        - 妈妈说的肯定没错
        - 不是黑就是白
  - text: 小红说："我妈妈说不可以吃太多糖，但小红还是想吃。" 这跟"大人说的都对"陷阱有关吗？
    experience:
      primitive: logic_grid
      goal: 练习在具体情境中识别逻辑陷阱
      prompt: 小红的话里藏着哪个小陷阱？仔细读一读，在屏幕上选出你的答案，并说说你是怎么发现的！
      props:
        mode: truth_table
        rows:
        - 大家都这样
        - 大人说的都对
        - 只能选一个
  - text: 总结：今天我们学会了三个小陷阱——"大家都这样"、"大人说的都对"、"只能选一个"。以后听到这些话，要用你的火眼金睛看一看哦！
    experience:
      primitive: sort_order
      goal: 回顾总结三种逻辑陷阱，巩固记忆
      prompt: 最后来个小挑战！屏幕上出现了今天的知识点，但有一个是捣乱的。你能找出哪个不属于我们今天学的三个小陷阱吗？
      props:
        mode: oddone
        items:
        - label: 大家都这样
          value: 1
        - label: 大人说的都对
          value: 1
        - label: 只能选一个
          value: 1
        - label: 天上有星星
          value: 2
        oddOneIdx: 3
  interaction:
    prompt: 你今天学到了什么呀？能告诉老师一个你记住的小陷阱吗？
    expect_keywords:
    - 大家都这样
    - 大人
    - 只能选一个
    - 陷阱
