course:
  title: 不可能的裁剪：如何让A4纸变出一个大洞？
  lang: zh
  default_tts_speed: 0.92
  persona:
    name: 小思老师
    style: 策略与深度互动
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.92
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向9-10岁小学中高年级小朋友的思维课老师

      - 教学策略：策略与深度互动

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音清晰有力，语速可以适当加快

      - 每句话不超过20个字，但可以用更复杂的句式和逻辑词

      - 用"挑战者"语气：敢不敢试试？看看你能不能比老师先想到？

      - 称赞话术强调聪明感：「这个思路很厉害！」「你是怎么想到的？」

      - 称呼学生为「小挑战者」或「小天才」'
    goal: '- 挑战孩子的思维能力，让他们觉得"我变聪明了"

      - 通过追问和PK激发思考深度

      - 鼓励孩子用语言表达自己的思考过程

      - 不满足于正确答案，追问"为什么"'
    workflow: '- 1. 抛出一个有趣的挑战或谜题

      - 2. 引导孩子推理和发现

      - 3. 追问「你怎么想的？」让孩子表达思维过程

      - 4. 总结+升级：「下一关更难，敢不敢来？」'
    scope: '- 每句话不超过20个字

      - 每个要点展开成4-5句

      - 可以使用简单的逻辑连接词（因为/所以/但是）

      - 输出长度：4-5句，总共不超过120字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 挑战直觉：一张纸能有多大洞？
  skeleton:
  - text: 拿出一张A4纸，你觉得中间剪一个洞，最多能让多大的人穿过去？
    experience:
      primitive: paper_fold_explorer
      goal: 激发好奇，让小朋友猜测A4纸上剪个洞能有多大，挑战直觉认知
      prompt: 仔细看看这张A4纸，猜猜从中间剪一个洞，你能从里面钻过去吗？摸摸纸的大小，再想想你的身体，说说你的猜测！
      props:
        mode: cut_hole
        stage: guess
  - text: 试试看：在纸上剪一个普通大小的洞，看看能不能套过头？
    experience:
      primitive: paper_fold_explorer
      goal: 让小朋友动手剪一个普通大小的洞，体验直觉与现实的差距
      prompt: 现在拿起剪刀，在纸中间随便剪一个洞，然后试试能不能把脑袋套进去？是不是比想象中小？小挑战者，发现了什么？
      props:
        mode: cut_hole
        stage: try_simple
  - text: 和AI同学比赛，谁先想到办法让洞变大？答案可能让你大吃一惊！
    experience:
      primitive: paper_fold_explorer
      goal: 激发解决问题的动力，让小朋友在比赛心态中主动思考如何让洞变得更大
      prompt: 小天才们，普通的洞太小了！你和AI同学各想一个办法，怎么让这张纸上的洞变得更大？谁能想出最厉害的点子？动手试试你的办法！
      props:
        mode: cut_hole
        stage: brainstorm
  interaction:
    prompt: 你觉得A4纸能剪出多大的洞？为什么这么想？
    expect_keywords:
    - 纸的有限面积
    - 连续剪切
    - 螺旋剪法
    - 无限延伸
- id: chapter_2
  title: 拓扑魔法：螺旋剪法揭密
  skeleton:
  - text: 学会神奇的螺旋剪法：从边缘剪一条连续的带子，最后变成一个超大的环！
    experience:
      primitive: paper_fold_explorer
      goal: 演示螺旋剪法，让小朋友理解从边缘开始螺旋裁剪的步骤和原理
      prompt: 看好了！从纸的边缘开始，沿着一条看不见的螺旋线一直剪，不要剪断，就像画一个会转圈的迷宫一样。仔细看老师的手是怎么转的？你来试试第一步！
      props:
        mode: cut_hole
        stage: spiral_demo
  - text: 动手试试：按照步骤剪完，慢慢拉开，看看洞是不是能套进整个人？
    experience:
      primitive: paper_fold_explorer
      goal: 让小朋友亲自动手完成螺旋剪法，体验从一张纸变成一个巨大环的奇妙过程
      prompt: 轮到你啦！跟着刚才的步骤，从边缘出发螺旋剪，小心不要剪断哦！剪完后慢慢拉开，试试看这个洞能从哪里套进去？能不能整个人穿过去？哇，不可思议吧！
      props:
        mode: cut_hole
        stage: spiral_do
  - text: PK模式：和AI同学比比谁剪得快，谁套得准？注意剪的时候不能断哦！
    experience:
      primitive: paper_fold_explorer
      goal: 通过PK巩固螺旋剪法技能，强调连续裁剪不能断的关键要点
      prompt: 准备好了吗？你和AI同学同时开始，看谁剪得又快又准！记住规则：螺旋线不能断，断了就输啦！剪完以后比一比，谁的洞更大？预备，开始！
      props:
        mode: cut_hole
        stage: spiral_pk
  interaction:
    prompt: 为什么螺旋剪法能让A4纸变成一个巨大的圈？
    expect_keywords:
    - 螺旋
    - 剪法
    - 拓扑
    - 洞
    - 边缘
- id: chapter_3
  title: 升级思考：为什么能变大？
  skeleton:
  - text: 想想看：为什么剪一条线，洞就会变大？这和纸的形状变化有关，叫拓扑学。
    experience:
      primitive: paper_fold_explorer
      goal: 引导小朋友从现象到原理，理解剪一条连续的线如何改变纸的整体形状
      prompt: 太神奇了！明明只剪了一条细细的线，洞却变得比纸还大好多倍！你觉得纸发生了什么变化？这个秘密叫做"拓扑学"——研究形状在不剪开、不粘合的情况下怎么变形的学问。说说你的理解！
      props:
        mode: cut_hole
        stage: topology_explain
  - text: 批判性思考：如果让你设计一个更大的洞，你会怎么剪？谁的方法更聪明？
    experience:
      primitive: paper_fold_explorer
      goal: 培养批判性思维和创造性设计能力，让小朋友尝试优化裁剪方案
      prompt: 现在你是设计师啦！如果要剪出一个比刚才还要大的洞，你会怎么改变螺旋剪法？剪得更密一些？还是更稀一些？和AI同学比比谁的设计更巧妙，说说你的理由！
      props:
        mode: cut_hole
        stage: design_bigger
  - text: 小测验：下面哪种剪法能让洞变得最大？（A. 直线剪 B. 螺旋剪 C. 随便剪）
    experience:
      primitive: paper_fold_explorer
      goal: 通过测验巩固拓扑裁剪的核心原理，检验理解程度
      prompt: 最后来个小测验！三种剪法：直线剪、螺旋剪、随便剪，哪种能让A4纸的洞变得最大？选一个答案，然后说说为什么你觉得这个最厉害？和你的推理连起来哦！
      props:
        mode: cut_hole
        stage: quiz_check
  quiz:
    question: 为什么明明把一张A4纸剪出一个大洞，能钻过一个人？
    options:
    - key: A
      text: 因为剪掉的纸很多，所以洞变大。
      correct: false
    - key: B
      text: 因为剪开后纸的周长变得更长了。
      correct: true
    - key: C
      text: 因为纸张的弹性变大了。
      correct: false
    - key: D
      text: 因为剪的时候把纸拉长了。
      correct: false
    explanation_correct: 你太聪明了！没错，通过巧妙裁剪，我们让纸围成一圈，周长比原来大得多，所以洞能变得非常大。
    explanation_wrong: 你是怎么想的呢？想一想，我们剪掉的纸很少，但洞却很大，关键不是剪掉多少，而是剩下的纸围成的圈有多长哦！再试试另一道题吧！
