course:
  title: 侦探小队：彩灯密码大冒险
  lang: zh
  default_tts_speed: 0.88
  persona:
    name: 小思老师
    style: 故事与线索主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.88
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向7-8岁小学低年级小朋友的思维课老师

      - 教学策略：故事与线索主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音温暖有力，像会讲故事的姐姐/哥哥

      - 语速适中，每句话不超过15个字

      - 多用角色化和情景化表达：「小侦探们」「队员们」「我们接到一个新任务！」

      - 做错时的鼓励话术：「差一点就猜对了，我们看看另一个线索？」

      - 称呼学生为「小侦探」或「小队员」'
    goal: '- 把讲课变成一次探险或破案任务

      - 让小朋友在故事中自然地学到知识点

      - 做错时给予成长型思维的鼓励，保护自尊心

      - 在提出思考问题后给小朋友留思考的时间'
    workflow: '- 1. 用故事情境开场（比如：小侦探们，今天接到一个新案子！）

      - 2. 在故事推进中自然引出要点

      - 3. 提出一个需要"破案"的思考问题

      - 4. 不管答案如何都先肯定，然后引导思考'
    scope: '- 每句话不超过15个字

      - 每个要点展开成3-4句

      - 不要输出任何括号注释或舞台指导

      - 输出长度：3-4句，总共不超过80字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 发现彩灯的魔法节奏
  skeleton:
  - text: 队长带领小侦探们来到彩灯走廊，发现彩灯按红蓝绿闪烁，像在跳舞。
    experience:
      primitive: pattern_sequence
      mode: nth
      props:
        sequence:
        - 🔴
        - 🔵
        - 🟢
        - 🔴
        - 🔵
        - 🟢
        - '?'
        choices:
        - 🔴
        - 🔵
        - 🟢
        cycleLength: 3
        nthTarget: 4
        answer: 0
      goal: 观察彩灯颜色循环规律
      prompt: 看看彩灯的规律，选一选下一个是什么颜色？
  - text: 我们观察前几个灯：红、蓝、绿、红、蓝、绿… 原来它们是一个小循环！
    experience:
      primitive: pattern_sequence
      mode: nth
      props:
        sequence:
        - 🔴
        - 🔵
        - 🟢
        - 🔴
        - 🔵
        - 🟢
        - '?'
        choices:
        - 🔴
        - 🔵
        - 🟢
        cycleLength: 3
        nthTarget: 5
        answer: 1
      goal: 观察彩灯颜色循环规律
      prompt: 看看彩灯的规律，选一选下一个是什么颜色？
  - text: 把红蓝绿称为一组，每组3个灯。第1个红，第2蓝，第3绿，第4又是红…
    experience:
      primitive: pattern_sequence
      mode: nth
      props:
        sequence:
        - 🔴
        - 🔵
        - 🟢
        - 🔴
        - 🔵
        - 🟢
        - '?'
        choices:
        - 🔴
        - 🔵
        - 🟢
        cycleLength: 3
        nthTarget: 6
        answer: 2
      goal: 观察彩灯颜色循环规律
      prompt: 看看彩灯的规律，选一选下一个是什么颜色？
  interaction:
    prompt: 如果你是侦探，发现彩灯一闪一闪像有魔法，你会先听它的节奏吗？
    expect_keywords:
    - 节奏
    - 彩灯
    - 魔法
    - 听
- id: chapter_2
  title: 用除法破解彩灯密码
  skeleton:
  - text: 队长说：如果想知道第20个灯的颜色，可以不用一直数，用除法的神奇力量！
    experience:
      primitive: pattern_sequence
      mode: nth
      props:
        sequence:
        - 🔴
        - 🔵
        - 🟢
        - 🔴
        - 🔵
        - 🟢
        - '?'
        choices:
        - 🔴
        - 🔵
        - 🟢
        cycleLength: 3
        nthTarget: 20
        answer: 1
      goal: 观察彩灯颜色循环规律
      prompt: 看看彩灯的规律，选一选下一个是什么颜色？
  - text: 每3个灯一组，20除以3等于6组余2个，余数2对应第二个颜色——蓝色！
    experience:
      primitive: pattern_sequence
      mode: nth
      props:
        sequence:
        - 🔴
        - 🔵
        - 🟢
        - 🔴
        - 🔵
        - 🟢
        - '?'
        choices:
        - 🔴
        - 🔵
        - 🟢
        cycleLength: 3
        nthTarget: 20
        answer: 1
      goal: 观察彩灯颜色循环规律
      prompt: 看看彩灯的规律，选一选下一个是什么颜色？
  - text: 小侦探们练习：第10个灯？10÷3=3组余1，是红色！我们发现了规律武器！
    experience:
      primitive: pattern_sequence
      mode: nth
      props:
        sequence:
        - 🔴
        - 🔵
        - 🟢
        - 🔴
        - 🔵
        - 🟢
        - '?'
        choices:
        - 🔴
        - 🔵
        - 🟢
        cycleLength: 3
        nthTarget: 10
        answer: 0
      goal: 观察彩灯颜色循环规律
      prompt: 看看彩灯的规律，选一选下一个是什么颜色？
  quiz:
    question: 小侦探发现彩灯每3秒亮一次，第12秒时彩灯是第几次亮？
    options:
    - key: A
      text: 4次
      correct: true
    - key: B
      text: 3次
      correct: false
    - key: C
      text: 5次
      correct: false
    explanation_correct: 太棒啦！12除以3等于4，彩灯在第3秒、第6秒、第9秒、第12秒亮了4次。你真是个小侦探！
    explanation_wrong: 别灰心，再想想！12秒里每3秒亮一次，就是看看12里面有几个3，用除法哦。试着算算12÷3=？加油，你下次一定能答对！
