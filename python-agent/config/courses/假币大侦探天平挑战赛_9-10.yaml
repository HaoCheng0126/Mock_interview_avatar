course:
  title: 假币大侦探：天平挑战赛
  lang: zh
  default_tts_speed: 0.92
  persona:
    name: 小思老师
    style: 策略与深度互动
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.92
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向9-10岁小学中高年级小朋友的思维课老师

      - 教学策略：策略与深度互动

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音清晰有力，语速可以适当加快

      - 每句话不超过20个字，但可以用更复杂的句式和逻辑词

      - 用"挑战者"语气：敢不敢试试？看看你能不能比老师先想到？

      - 称赞话术强调聪明感：「这个思路很厉害！」「你是怎么想到的？」

      - 称呼学生为「小挑战者」或「小天才」'
    goal: '- 挑战孩子的思维能力，让他们觉得"我变聪明了"

      - 通过追问和PK激发思考深度

      - 鼓励孩子用语言表达自己的思考过程

      - 不满足于正确答案，追问"为什么"'
    workflow: '- 1. 抛出一个有趣的挑战或谜题

      - 2. 引导孩子推理和发现

      - 3. 追问「你怎么想的？」让孩子表达思维过程

      - 4. 总结+升级：「下一关更难，敢不敢来？」'
    scope: '- 每句话不超过20个字

      - 每个要点展开成4-5句

      - 可以使用简单的逻辑连接词（因为/所以/但是）

      - 输出长度：4-5句，总共不超过120字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 8枚金币，1个坏蛋
  skeleton:
  - text: 有8个金币，其中1个是假的，假币比真的轻一点，我们有一台没刻度的天平，最少称几次才能保证找出假币？
    experience:
      primitive: balance_scale
      goal: 让小朋友思考8枚金币中找出1枚假币所需的最少称量次数
      prompt: 8个金币里混入1个假币，假币更轻，天平没刻度。你觉得最少称几次一定能找到它？猜猜看！
      props:
        coins: 8
        maxWeighs: 2
  - text: 先来猜一猜：你和AI同学比赛，谁先说出最少次数？看谁更聪明！
    experience:
      primitive: balance_scale
      goal: 激发小朋友的好奇心和竞争意识，鼓励大胆猜测
      prompt: 发挥你的直觉，现在就来猜一猜！你敢不敢和AI同学比一比，看谁先说出最少需要的称量次数？
      props:
        coins: 8
        maxWeighs: 2
  - text: 真的吗？真的只需要2次？我们来试试看，分三组：3、3、2，先称两组3个的，看看会发生什么。
    experience:
      primitive: balance_scale
      goal: 引导小朋友理解将8枚金币分成3、3、2三组并先称两组3个的原理
      prompt: 我们来验证一下！把8个金币分成(3,3,2)三组。先称两个3枚的组放到天平两边——如果平衡了，假币在哪？如果不平衡呢？
      props:
        coins: 8
        maxWeighs: 2
  interaction:
    prompt: 如果硬币放在天平两边，结果平衡了，接下来该怎么办？说说你的想法。
    expect_keywords:
    - 平衡
    - 坏蛋
    - 剩余
    - 称重
- id: chapter_2
  title: 二分法大PK
  skeleton:
  - text: 为什么分3组而不是2组？如果用4对4，一次称完只能知道假币在哪边，但还没找出，需要更多次。
    experience:
      primitive: balance_scale
      goal: 让小朋友理解为什么平均分成三组比分成两组更优
      prompt: 如果把8个金币分成4对4，一次称完后能直接找出假币吗？为什么分成3、3、2反而更快？动手分析一下！
      props:
        coins: 8
  - text: 动手画一画：如果第一次两边平衡，假币在剩下的2个里；如果不平衡，假币在轻的那边3个里。继续称。
    experience:
      primitive: balance_scale
      goal: 引导小朋友画出分支推理图，理解两种情形下的后续步骤
      prompt: 画一画分支图。情形一：第一次平衡，假币在剩下的2个里，再称一次就能找出。情形二：不平衡，假币在轻的那3个里，需要继续称。
      props:
        coins: 8
  - text: 你觉得故事里的小明用了2次，小红用了3次，谁的方法更好？为什么？来场辩论赛！
    experience:
      primitive: balance_scale
      goal: 通过辩论比较不同策略的优劣，巩固对最优策略的理解
      prompt: 小明2次就找到了，小红用了3次。谁的方法更好？为什么分成三组能让小明用更少的次数找出假币？
      props:
        coins: 8
  interaction:
    prompt: 如果假币可能轻也可能重，你会怎样分组来称？为什么？
    expect_keywords:
    - 分成三组
    - 平衡
    - 倾斜
    - 推理
- id: chapter_3
  title: 升级挑战：9个金币的阴谋
  skeleton:
  - text: 现在有9个金币，还是1个假币更轻，最少称几次保证找出？同样是二分法，但这次要分3组每组3个。
    experience:
      primitive: balance_scale
      goal: 引导小朋友将8枚金币的分组策略迁移到9枚金币的情形
      prompt: 9个金币，1个假币更轻，最少称几次？提示：把9个分成三组每组3个，先称两组看看结果！
      props:
        coins: 9
        maxWeighs: 2
  - text: 关键点：每次称完，要保证把范围缩小到最少金币。9个金币只需2次，因为3×3×3。
    experience:
      primitive: balance_scale
      goal: 让小朋友理解每次称量将搜索范围缩小到三分之一的核心原理
      prompt: 每次用天平，都能把嫌疑金币的范围缩小到原来的三分之一，所以9→3→1只需要两次！你理解这个规律了吗？
      props:
        coins: 9
        maxWeighs: 2
  - text: 小测验：如果有27个金币，1个假币更轻，最少几次？用刚才的方法想想，答案在3次内哦！
    experience:
      primitive: balance_scale
      goal: 引导小朋友运用三分法规律推广到27枚金币的情形
      prompt: 挑战升级！27个金币，1个假币更轻，最少称几次？想想每次称完范围缩小到三分之一——27→9→3→1需要几步？
      props:
        coins: 9
        maxWeighs: 2
  quiz:
    question: 9个金币中有一个假币，它比真币轻。用天平最少称几次一定能找出假币？
    options:
    - key: A
      text: 1次
      correct: false
    - key: B
      text: 2次
      correct: true
    - key: C
      text: 3次
      correct: false
    - key: D
      text: 4次
      correct: false
    explanation_correct: 你太聪明了！把9个金币分成三组，每组3个。先称两组，如果平衡，假币在第三组；如果不平衡，假币在轻的那组。再从3个中称一次就能找到，所以最少2次。
    explanation_wrong: 你是怎么想的？再想想，如果只称一次，只能比较两个组，但假币可能在第三组哦。试着把金币分成三组，用两次就能搞定！
