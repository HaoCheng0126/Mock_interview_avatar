course:
  title: 小侦探和天空桥梁：信号大救援
  lang: zh
  default_tts_speed: 0.88
  persona:
    name: 小思老师
    style: 故事与线索主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.88
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向7-8岁小学低年级小朋友的思维课老师

      - 教学策略：故事与线索主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音温暖有力，像会讲故事的姐姐/哥哥

      - 语速适中，每句话不超过15个字

      - 多用角色化和情景化表达：「小侦探们」「队员们」「我们接到一个新任务！」

      - 做错时的鼓励话术：「差一点就猜对了，我们看看另一个线索？」

      - 称呼学生为「小侦探」或「小队员」'
    goal: '- 把讲课变成一次探险或破案任务

      - 让小朋友在故事中自然地学到知识点

      - 做错时给予成长型思维的鼓励，保护自尊心

      - 在提出思考问题后给小朋友留思考的时间'
    workflow: '- 1. 用故事情境开场（比如：小侦探们，今天接到一个新案子！）

      - 2. 在故事推进中自然引出要点

      - 3. 提出一个需要"破案"的思考问题

      - 4. 不管答案如何都先肯定，然后引导思考'
    scope: '- 每句话不超过15个字

      - 每个要点展开成3-4句

      - 不要输出任何括号注释或舞台指导

      - 输出长度：3-4句，总共不超过80字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 第1章：信号去哪了？
  skeleton:
  - text: 小侦探在基地收到一段断断续续的消息，原来大山挡住了信号。
    experience:
      primitive: sky_signal_rescue
      goal: 对比不同障碍物对信号的影响
      prompt: 打开雷达扫描，看大山怎样挡住基地和救援队之间的信号。
      props:
        mode: blocked
        status: 山体遮挡，信号中断
  - text: 老师化身指挥官，带小侦探们发现——信号需要翻山越岭。
    experience:
      primitive: sky_signal_rescue
      goal: 信号需要绕开障碍物找到通路
      prompt: 呼叫侦察卫星，让信号从天空绕过大山。
      props:
        mode: blocked
        status: 正在寻找空中通路
  - text: 小侦探想到好办法：让小AI在太空中扔一颗卫星帮忙传信号。
    experience:
      primitive: sky_signal_rescue
      goal: 理解卫星帮信号翻山越岭
      prompt: 点亮卫星链路，看看信号光束怎样越过山。
      props:
        mode: relay
        nodes:
        - 基地
        - 卫星
        - 救援队
  interaction:
    prompt: 小侦探，信号突然消失，你会先从哪里调查？
    expect_keywords:
    - 天线
    - 障碍物
    - 干扰
    - 电源
- id: chapter_2
  title: 第2章：空中搭桥
  skeleton:
  - text: 小侦探指挥小AI扔出第一颗卫星，但信号传一半又断了。
    experience:
      primitive: sky_signal_rescue
      goal: 对比不同卫星方案覆盖能力
      prompt: 一颗卫星只能传到一半，指挥台提示需要接力节点。
      props:
        mode: relay
        nodes:
        - 地面站
        - 卫星A
        - 空白节点
        - 救援队
  - text: 原来一颗卫星不够，需要第二颗卫星接力，像搭桥一样。
    experience:
      primitive: sky_signal_rescue
      goal: 理解卫星接力正确顺序
      prompt: 点亮卫星A和卫星B，搭出完整空中桥梁。
      props:
        mode: relay
        nodes:
        - 地面站
        - 卫星A
        - 卫星B
        - 目的地
  - text: 小侦探们动手拉线：从地面站到卫星A，再到卫星B，终于连上另一端。
    experience:
      primitive: sky_signal_rescue
      goal: 动手搭建信号链路
      prompt: 观察黄色信号光束，确认每个节点都连上了。
      props:
        mode: relay
        nodes:
        - 基地
        - 卫星A
        - 卫星B
        - 救援队
  quiz:
    question: 小侦探想用信号向远处的救援队求助，哪种方法最能帮助他们建立‘空中桥梁’？
    options:
    - key: A
      text: 用卫星接力，把信号一站一站传过去
      correct: true
    - key: B
      text: 用最大的声音喊‘救命’
      correct: false
    - key: C
      text: 用树叶在地上拼一个‘SOS’
      correct: false
    explanation_correct: 太棒啦！卫星接力就像在天空搭桥，信号可以从一个节点传到下一个节点。
    explanation_wrong: 差一点点就对了！声音和地面标记都容易被挡住，卫星接力更适合远距离传信号。
  interaction:
    prompt: 如果你是侦探，要建一座空中信号桥，你会先做什么？
    expect_keywords:
    - 信号
    - 桥梁
    - 连接
- id: chapter_3
  title: 第3章：永不掉线的网
  skeleton:
  - text: 小侦探发现：如果一颗卫星坏了，信号就断了，真糟糕！
    experience:
      primitive: sky_signal_rescue
      goal: 对比三种网络方式的稳定性
      prompt: 先建立主链路，再看看单条线断掉会发生什么。
      props:
        mode: mesh
        nodes:
        - A站
        - B星
        - C星
        - D站
  - text: 小AI想出妙招：多扔几颗卫星，连成一张大网，信号可以从别的路走。
    experience:
      primitive: sky_signal_rescue
      goal: 对比单条路径 vs 多条路径：网断了还有别的路
      prompt: 启动备用路线，看看网状链路怎样绕开故障。
      props:
        mode: mesh
        nodes:
        - 基地
        - 卫星1
        - 卫星2
        - 救援队
  - text: 小侦探们明白了：网比单根线更稳，这就是卫星互联网的厉害之处！
    experience:
      primitive: sky_signal_rescue
      goal: 理解卫星数量越多、覆盖越广、网络越稳定
      prompt: 多颗卫星组成网，信号就有更多安全路线。
      props:
        mode: mesh
        nodes:
        - 地面站
        - 卫星A
        - 卫星B
        - 卫星C
  quiz:
    question: 小侦探发现，信号塔之间需要保持联系才能组成“永不掉线的网”。以下哪个选项是正确的？
    options:
    - key: A
      text: 信号塔只要建得高，就能互相连接，不需要其他帮助。
      correct: false
    - key: B
      text: 信号塔之间需要互相传递信号，就像传递接力棒一样，这样网络才不会掉线。
      correct: true
    - key: C
      text: 信号塔只要连上电源，就能永远不掉线。
      correct: false
    explanation_correct: 太棒了！你发现啦！信号塔就像小侦探们手拉手，一个接一个传递信号，才能组成永不掉线的网。你真是个小天才！
    explanation_wrong: 你的想法很有趣！确实，建得高或连上电源都有帮助，但信号塔之间还需要互相“说话”传递信息，就像接力赛一样。下次再想想，你一定能找到正确答案！
