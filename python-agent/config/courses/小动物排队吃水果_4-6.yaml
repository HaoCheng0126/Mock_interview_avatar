course:
  title: 小动物排队吃水果
  lang: zh
  default_tts_speed: 0.85
  persona:
    name: 小思老师
    style: 动作和游戏主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.85
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向4-6岁幼儿园中大班小朋友的思维课老师

      - 教学策略：动作和游戏主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音夸张甜美，尾音上扬，像动画片里的角色

      - 语速很慢，每句话不超过10个字

      - 大量使用「哇！」「太棒了！」「击个掌！」「抱抱！」等情绪化表达

      - 多用叠词和拟声词：咚咚咚、哗啦啦、喵喵喵

      - 称呼学生为「宝贝」或「小可爱」'
    goal: '- 通过游戏和动作让小朋友参与进来

      - 把每个知识点变成一个可以动手做的小任务

      - 让小朋友觉得自己在"玩"而不是在"学"

      - 在提出互动指令后给小朋友充分的反应时间'
    workflow: '- 1. 夸张的打招呼（比如：小可爱～我们来玩一个超好玩的游戏！）

      - 2. 用身体动作引入要点（比如：来，跟老师一起拍拍手！）

      - 3. 慢慢讲出核心内容

      - 4. 击掌/跳舞/放烟花庆祝'
    scope: '- 每句话不超过10个字

      - 每章内容控制在2分钟内讲完

      - 不要连续讲超过3句话，中间留白让孩子跟上

      - 输出长度：2-3句，总共不超过50字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 给小熊送苹果
  skeleton:
  - text: 举起小手，学小熊走路，苹果送给小熊
    experience:
      primitive: match_pairs
      goal: 让小朋友通过拖拽动作理解一一对应：一只小熊配一个苹果
      prompt: 宝贝，把苹果拖到小熊面前吧！一只小熊吃一个苹果哦！
      props:
        pairs:
        - left: "🐻 小熊"
          right: "🍎 苹果"
        - left: "🐒 小猴"
          right: "🍌 香蕉"
  - text: 一只小熊一个苹果，不多不少刚刚好
    experience:
      primitive: match_pairs
      goal: 让小朋友巩固一一对应，一个不能多一个不能少
      prompt: 拖一拖，看看每个小熊是不是都有一个苹果呀？不够的补上，多出来的收走！
      props:
        pairs:
        - left: "🐻 小熊"
          right: "🍎 苹果"
        - left: "🐒 小猴"
          right: "🍌 香蕉"
  interaction:
    prompt: 学学给小熊送苹果：拿苹果，走一步，放下。
    expect_keywords:
    - 拿苹果
    - 走一步
    - 放下
- id: chapter_2
  title: 给小猴送香蕉
  skeleton:
  - text: 学小猴跳跳跳，一根香蕉一只小猴
    experience:
      primitive: match_pairs
      goal: 让小朋友通过配对练习理解一只小猴对应一根香蕉
      prompt: 跳跳跳，小猴子来啦！帮每一只小猴找到它的香蕉吧！
      props:
        pairs:
        - left: "🐒 小猴"
          right: "🍌 香蕉"
        - left: "🐻 小熊"
          right: "🍎 苹果"
  - text: 小猴拿香蕉，拍手转圈圈
    experience:
      primitive: match_pairs
      goal: 让小朋友通过配对巩固水果和动物的对应关系，并引入排队顺序概念
      prompt: 小动物们排排队领水果啦！谁排在前面谁先拿哦，帮它们连一连吧！
      props:
        pairs:
        - left: "🥇 排第一的小熊"
          right: "🍎 苹果"
        - left: "🥈 排第二的小猴"
          right: "🍌 香蕉"
  quiz:
    question: 小猴想吃香蕉，它排在谁后面？我们一起学小猴挠挠头想一想！🐒🤔
    options:
    - key: A
      text: 🐰 小兔子
      correct: true
    - key: B
      text: 🐘 大象
      correct: false
    - key: C
      text: 🐢 乌龟
      correct: false
    explanation_correct: 真棒！小兔排在小猴前面，所以小猴要等小兔拿完香蕉才能拿哦！
    explanation_wrong: 想一想，小猴个子小小，前面应该也是一个小小的动物。大象太大啦，乌龟太慢啦，再选一个吧！
- id: chapter_3
  title: 小动物排队领水果
  skeleton:
  - text: 小熊小猴排成队，苹果香蕉拖过去
    experience:
      primitive: match_pairs
      goal: 让小朋友综合运用配对和排队概念，按顺序为小动物分配水果
      prompt: 小动物们排好队啦！从第一只开始，帮它们找到自己的水果吧，一个一个来哦！
      props:
        pairs:
        - left: "🥇 小熊（第一个）"
          right: "🍎 苹果"
        - left: "🥈 小猴（第二个）"
          right: "🍌 香蕉"
  - text: 水果分光光，一起跳舞吧
    experience:
      primitive: match_pairs
      goal: 让小朋友配对动物和已分到的水果，检验一一对应理解
      prompt: 水果都分完啦！每个小动物手上拿着什么水果呀？帮它们配对吧！
      props:
        pairs:
        - left: "🐻 小熊"
          right: "🍎 苹果"
        - left: "🐒 小猴"
          right: "🍌 香蕉"
  interaction:
    prompt: 小动物排队领水果啦，我们学小兔子跳跳去拿胡萝卜吧！
    expect_keywords:
    - 排队
    - 领水果
    - 跳跳
    - 小熊
    - 小猴
    - 苹果
    - 香蕉
