course:
  title: 小小测试员大冒险
  lang: zh
  default_tts_speed: 0.85
  persona:
    name: 小思老师
    style: 动作和游戏主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.85
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向4-6岁幼儿园中大班小朋友的思维课老师

      - 教学策略：动作和游戏主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音夸张甜美，尾音上扬，像动画片里的角色

      - 语速很慢，每句话不超过10个字

      - 大量使用「哇！」「太棒了！」「击个掌！」「抱抱！」等情绪化表达

      - 多用叠词和拟声词：咚咚咚、哗啦啦、喵喵喵

      - 称呼学生为「宝贝」或「小可爱」'
    goal: '- 通过游戏和动作让小朋友参与进来

      - 把每个知识点变成一个可以动手做的小任务

      - 让小朋友觉得自己在"玩"而不是在"学"

      - 在提出互动指令后给小朋友充分的反应时间'
    workflow: '- 1. 夸张的打招呼（比如：小可爱～我们来玩一个超好玩的游戏！）

      - 2. 用身体动作引入要点（比如：来，跟老师一起拍拍手！）

      - 3. 慢慢讲出核心内容

      - 4. 击掌/跳舞/放烟花庆祝'
    scope: '- 每句话不超过10个字

      - 每章内容控制在2分钟内讲完

      - 不要连续讲超过3句话，中间留白让孩子跟上

      - 输出长度：2-3句，总共不超过50字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 测试是什么？
  skeleton:
  - text: 像小侦探一样，用眼睛看一看，发现隐藏的形状！
    experience:
      primitive: shape_guess
      goal: 通过视觉观察发现隐藏在场景中的基本形状，理解测试的第一步是用眼睛看
      prompt: 宝贝，仔细看一看屏幕上藏着什么形状？它是圆圆的、方方的还是三角的？
      props:
        reveal_mode: peek
        shapes:
        - name: 圆形
          hint: 圆圆的，像小太阳
          reveal_progress: 0.3
        - name: 三角形
          hint: 尖尖的，像小山峰
          reveal_progress: 0.6
  - text: 像小侦探一样，用耳朵听一听，猜出隐藏的声音！
    experience:
      primitive: shape_guess
      goal: 通过听觉线索判断隐藏的形状，理解测试也靠耳朵听
      prompt: 竖起小耳朵听一听，这个声音告诉你屏幕后面藏着什么形状？
      props:
        reveal_mode: listen
        shapes:
        - name: 圆形
          hint: 滚来滚去的声音，骨碌骨碌
          reveal_progress: 0.3
        - name: 三角形
          hint: 滴滴答答像小闹钟
          reveal_progress: 0.7
  interaction:
    prompt: 请和老师一起，先拍拍手，再说"测试"！
    expect_keywords:
    - 拍手
    - 测试
- id: chapter_2
  title: 我们来测试！
  skeleton:
  - text: 用眼睛测试颜色——红色可能是苹果，黄色可能是香蕉，看看屏幕露出了什么？
    experience:
      primitive: shape_guess
      goal: 通过颜色线索测试辨认隐藏的物品形状，理解用眼睛观察是测试方法
      prompt: 小测试员，看！屏幕上露出了一点点红色，猜猜这是什么形状？
      props:
        reveal_mode: color
        shapes:
        - name: 苹果
          hint: 红色的，圆圆的，吃起来甜甜的
          reveal_progress: 0.4
        - name: 香蕉
          hint: 黄色的，弯弯的，像月亮
          reveal_progress: 0.8
  - text: 用鼻子测试气味——香香的是花，臭臭的是垃圾，猜出形状后一起做动作！
    experience:
      primitive: shape_guess
      goal: 通过气味线索辨认隐藏物品，理解测试方法不止一种
      prompt: 闻一闻～这是什么味道？香香的还是臭臭的？觉得是花的拍拍手，觉得是垃圾的摇摇头！
      props:
        reveal_mode: smell
        shapes:
        - name: 鲜花
          hint: 香香的，五颜六色的，花瓣软软的
          reveal_progress: 0.5
        - name: 垃圾
          hint: 臭臭的，脏脏的
          reveal_progress: 0.9
  quiz:
    question: 测试员小明想检查一个玩具车是否结实，他应该做什么动作？一起做一做！
    options:
    - key: A
      text: 🔨 用手敲一敲，听听声音
      correct: true
    - key: B
      text: 🍔 把它吃掉，尝尝味道
      correct: false
    - key: C
      text: 👗 给它穿上小裙子
      correct: false
    explanation_correct: 🎉 太棒啦！测试员就是要用敲一敲、摸一摸的方法来检查东西结不结实，你做得真像个小小测试员！
    explanation_wrong: 🤔 嗯…小测试员的工作是检查东西，不是吃或打扮哦。试试用手敲一敲，听声音看看它结不结实吧！
- id: chapter_3
  title: 庆祝成功！
  skeleton:
  - text: 测试完成，击个掌，跳个舞，藏着的形状全部露出来啦！
    experience:
      primitive: shape_guess
      goal: 庆祝所有隐藏形状都被发现，强化测试完成后的成就感
      prompt: 哇！我们测试了好多东西，现在屏幕上藏着的东西全部露出来了！一起看看它们是什么？
      props:
        reveal_mode: full
        shapes:
        - name: 苹果
          hint: 红红的圆圆的
          reveal_progress: 1.0
        - name: 香蕉
          hint: 黄黄的弯弯的
          reveal_progress: 1.0
        - name: 鲜花
          hint: 五颜六色的
          reveal_progress: 1.0
  - text: 手臂放烟花：嗖嗖嗖，啪啪啪，满天小星星！
    experience:
      primitive: shape_guess
      goal: 通过肢体动作庆祝，结束课程
      prompt: 小测试员们，举起小手，和老师一起放烟花！嗖——啪——嘭！所有形状都找到啦！
      props:
        reveal_mode: celebrate
        shapes:
        - name: 星星
          hint: 一闪一闪亮晶晶
          reveal_progress: 1.0
  interaction:
    prompt: 我们成功了！请做一个你最喜欢的庆祝动作！
    expect_keywords:
    - 拍手
    - 跳跃
    - 欢呼
