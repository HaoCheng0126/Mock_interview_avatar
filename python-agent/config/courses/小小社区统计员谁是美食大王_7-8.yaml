course:
  title: 小小社区统计员：谁是美食大王？
  lang: zh
  default_tts_speed: 0.88
  persona:
    name: 小思老师
    style: 故事与线索主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.88
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向7-8岁小学低年级小朋友的思维课老师

      - 教学策略：故事与线索主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音温暖有力，像会讲故事的姐姐/哥哥

      - 语速适中，每句话不超过15个字

      - 多用角色化和情景化表达：「小侦探们」「队员们」「我们接到一个新任务！」

      - 做错时的鼓励话术：「差一点就猜对了，我们看看另一个线索？」

      - 称呼学生为「小侦探」或「小队员」'
    goal: '- 把讲课变成一次探险或破案任务

      - 让小朋友在故事中自然地学到知识点

      - 做错时给予成长型思维的鼓励，保护自尊心

      - 在提出思考问题后给小朋友留思考的时间'
    workflow: '- 1. 用故事情境开场（比如：小侦探们，今天接到一个新案子！）

      - 2. 在故事推进中自然引出要点

      - 3. 提出一个需要"破案"的思考问题

      - 4. 不管答案如何都先肯定，然后引导思考'
    scope: '- 每句话不超过15个字

      - 每个要点展开成3-4句

      - 不要输出任何括号注释或舞台指导

      - 输出长度：3-4句，总共不超过80字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 收到神秘委托！
  skeleton:
  - text: 小动物社区发来委托：想知道哪种食物最受欢迎？队长派你当统计员！
    experience:
      primitive: bar_chart
      goal: 让小朋友理解统计调查的起点是收集数据
      prompt: 小侦探们，森林社区想知道谁是最受欢迎的美食明星，我们一起数一数投票箱里的票数吧！
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: ""
  - text: 我们一起去森林食堂，数数小兔子、小松鼠和小猫分别喜欢什么食物。
    experience:
      primitive: bar_chart
      goal: 让小朋友动手数每一类食物的得票数量
      prompt: 数一数每种食物下面有多少票，记住这些数字它们就是我们的调查线索！
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: ""
  - text: 把数字记下来：胡萝卜5个、坚果7个、小鱼干3个——这是我们的原始线索！
    experience:
      primitive: bar_chart
      goal: 让小朋友记录原始投票数据
      prompt: 小侦探们，把每种食物的票数记在心里，这些数字就是破案的关键线索哦！
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: ""
  interaction:
    prompt: 如果你是小小统计员，收到神秘委托后，你会先从哪里开始调查？
    expect_keywords:
    - 统计
    - 调查
    - 问卷
    - 数据
- id: chapter_2
  title: 涂格子，画线索！
  skeleton:
  - text: 拿出我们的神奇格子纸，每种食物一种颜色，像搭积木一样往上涂。
    experience:
      primitive: bar_chart
      goal: 让小朋友理解柱状图中每个柱子代表一类食物
      prompt: 每种食物有不同颜色的柱子，看看萝卜、坚果和小鱼干的柱子分别是什么颜色的？
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: ""
  - text: 胡萝卜涂5格，坚果涂7格，小鱼干涂3格——格子越高，代表越受欢迎。
    experience:
      primitive: bar_chart
      goal: 让小朋友理解柱子的高度对应得票数
      prompt: 看看每一根柱子有多高，数一数每根柱子的格子数，你发现了什么？
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: max
  - text: 注意啦！如果格子涂歪了，没关系，那是我们发现了"新形状线索"！
    experience:
      primitive: bar_chart
      goal: 让小朋友通过对比柱子高度找出最高者
      prompt: 仔细看看这三根柱子，哪一根最高？点击「找最高」按钮验证你的答案吧！
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: max
  quiz:
    question: 小侦探在统计社区美食大王的投票，每张纸条上的格子数代表一种美食的得票数。请找出得票最多的美食。
    options:
    - key: A
      text: 披萨（5个格子）
      correct: true
    - key: B
      text: 汉堡（4个格子）
      correct: false
    - key: C
      text: 冰淇淋（3个格子）
      correct: false
    explanation_correct: 太棒了！你数对了每个美食的格子数，披萨的格子最多，所以它是得票最多的美食大王！
    explanation_wrong: 别灰心！再仔细数一数每个格子，注意不要漏数或多数哦。披萨有5格，汉堡有4格，冰淇淋有3格，所以披萨最多。下次你一定能数对！
- id: chapter_3
  title: 美食大王揭晓！
  skeleton:
  - text: 看看柱状图，最高的柱子是谁？是坚果！小松鼠的最爱成了社区明星。
    experience:
      primitive: bar_chart
      goal: 让小朋友从柱状图中读出最高柱子所代表的食物
      prompt: 最高的那根柱子是谁呀？它得到了几票？点击「找最高」让答案亮起来吧！
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: max
  - text: 一起数数每个柱子的格子数，验证我们的发现——坚果7格最高！
    experience:
      primitive: bar_chart
      goal: 让小朋友通过数格子验证柱状图结论
      prompt: 坚果的柱子有7格，胡萝卜5格，小鱼干3格，坚果果然是最高的，我们一起来验证一下吧！
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: max
  - text: 我们写报告给社区：美食大王是坚果，下次派对多准备些！
    experience:
      primitive: bar_chart
      goal: 让小朋友用柱状图的结果做出最终结论
      prompt: 美食大王已经揭晓了！坚果得到了7票，是最受欢迎的美食，请你宣布这个好消息吧！
      props:
        bars:
        - label: "🥕 胡萝卜"
          value: 5
        - label: "🥜 坚果"
          value: 7
        - label: "🐟 小鱼干"
          value: 3
        highlight: max
  interaction:
    prompt: 如果你是小侦探，你会用什么办法揭晓谁是美食大王？
    expect_keywords:
    - 调查
    - 线索
    - 投票
