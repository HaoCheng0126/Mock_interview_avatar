course:
  title: 小树长高了
  lang: zh
  default_tts_speed: 0.85
  persona:
    name: 小思老师
    style: 动作和游戏主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.85
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向4-6岁幼儿园中大班小朋友的思维课老师

      - 教学策略：动作和游戏主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音夸张甜美，尾音上扬，像动画片里的角色

      - 语速很慢，每句话不超过10个字

      - 大量使用「哇！」「太棒了！」「击个掌！」「抱抱！」等情绪化表达

      - 多用叠词和拟声词：咚咚咚、哗啦啦、喵喵喵

      - 称呼学生为「宝贝」或「小可爱」'
    goal: '- 通过游戏和动作让小朋友参与进来

      - 把每个知识点变成一个可以动手做的小任务

      - 让小朋友觉得自己在"玩"而不是在"学"

      - 在提出互动指令后给小朋友充分的反应时间'
    workflow: '- 1. 夸张的打招呼（比如：小可爱～我们来玩一个超好玩的游戏！）

      - 2. 用身体动作引入要点（比如：来，跟老师一起拍拍手！）

      - 3. 慢慢讲出核心内容

      - 4. 击掌/跳舞/放烟花庆祝'
    scope: '- 每句话不超过10个字

      - 每章内容控制在2分钟内讲完

      - 不要连续讲超过3句话，中间留白让孩子跟上

      - 输出长度：2-3句，总共不超过50字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 小树苗扭一扭
  skeleton:
  - text: 蹲下当小种子，听音乐慢慢站起来，像小树发芽
    experience:
      primitive: sort_order
      mode: sort
      goal: 感受从小到大的生长过程
      title: 小树苗长大啦
      prompt: 把三棵小树按从矮到高排排队，看看谁最矮谁最高
      props:
        sortBy: value
        direction: asc
        items:
        - {label: "🌱 小树苗", value: 1}
        - {label: "🌿 小树", value: 2}
        - {label: "🌳 大树", value: 3}
  - text: 老师喊"长高"，小朋友踮脚尖举手，比比谁更高
    experience:
      primitive: sort_order
      mode: sort
      goal: 通过动作对比高矮
      title: 比比谁更高
      prompt: 用手指一指，哪棵小树最高？
      props:
        sortBy: value
        direction: asc
        items:
        - {label: "🌱 小树苗", value: 1}
        - {label: "🌿 小树", value: 2}
        - {label: "🌳 大树", value: 3}
  interaction:
    prompt: 小树苗在风中怎么扭？大家跟着老师一起扭一扭！
    expect_keywords:
    - 扭
    - 扭动
- id: chapter_2
  title: 三棵树排排队
  skeleton:
  - text: 拿出三棵不同高的小树模型，从矮到高排成小火车
    experience:
      primitive: sort_order
      mode: sort
      goal: 把三棵树按高度排序
      title: 三棵小树排排队
      prompt: 把小树苗、小树、大树按从矮到高的顺序排好
      props:
        sortBy: value
        direction: asc
        items:
        - {label: "🌱 小树苗", value: 1}
        - {label: "🌿 小树", value: 2}
        - {label: "🌳 大树", value: 3}
  - text: 小朋友学小树弯腰，按高矮顺序摸树顶，说"矮-中-高"
    experience:
      primitive: sort_order
      mode: sort
      goal: 用身体动作记住高矮顺序
      title: 摸一摸小树顶
      prompt: 按从矮到高的顺序，先摸最矮的，再摸中间的，最后摸最高的
      props:
        sortBy: value
        direction: asc
        items:
        - {label: "🌱 小树苗", value: 1}
        - {label: "🌿 小树", value: 2}
        - {label: "🌳 大树", value: 3}
  quiz:
    question: 小朋友们，三棵小树在排队！看看哪棵树最高？我们一起学它们的样子，比划一下！
    options:
    - key: A
      text: 🌳高高的小树（双手举高高）
      correct: true
    - key: B
      text: 🍃矮矮的小草（蹲下来摸地）
      correct: false
    - key: C
      text: 🏠大大的房子（双手张开做屋顶）
      correct: false
    explanation_correct: 哇！你找到了最高的树！高高的小树像小朋友举着手，真棒！🌳👍
    explanation_wrong: 再想一想哦，小草🌿和房子🏠都不是树呢！最高的小树要双手举高高～🌳
  interaction:
    prompt: 小朋友们，用手比出三棵树，然后按从矮到高排排队！
    expect_keywords:
    - 三棵树
    - 排排队
    - 从矮到高
- id: chapter_3
  title: 贴上号码飞飞飞
  skeleton:
  - text: 给三棵树贴号码：1号矮，2号中等，3号高，像小朋友穿衣服
    experience:
      primitive: sort_order
      mode: sort
      goal: 用数字标记高矮顺序
      title: 给小树贴号码
      prompt: 把号码1贴给最矮的小树苗，号码2贴给中间的小树，号码3贴给最高的大树
      props:
        sortBy: value
        direction: asc
        items:
        - {label: "🌱 小树苗", value: 1}
        - {label: "🌿 小树", value: 2}
        - {label: "🌳 大树", value: 3}
  - text: 一起跳舞放烟花，每棵树长高一次就击掌庆祝
    experience:
      primitive: sort_order
      mode: sort
      goal: 用动作为排序成果庆祝
      title: 小树长高啦
      prompt: 按照1、2、3的顺序，每棵小树长高一次，我们就击掌一次！
      props:
        sortBy: value
        direction: asc
        items:
        - {label: "🌱 小树苗", value: 1}
        - {label: "🌿 小树", value: 2}
        - {label: "🌳 大树", value: 3}
  interaction:
    prompt: 我们给小树贴上号码吧！找到数字4，贴上去，然后拍四次手！
    expect_keywords:
    - '4'
    - 拍手
