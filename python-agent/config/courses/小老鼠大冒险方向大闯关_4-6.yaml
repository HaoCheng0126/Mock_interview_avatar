course:
  title: 小老鼠大冒险：方向大闯关
  lang: zh
  default_tts_speed: 0.85
  persona:
    name: 小思老师
    style: 动作和游戏主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.85
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向4-6岁幼儿园中大班小朋友的思维课老师

      - 教学策略：动作和游戏主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音夸张甜美，尾音上扬，像动画片里的角色

      - 语速很慢，每句话不超过10个字

      - 大量使用「哇！」「太棒了！」「击个掌！」「抱抱！」等情绪化表达

      - 多用叠词和拟声词：咚咚咚、哗啦啦、喵喵喵

      - 称呼学生为「宝贝」或「小可爱」'
    goal: '- 通过游戏和动作让小朋友参与进来

      - 把每个知识点变成一个可以动手做的小任务

      - 让小朋友觉得自己在"玩"而不是在"学"

      - 在提出互动指令后给小朋友充分的反应时间'
    workflow: '- 1. 夸张的打招呼（比如：小可爱～我们来玩一个超好玩的游戏！）

      - 2. 用身体动作引入要点（比如：来，跟老师一起拍拍手！）

      - 3. 慢慢讲出核心内容

      - 4. 击掌/跳舞/放烟花庆祝'
    scope: '- 每句话不超过10个字

      - 每章内容控制在2分钟内讲完

      - 不要连续讲超过3句话，中间留白让孩子跟上

      - 输出长度：2-3句，总共不超过50字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 认识箭头小精灵
  skeleton:
  - text: 向上箭头是飞飞，我们跳起来学它；向下箭头是蹲蹲，我们学它蹲下去。
    experience:
      primitive: grid_explorer
      mode: free
      goal: 让小朋友认识上下箭头方向
      prompt: 宝贝，跟着箭头飞飞和蹲蹲一起跳起来吧！看看箭头指向哪里呀？
      props:
        gridSize: 5
        start: [2, 0]
        end: [2, 4]
        obstacles: []
  - text: 向左箭头是扭扭，小屁股向左扭；向右箭头是摆摆，小手向右摆一摆。
    experience:
      primitive: grid_explorer
      mode: free
      goal: 让小朋友认识左右箭头方向
      prompt: 小可爱，跟扭扭和摆摆一起扭一扭！看看箭头指向哪边？
      props:
        gridSize: 5
        start: [2, 0]
        end: [2, 4]
        obstacles: []
  interaction:
    prompt: 请跟老师一起，把小手变成箭头，指一指上面！
    expect_keywords:
    - 指
    - 上面
- id: chapter_2
  title: 给小老鼠指路
  skeleton:
  - text: 小老鼠要去找奶酪，点击正确箭头它才走。
    experience:
      primitive: grid_explorer
      mode: free
      goal: 让小朋友用方向箭头帮助小老鼠走向奶酪
      prompt: 宝贝，小老鼠想去找奶酪，快用箭头帮它指路吧！先往上还是往右走？
      props:
        gridSize: 5
        start: [2, 0]
        end: [2, 4]
        obstacles: []
  - text: 看到小猫要绕开，点错方向会被抓哦！
    experience:
      primitive: grid_explorer
      mode: free
      goal: 让小朋友学会避开障碍物，用正确方向引导小老鼠
      prompt: 哎呀，前面有只大花猫挡住了路！宝贝快帮小老鼠绕开小猫，找到去奶酪的路！
      props:
        gridSize: 5
        start: [2, 0]
        end: [2, 4]
        obstacles: [[1, 2], [3, 2]]
  quiz:
    question: 小老鼠要去找奶酪🧀，它应该往哪个方向走？大家一起做动作！
    options:
    - key: A
      text: 向前走🚶
      correct: true
    - key: B
      text: 向后走🔙
      correct: false
    - key: C
      text: 向上跳🦘
      correct: false
    explanation_correct: 太棒啦！小老鼠向前走就找到奶酪啦！你的方向感真强！👏
    explanation_wrong: 哎呀，再想想！小老鼠要找奶酪，应该向前走而不是向后或跳哦。试试向前指一指！👍
- id: chapter_3
  title: 勇闯迷宫吃奶酪
  skeleton:
  - text: 想想先走哪条路？点一点箭头帮小老鼠。
    experience:
      primitive: grid_explorer
      mode: free
      goal: 让小朋友规划路线，用方向箭头在迷宫中引导小老鼠
      prompt: 小老鼠面前有好几条路！宝贝动动小脑袋，想一想先按哪个箭头才能帮小老鼠走向奶酪？
      props:
        gridSize: 5
        start: [2, 0]
        end: [2, 4]
        obstacles: [[1, 2], [3, 2]]
  - text: 吃到奶酪跳个舞，一起来放小烟花！
    experience:
      primitive: grid_explorer
      mode: free
      goal: 让小朋友完成完整的迷宫导航体验
      prompt: 太棒啦！小老鼠马上就要吃到奶酪啦！再点几个箭头，送它最后一程吧！
      props:
        gridSize: 5
        start: [2, 0]
        end: [2, 4]
        obstacles: [[1, 2], [3, 2]]
  interaction:
    prompt: 小老鼠想吃到奶酪，请用手指指向左边的路！
    expect_keywords:
    - 左边
    - 左
