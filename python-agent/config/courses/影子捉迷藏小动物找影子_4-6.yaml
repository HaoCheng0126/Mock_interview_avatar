course:
  title: 影子捉迷藏｜小动物找影子
  lang: zh
  default_tts_speed: 0.85
  persona:
    name: 小思老师
    style: 动作和游戏主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.85
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向4-6岁幼儿园中大班小朋友的思维课老师

      - 教学策略：动作和游戏主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音夸张甜美，尾音上扬，像动画片里的角色

      - 语速很慢，每句话不超过10个字

      - 大量使用「哇！」「太棒了！」「击个掌！」「抱抱！」等情绪化表达

      - 多用叠词和拟声词：咚咚咚、哗啦啦、喵喵喵

      - 称呼学生为「宝贝」或「小可爱」'
    goal: '- 通过游戏和动作让小朋友参与进来

      - 把每个知识点变成一个可以动手做的小任务

      - 让小朋友觉得自己在"玩"而不是在"学"

      - 在提出互动指令后给小朋友充分的反应时间'
    workflow: '- 1. 夸张的打招呼（比如：小可爱～我们来玩一个超好玩的游戏！）

      - 2. 用身体动作引入要点（比如：来，跟老师一起拍拍手！）

      - 3. 慢慢讲出核心内容

      - 4. 击掌/跳舞/放烟花庆祝'
    scope: '- 每句话不超过10个字

      - 每章内容控制在2分钟内讲完

      - 不要连续讲超过3句话，中间留白让孩子跟上

      - 输出长度：2-3句，总共不超过50字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 拍拍手，影子来啦
  skeleton:
  - text: 小手拍一拍，影子跳出来！像小兔蹦跳
    experience:
      primitive: match_pairs
      goal: 让小朋友通过拍拍手理解影子会跟着动作变化
      prompt: 宝贝，拍拍你的小手，看看哪只小动物的影子也在跳舞呀？
      props:
        pairs:
        - left: "👋 拍手"
          right: "⬛ 拍手影子"
        - left: "🐰 小兔蹦跳"
          right: "⬛ 小兔影子"
  - text: 影子黑乎乎，跟着你动，像小尾巴
    experience:
      primitive: match_pairs
      goal: 让小朋友感受影子跟随动作的特性
      prompt: 小可爱，动一动你的小手和小脚，把它们的影子连起来吧！
      props:
        pairs:
        - left: "🖐️ 小手"
          right: "⬛ 小手影子"
        - left: "🦶 小脚"
          right: "⬛ 小脚影子"
  interaction:
    prompt: 拍拍小手，看看影子在做什么？
    expect_keywords:
    - 拍手
    - 影子
- id: chapter_2
  title: 连线小达人：谁是谁的影子？
  skeleton:
  - text: 小狗和小猫，它们的影子长啥样？仔细看
    experience:
      primitive: match_pairs
      goal: 让小朋友观察动物和影子的形状对应关系
      prompt: 仔细看一看，左边的小动物和右边的影子，谁是谁的呢？把它们连起来吧！
      props:
        pairs:
        - left: "🐱 小猫"
          right: "⬛ 小猫影子"
        - left: "🐶 小狗"
          right: "⬛ 小狗影子"
  - text: 用彩色线把动物和影子连起来，比一比
    experience:
      primitive: match_pairs
      goal: 让小朋友动手匹配更多动物和它们的影子
      prompt: 拿起彩色线，帮小动物们找到它们的影子朋友吧！连一连，看看谁最快！
      props:
        pairs:
        - left: "🐔 小鸡"
          right: "⬛ 小鸡影子"
        - left: "🐟 小鱼"
          right: "⬛ 小鱼影子"
  quiz:
    question: 喵喵喵，我是小猫咪🐱，我的影子是哪一个呢？
    options:
    - key: A
      text: 黑色的猫咪形状 🐱⬛
      correct: true
    - key: B
      text: 红色的皮球 🏀
      correct: false
    - key: C
      text: 蓝色的小鱼 🐟
      correct: false
    explanation_correct: 太棒啦！小猫咪的影子就是黑色的小猫咪形状，你找到啦！🎉
    explanation_wrong: 哎呀，小猫咪的影子是黑色的猫咪形状哦，再想一想吧！🐱
- id: chapter_3
  title: 小手变影子，一起跳舞
  skeleton:
  - text: 手影变小鸟，和它的影子配对，飞飞飞
    experience:
      primitive: match_pairs
      goal: 让小朋友理解手势可以创造不同形状的影子
      prompt: 用你的小手变出一只小鸟，然后在右边找到小鸟的影子，连起来一起飞飞飞！
      props:
        pairs:
        - left: "🐦 小鸟手影"
          right: "⬛ 小鸟影子"
        - left: "🦋 蝴蝶手影"
          right: "⬛ 蝴蝶影子"
  - text: 和小朋友一起摆造型，影子也跳舞
    experience:
      primitive: match_pairs
      goal: 让小朋友通过摆造型感受影子游戏的乐趣
      prompt: 小可爱，看看左边的手影造型，在右边找到它的影子，一起跳舞吧！
      props:
        pairs:
        - left: "🐰 小兔手影"
          right: "⬛ 小兔影子"
        - left: "🐶 小狗手影"
          right: "⬛ 小狗影子"
  interaction:
    prompt: 请用你的小手变出一个动物影子，然后让它跳舞！
    expect_keywords:
    - 小鸟
    - 小狗
    - 小兔
    - 蝴蝶
