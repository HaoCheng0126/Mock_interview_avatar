course:
  title: 怪兽镜子大冒险
  lang: zh
  default_tts_speed: 0.88
  persona:
    name: 小思老师
    style: 故事与线索主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.88
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向7-8岁小学低年级小朋友的思维课老师

      - 教学策略：故事与线索主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音温暖有力，像会讲故事的姐姐/哥哥

      - 语速适中，每句话不超过15个字

      - 多用角色化和情景化表达：「小侦探们」「队员们」「我们接到一个新任务！」

      - 做错时的鼓励话术：「差一点就猜对了，我们看看另一个线索？」

      - 称呼学生为「小侦探」或「小队员」'
    goal: '- 把讲课变成一次探险或破案任务

      - 让小朋友在故事中自然地学到知识点

      - 做错时给予成长型思维的鼓励，保护自尊心

      - 在提出思考问题后给小朋友留思考的时间'
    workflow: '- 1. 用故事情境开场（比如：小侦探们，今天接到一个新案子！）

      - 2. 在故事推进中自然引出要点

      - 3. 提出一个需要"破案"的思考问题

      - 4. 不管答案如何都先肯定，然后引导思考'
    scope: '- 每句话不超过15个字

      - 每个要点展开成3-4句

      - 不要输出任何括号注释或舞台指导

      - 输出长度：3-4句，总共不超过80字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 镜子里的怪兽是谁？
  skeleton:
  - text: 队长带我们来到一面奇怪的大镜子前，镜子里有个和自己一模一样的怪兽，但举的是另一只手！
    experience:
      primitive: mirror_transform
      goal: 观察镜子里的怪兽会左右相反
      prompt: 先看看真实怪兽和镜子怪兽哪里不一样。
      props:
        action: intro
        hand: right
        star: left
  - text: 我们试着挥动右手，镜子里怪兽挥动左手，原来镜子里的动作是相反的。
    experience:
      primitive: mirror_transform
      goal: 操作验证左右相反
      prompt: 点“举左手”或“举右手”，观察镜子里的手。
      props:
        action: hand_flip
        hand: right
        star: left
  - text: 发现一个新线索：镜子里的世界是左右颠倒的，就像照镜子一样。
    experience:
      primitive: mirror_transform
      goal: 总结镜像左右颠倒规则
      prompt: 把星星换边，看看镜子里会跑到哪边。
      props:
        action: star_flip
        hand: right
        star: left
  interaction:
    prompt: 如果你是小侦探，你会用什么办法发现镜子里的怪兽是谁？
    expect_keywords:
    - 镜子
    - 怪兽
    - 办法
    - 发现
- id: chapter_2
  title: 寻找对称的宝藏
  skeleton:
  - text: 镜子怪兽告诉我们，它的世界是轴对称的，就像蝴蝶的翅膀，左右一模一样但方向相反。
    experience:
      primitive: mirror_transform
      goal: 发现对称图形左右对应
      prompt: 观察星星和手在镜子里怎样对应。
      props:
        action: star_flip
        hand: left
        star: right
  - text: 我们来找对称图形：剪纸对折后打开，两边完全一样，这就是轴对称。
    experience:
      primitive: cut_fold_unfold
      goal: 理解对折后两边完全一样
      prompt: 先看折起来的一半，再展开看看完整图形。
      props:
        shape: heart
        open: false
  - text: 猜一猜：把字母A放在镜子前，镜子里会是什么？亲手试一下。
    experience:
      primitive: mirror_transform
      goal: 用镜子预测图形变化
      prompt: 先预测，再点按钮验证镜像变化。
      props:
        mode: letter
        letter: A
  quiz:
    question: 小探险家，你在镜子里看到一只怪兽，它的左边有个星星图案。哪一面镜子里的怪兽和它是对称的？
    options:
    - key: A
      text: 左图：怪兽左边有星星
      correct: true
    - key: B
      text: 右图：怪兽右边有星星
      correct: false
    - key: C
      text: 右图：怪兽头上有星星
      correct: false
    explanation_correct: 太棒了！镜子里左右是相反的，所以左边的星星在镜子里会跑到右边，你找到了对称的秘密！
    explanation_wrong: 别着急，想想看：你站在镜子前，左手拿球，镜子里是哪只手拿球？对，是右手。所以星星在左边，镜子里应该在右边。再试一次，你一定能找到！
  interaction:
    prompt: 如果你是小探险家，你会怎么利用镜子找到对称的宝藏？
    expect_keywords:
    - 对称
    - 镜子
    - 宝藏
- id: chapter_3
  title: 剪纸魔法师
  skeleton:
  - text: 队长拿出一个剪纸，沿中间对折剪开，打开后变成两个对称的怪兽！
    experience:
      primitive: cut_fold_unfold
      goal: 体验对折剪开会得到对称图形
      prompt: 点击展开，看看一半剪纸怎样变成完整图形。
      props:
        shape: monster
        open: false
  - text: 你自己试着剪一个简单形状，比如心形，对折后剪掉一半再打开，看看是不是完整的心？
    experience:
      primitive: cut_fold_unfold
      goal: 用心形练习对折剪纸
      prompt: 选择心形或星星，再展开看看结果。
      props:
        shape: heart
        open: false
  - text: 哇！原来轴对称就像镜子魔法，让图形变得完美对称。
    experience:
      primitive: cut_fold_unfold
      goal: 总结轴对称像镜子魔法
      prompt: 重新折起再展开，复习对称魔法。
      props:
        shape: star
        open: true
  interaction:
    prompt: 如果你是小小剪纸魔法师，你会剪出什么来对付镜子里的怪兽？
    expect_keywords:
    - 剪刀
    - 剪纸
    - 怪兽
    - 镜子
    - 魔法
