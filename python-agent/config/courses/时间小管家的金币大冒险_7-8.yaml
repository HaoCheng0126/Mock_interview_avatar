course:
  title: 时间小管家的金币大冒险
  lang: zh
  default_tts_speed: 0.88
  persona:
    name: 小思老师
    style: 故事与线索主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.88
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向7-8岁小学低年级小朋友的思维课老师

      - 教学策略：故事与线索主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音温暖有力，像会讲故事的姐姐/哥哥

      - 语速适中，每句话不超过15个字

      - 多用角色化和情景化表达：「小侦探们」「队员们」「我们接到一个新任务！」

      - 做错时的鼓励话术：「差一点就猜对了，我们看看另一个线索？」

      - 称呼学生为「小侦探」或「小队员」'
    goal: '- 把讲课变成一次探险或破案任务

      - 让小朋友在故事中自然地学到知识点

      - 做错时给予成长型思维的鼓励，保护自尊心

      - 在提出思考问题后给小朋友留思考的时间'
    workflow: '- 1. 用故事情境开场（比如：小侦探们，今天接到一个新案子！）

      - 2. 在故事推进中自然引出要点

      - 3. 提出一个需要"破案"的思考问题

      - 4. 不管答案如何都先肯定，然后引导思考'
    scope: '- 每句话不超过15个字

      - 每个要点展开成3-4句

      - 不要输出任何括号注释或舞台指导

      - 输出长度：3-4句，总共不超过80字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 神秘的金币任务
  skeleton:
  - text: 时间侦探接到一个紧急任务：小主人要在30分钟内完成写作业、烧水、听英语三件事，可时间根本不够用，侦探需要小助手们一起调查！
    experience:
      primitive: time_scheduler
      goal: 认识任务清单和时间限制
      prompt: 看看这三件事各需要多少时间，总共有多少分钟。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: schedule
  - text: 小助手们认真调查：写作业的时候自己坐着，烧水的时候水壶在厨房自己烧，听英语的时候要安静坐着听。这三件事里，哪些可以同时做而不受影响？
    experience:
      primitive: time_scheduler
      goal: 区分可以并行和必须串行的任务
      prompt: 先拖一张卡片到时间线上，再想想能不能同时做另一件事。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: schedule
  - text: 小助手们动手摆一摆卡片，看看哪种顺序花的时间最少？每发现一种新顺序，就找到了一条新线索哦！先试试按顺序一件一件来做需要多久。
    experience:
      primitive: time_scheduler
      goal: 尝试串行安排观察总时间
      prompt: 把所有任务按顺序排好，看看串行完成需要多少分钟。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: schedule
  interaction:
    prompt: 如果你是时间小管家，发现金币不见了，你会先检查哪个时间线索？
    expect_keywords:
    - 时刻表
    - 闹钟
    - 日历
- id: chapter_2
  title: 发现"同步秘密"
  skeleton:
  - text: 侦探带领大家回顾刚才的尝试，发现最省时间的办法是：在烧水的时候写作业，这样烧水的10分钟就不会浪费啦！
    experience:
      primitive: time_scheduler
      goal: 发现并行执行减少总时间
      prompt: 点击"显示并行"，看看烧水时可以同时做什么。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: parallel
  - text: 原来，同时做两件不冲突的事情，就是"同步秘密"！就像一边听英语一边吃早餐，时间就变多了。看看我们的串行和并行对比。
    experience:
      primitive: time_scheduler
      goal: 理解并行与串行的区别
      prompt: 点击"显示串行"看顺序安排的总时间，再点击"显示并行"看同步安排的总时间，比比看。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: parallel
  - text: 现在来一个侦探小测验：如果半小时内要完成这三件事，用上同步秘密，最少需要多少分钟？选对的话就获得一枚时间金币！
    experience:
      primitive: time_scheduler
      goal: 用并行策略计算最短时间
      prompt: 在时间线上安排好所有任务，找出用同步秘密最少需要多少分钟。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: parallel
  quiz:
    question: 小管家想用"同步秘密"一次做两件事，哪一组是安全的？
    options:
    - key: A
      text: 一边过马路一边看书
      correct: false
    - key: B
      text: 一边刷牙一边听故事
      correct: true
    - key: C
      text: 一边写作业一边看电视
      correct: false
    explanation_correct: 你真棒！一边刷牙一边听故事就是安全的同步秘密，既节约时间又不分心。继续发现更多秘密吧！
    explanation_wrong: 这个选项好像对，但仔细想想，它可能会让我们分心或危险。没关系，再试试其他选项，勇敢思考就是进步！
- id: chapter_3
  title: 设计你的时间魔法阵
  skeleton:
  - text: 侦探说：我们已经掌握了同步魔法，现在要自己设计一个时间计划！写作业20分钟、烧水10分钟、听英语15分钟，怎么安排最省时？
    experience:
      primitive: time_scheduler
      goal: 自主设计时间安排方案
      prompt: 先拖入写作业，再想想烧水放在哪里能省时间，听英语放在哪里。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: schedule
  - text: 小助手们拿出自己的任务卡片试着摆一摆，把等待的时间变成做其他事的时间！看看谁的设计最聪明。
    experience:
      primitive: time_scheduler
      goal: 尝试不同排列找到最优解
      prompt: 换一种顺序试试看，能不能把总时间控制在30分钟以内？
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: schedule
  - text: 完成计划后互相展示自己的"时间魔法阵"，原来每件事都可以找到好伙伴一起做，这样就能赢得更多金币啦！
    experience:
      primitive: time_scheduler
      goal: 展示并行方案确认掌握
      prompt: 点击"显示并行"，确认你的时间魔法阵是否最大限度地用上了同步秘密。
      props:
        tasks:
        - label: 写作业
          duration: 20
          parallel: false
        - label: 烧水
          duration: 10
          parallel: true
        - label: 听英语
          duration: 15
          parallel: false
        timeline: 30
        mode: parallel
  interaction:
    prompt: 如果你是小魔法师，你会把什么时间任务放在魔法阵中心？
    expect_keywords:
    - 最重要
    - 作业
    - 玩耍
    - 吃饭
    - 睡觉
