course:
  title: 星星侦探破案记：密码破译墙
  lang: zh
  default_tts_speed: 0.88
  persona:
    name: 小思老师
    style: 故事与线索主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.88
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向7-8岁小学低年级小朋友的思维课老师

      - 教学策略：故事与线索主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音温暖有力，像会讲故事的姐姐/哥哥

      - 语速适中，每句话不超过15个字

      - 多用角色化和情景化表达：「小侦探们」「队员们」「我们接到一个新任务！」

      - 做错时的鼓励话术：「差一点就猜对了，我们看看另一个线索？」

      - 称呼学生为「小侦探」或「小队员」'
    goal: '- 把讲课变成一次探险或破案任务

      - 让小朋友在故事中自然地学到知识点

      - 做错时给予成长型思维的鼓励，保护自尊心

      - 在提出思考问题后给小朋友留思考的时间'
    workflow: '- 1. 用故事情境开场（比如：小侦探们，今天接到一个新案子！）

      - 2. 在故事推进中自然引出要点

      - 3. 提出一个需要"破案"的思考问题

      - 4. 不管答案如何都先肯定，然后引导思考'
    scope: '- 每句话不超过15个字

      - 每个要点展开成3-4句

      - 不要输出任何括号注释或舞台指导

      - 输出长度：3-4句，总共不超过80字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 神秘符号出现！
  skeleton:
  - text: 小侦探们在探险时发现一面会发光的墙，上面画着星星和月亮的符号。
    experience:
      primitive: logic_grid
      mode: equation
      goal: 发现墙上的符号，开启密码破译之旅
      prompt: 小侦探们，看这面墙上有两个星星符号和一个月亮符号，它们好像在告诉我们什么秘密！
      props:
        equations:
        - "⭐ + ⭐ = 6"
        - "🌙 + ⭐ = 8"
        - "⭐ + 🌙 + 🔺 = 12"
  - text: 墙上的神秘声音说：破译这些符号，你们就能找到宝藏！
    experience:
      primitive: logic_grid
      mode: equation
      goal: 激发破译动力，让小朋友明白任务目标
      prompt: 哇，听到神秘声音了吗？只要破解符号密码，宝藏就是我们的啦！
      props:
        equations:
        - "⭐ + ⭐ = 6"
        - "🌙 + ⭐ = 8"
        - "⭐ + 🌙 + 🔺 = 12"
  - text: 第一个线索：两颗星星加起来等于6，一颗星星等于多少呢？
    experience:
      primitive: logic_grid
      mode: equation
      goal: 解出星星的值，建立符号等式思维
      prompt: 小侦探们，两个星星加起来是6，那一个星星代表数字几呢？想好了告诉我！
      props:
        equations:
        - "⭐ + ⭐ = 6"
        solution: "⭐ = 3"
  interaction:
    prompt: 如果你是星星侦探，看到墙上突然出现的符号，你会先怎么做？
    expect_keywords:
    - 观察
    - 画下来
    - 拍照
    - 找线索
    - 记录
- id: chapter_2
  title: 月亮也来凑热闹
  skeleton:
  - text: 墙上出现了新符号——月亮！旁边写着：月亮加星星等于8。
    experience:
      primitive: logic_grid
      mode: equation
      goal: 引入第二个符号等式，发现新线索
      prompt: 快看，月亮符号也出现了！月亮加上星星等于8，我们已经知道星星是3，那月亮是多少呢？
      props:
        equations:
        - "⭐ + ⭐ = 6"
        - "🌙 + ⭐ = 8"
        solution: "⭐ = 3"
  - text: 我们已经知道星星是3，那么月亮是多少呢？用代换法试试！
    experience:
      primitive: logic_grid
      mode: equation
      goal: 用代换法算出月亮的值
      prompt: 小侦探们，把星星等于3代进去，月亮加3等于8，月亮应该是几呢？
      props:
        equations:
        - "🌙 + ⭐ = 8"
        solution: "⭐ = 3，🌙 = 5"
  - text: 小侦探们，快来算一算：月亮加月亮等于多少？
    experience:
      primitive: logic_grid
      mode: equation
      goal: 巩固代换思维，用已知值推算出结果
      prompt: 太棒了，月亮是5！那现在我们来算一算：月亮加月亮等于几？
      props:
        equations:
        - "🌙 + 🌙 = ?"
        solution: "🌙 = 5，5 + 5 = 10"
  quiz:
    question: 小侦探们，月亮也来凑热闹了！它在密码墙上投下影子，露出了两个月亮符号：第一个是圆圆胖胖的满月，第二个是弯弯细细的新月。密码破译本上写着：🌕=0，🌑=1。这两个月亮组成的密码是什么呢？
    options:
    - key: A
      text: 0 1
      correct: true
    - key: B
      text: 1 0
      correct: false
    - key: C
      text: 1 1
      correct: false
    explanation_correct: 太棒了！你像月亮一样明亮！满月是0，新月是1，所以第一个满月是0，第二个新月是1，密码就是0 1。你成功破解了月亮带来的线索！
    explanation_wrong: 哎呀，差一点点！你仔细看看，第一个是满月（🌕=0），第二个是新月（🌑=1）。顺序很重要哦，就像月亮从圆到缺，密码也要按顺序读。再试一次，你一定可以！
- id: chapter_3
  title: 终极密码大揭秘
  skeleton:
  - text: 最后一道谜题：星星加月亮加三角形等于12，三角形是多少？
    experience:
      primitive: logic_grid
      mode: equation
      goal: 引入第三个符号，用已知值代换解出三角形
      prompt: 终极密码来了！星星加月亮加三角形等于12。我们已经知道星星是3，月亮是5，那三角形是几呢？
      props:
        equations:
        - "⭐ + 🌙 + 🔺 = 12"
        solution: "⭐ = 3，🌙 = 5"
  - text: 用前面的结果一步步代换，就能找到三角形数字。
    experience:
      primitive: logic_grid
      mode: equation
      goal: 引导小朋友用代换法计算出三角形
      prompt: 小侦探们，把3和5代进去，3加5加三角形等于12，想想看三角形是几？动动小脑瓜！
      props:
        equations:
        - "⭐ + 🌙 + 🔺 = 12"
        solution: "3 + 5 + 🔺 = 12，🔺 = 4"
  - text: 破译成功！墙后藏着智慧宝石，恭喜小侦探们！
    experience:
      primitive: logic_grid
      mode: equation
      goal: 庆祝破译成功，回顾整个符号等式推理过程
      prompt: 哇！三角形是4！所有密码都破译了！我们成功找到了智慧宝石！你们是最棒的小侦探！
      props:
        equations:
        - "⭐ + 🌙 + 🔺 = 12"
        solution: "⭐ = 3，🌙 = 5，🔺 = 4"
  interaction:
    prompt: 如果你是星星侦探，看到墙上这串神秘符号，你会先尝试用哪种方法解开它？
    expect_keywords:
    - 观察规律
    - 试试数字
    - 找参考书
    - 问朋友
