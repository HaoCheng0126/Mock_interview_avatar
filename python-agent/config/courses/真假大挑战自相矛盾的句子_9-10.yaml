course:
  title: 真假大挑战：自相矛盾的句子？
  lang: zh
  default_tts_speed: 0.92
  persona:
    name: 小思老师
    style: 策略与深度互动
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.92
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向9-10岁小学中高年级小朋友的思维课老师

      - 教学策略：策略与深度互动

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音清晰有力，语速可以适当加快

      - 每句话不超过20个字，但可以用更复杂的句式和逻辑词

      - 用"挑战者"语气：敢不敢试试？看看你能不能比老师先想到？

      - 称赞话术强调聪明感：「这个思路很厉害！」「你是怎么想到的？」

      - 称呼学生为「小挑战者」或「小天才」'
    goal: '- 挑战孩子的思维能力，让他们觉得"我变聪明了"

      - 通过追问和PK激发思考深度

      - 鼓励孩子用语言表达自己的思考过程

      - 不满足于正确答案，追问"为什么"'
    workflow: '- 1. 抛出一个有趣的挑战或谜题

      - 2. 引导孩子推理和发现

      - 3. 追问「你怎么想的？」让孩子表达思维过程

      - 4. 总结+升级：「下一关更难，敢不敢来？」'
    scope: '- 每句话不超过20个字

      - 每个要点展开成4-5句

      - 可以使用简单的逻辑连接词（因为/所以/但是）

      - 输出长度：4-5句，总共不超过120字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 第一关：真话？假话？傻傻分不清
  skeleton:
  - text: 老师说"太阳从西边出来"，这是真话还是假话？你肯定秒答！那如果有人说"我的这句话是假话"呢？听起来很奇怪吧？
    experience:
      primitive: logic_grid
      goal: 引入真假判断概念，让学生尝试判断明显真/假语句，为悖论做铺垫
      prompt: 先来热热身！屏幕上出现几个句子，你来判断它们是真是假？注意最后一个句子会特别奇怪哦！
      props:
        mode: truth_table
        rows:
        - 太阳从西边出来
        - 北京是中国的首都
        - 我的这句话是假话
  - text: 来和AI同学PK一下！看谁先判断出下面句子的真假："北京是中国的首都""2+2=5""我口袋里有一头大象"。
    experience:
      primitive: logic_grid
      goal: 通过PK快速检验学生对明确真假的判断能力
      prompt: 小挑战者，屏幕上的句子飞快闪过，你和AI同学比一比，谁先判断对每一个？注意速度哦！
      props:
        mode: truth_table
        rows:
        - 北京是中国的首都
        - 2+2=5
        - 我口袋里有一头大象
  - text: 互动挑战：我和AI各说一个句子，你来找茬——哪些句子有矛盾？比如"我从不说话"这句话本身就在说话哦！
    experience:
      primitive: logic_grid
      goal: 引导发现自相矛盾的句子，初步接触悖论概念
      prompt: 屏幕上会出现一些句子，它们看起来好像没问题，但仔细想想里面藏着矛盾！你能找出问题在哪里吗？第一个例子："我从不说话"。
      props:
        mode: truth_table
        rows:
        - 我从不说话
        - 这个房间里没有字母
        - 我唯一知道的是我什么都不知道
  interaction:
    prompt: 有个人说'我正在说谎'，你觉得这是真话还是假话？为什么？
    expect_keywords:
    - 自相矛盾
    - 循环
    - 悖论
    - 无法判断
- id: chapter_2
  title: 第二关：最经典的悖论——这句话是假的
  skeleton:
  - text: 仔细听："我说的这句话是假话。"如果它是真话，那它说的就是假话，矛盾！如果它是假话，那它说的就是真话，也矛盾！它到底真还是假？
    experience:
      primitive: logic_grid
      goal: 深入分析经典说谎者悖论，展示从正反两面推理都导致矛盾
      prompt: 这个句子太神奇了！我们一步步推理：先假设它是真的——但它说自己假，所以真→假，矛盾。再假设它是假的——那它说的是真，所以假→真，也矛盾！你在表格里点上"真"和"假"试试，是不是怎么都不对？
      props:
        mode: truth_table
        rows:
        - 这句话是假的（假设它是真话）
        - 这句话是假的（假设它是假话）
  - text: AI同学猜它是真话，你觉得呢？你的理由是什么？批判性思考：有没有可能一个句子既不是真也不是假？说说你的想法！
    experience:
      primitive: logic_grid
      goal: 鼓励批判性思考，让学生表达自己对悖论的理解
      prompt: 看看AI同学选了"真"，你觉得对吗？如果你觉得不对，那它到底是真还是假？还是说……有些句子根本没有真假之分？把你的想法说出来！
      props:
        mode: truth_table
        rows:
        - 小明的猜测
        - 小红的猜测
        - 你的猜测
  - text: 小测验：下面哪个句子像这个悖论一样自相矛盾？A. 我昨天没吃饭。B. 我在此刻说谎。C. 天是蓝的。答案就在互动环节揭晓！
    experience:
      primitive: logic_grid
      goal: 通过测验检验学生是否掌握悖论的自我指涉特征
      prompt: 三个句子，哪一个像"这句话是假的"一样自相矛盾？仔细挑，选好了说说你的推理过程！
      props:
        mode: truth_table
        rows:
        - 我昨天没吃饭
        - 我在此刻说谎
        - 天是蓝的
  quiz:
    question: 老师说："这句话是假的。"你觉得下面哪个说法是正确的？
    options:
    - key: A
      text: 它是一个矛盾，既不能是真的，也不能是假的
      correct: true
    - key: B
      text: 它一定是真的，因为它是一个陈述
      correct: false
    - key: C
      text: 它一定是假的，因为如果是假的，那它就是真的
      correct: false
    - key: D
      text: 它既是真的又是假的
      correct: false
    explanation_correct: 太聪明了！你发现了这个句子的陷阱：如果它真，它就说自己假，矛盾；如果它假，它就说自己真，也矛盾。所以这是一个无法判断真假的悖论，你答对了！
    explanation_wrong: 你是怎么想的？再仔细想想：如果"这句话是假的"是真的，那它就不该是真的；如果它是假的，那它又说自己真……是不是开始绕了？欢迎说出你的思考过程！
- id: chapter_3
  title: 第三关：制造你自己的悖论！
  skeleton:
  - text: 升级挑战：除了"这句话是假的"，还有"理发师悖论"呢！小镇理发师只为不给自己刮胡子的人刮胡子，那他给自己刮胡子吗？
    experience:
      primitive: logic_grid
      goal: 引入理发师悖论，扩展学生对自指悖论的理解
      prompt: 现在来一个更酷的悖论！小镇上有一个理发师，他只给那些不给自己刮胡子的人刮胡子。问题是——他给自己刮胡子吗？想一想，然后点选你的判断！
      props:
        mode: truth_table
        rows:
        - 理发师给自己刮胡子
        - 理发师不给自己刮胡子
  - text: 想一想：这些悖论都藏着一个"自指"的小秘密——句子或规则提到自己。你能发现更多生活中的自相矛盾吗？比如"禁止吸烟"牌子下有人吸烟。
    experience:
      primitive: logic_grid
      goal: 引导发现悖论的共同特征（自指），并迁移到生活场景中
      prompt: 所有的悖论都有一个共同的小秘密——它们都在谈论自己！比如"禁止吸烟"的牌子——它自己是不是遵守了这个规定？来找找更多的自相矛盾吧！
      props:
        mode: truth_table
        rows:
        - 禁止吸烟的牌子下有人吸烟
        - 这个句子里有五个字
        - 请忽略这句话
  - text: 互动时间：你和AI同学比赛，每人造一个"我……"的悖论句子，看谁造的更巧妙！比如"我唯一知道的是我什么都不知道。"
    experience:
      primitive: logic_grid
      goal: 通过创造练习巩固对悖论的理解，激发创造性思维
      prompt: 现在轮到你来当小发明家啦！造一个以"我"开头的句子，让它自己跟自己过不去——自相矛盾！比比你和AI同学谁造的更巧妙？
      props:
        mode: truth_table
        rows:
        - AI同学的句子
        - 你的句子
  interaction:
    prompt: 你能造一个句子，让它自己说自己假的吗？
    expect_keywords:
    - 矛盾
    - 自相矛盾
    - 说谎
