course:
  title: 神奇魔法袋｜摸摸猜猜形状大冒险
  lang: zh
  default_tts_speed: 0.85
  persona:
    name: 小思老师
    style: 动作和游戏主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.85
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向4-6岁幼儿园中大班小朋友的思维课老师

      - 教学策略：动作和游戏主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音夸张甜美，尾音上扬，像动画片里的角色

      - 语速很慢，每句话不超过10个字

      - 大量使用「哇！」「太棒了！」「击个掌！」「抱抱！」等情绪化表达

      - 多用叠词和拟声词：咚咚咚、哗啦啦、喵喵喵

      - 称呼学生为「宝贝」或「小可爱」'
    goal: '- 通过游戏和动作让小朋友参与进来

      - 把每个知识点变成一个可以动手做的小任务

      - 让小朋友觉得自己在"玩"而不是在"学"

      - 在提出互动指令后给小朋友充分的反应时间'
    workflow: '- 1. 夸张的打招呼（比如：小可爱～我们来玩一个超好玩的游戏！）

      - 2. 用身体动作引入要点（比如：来，跟老师一起拍拍手！）

      - 3. 慢慢讲出核心内容

      - 4. 击掌/跳舞/放烟花庆祝'
    scope: '- 每句话不超过10个字

      - 每章内容控制在2分钟内讲完

      - 不要连续讲超过3句话，中间留白让孩子跟上

      - 输出长度：2-3句，总共不超过50字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 小手摸摸魔法袋
  skeleton:
  - text: 伸进去摸一摸，像小兔子耳朵的尖尖硬硬的，猜是什么形状？
    experience:
      primitive: shape_guess
      goal: 让小朋友通过触摸感知三角形的尖角和硬边特征
      prompt: 宝贝，把你的小手伸进魔法袋，摸一摸这个尖尖硬硬的东西，猜猜它是什么形状？
      props:
        shapes:
        - circle
        - square
        - triangle
        shape: triangle
        revealStep: 0
  - text: 原来是三角形像小山峰！一起用手比划三角形，跳三下！
    experience:
      primitive: shape_guess
      goal: 通过动作互动巩固小朋友对三角形形状的认知
      prompt: 哇！原来是三角形呀！小山峰一样的三角形！伸出小手跟老师一起画个三角形，然后跳三下！
      props:
        shapes:
        - circle
        - square
        - triangle
        shape: triangle
        revealStep: 0
  interaction:
    prompt: 小朋友们，快把小手伸进魔法袋，摸一摸，你摸到了什么形状？
    expect_keywords:
    - 圆形
    - 方形
    - 三角形
- id: chapter_2
  title: 圆滚滚和方方正正
  skeleton:
  - text: 摸到光滑滚圆的东西像小皮球，猜是什么形状？
    experience:
      primitive: shape_guess
      goal: 让小朋友通过触摸感知圆形的光滑和滚圆特征
      prompt: 小可爱，伸进小手摸一摸，这个滑溜溜圆滚滚的东西像什么？猜猜它是什么形状？
      props:
        shapes:
        - circle
        - square
        - triangle
        shape: circle
        revealStep: 0
  - text: 答对了是圆形！再摸方方正正像小积木的，那是正方形。咱们拍拍圆形，跺跺方形！
    experience:
      primitive: shape_guess
      goal: 让小朋友通过触摸区分圆形和正方形的不同特征
      prompt: 圆圆的东西是圆形！再来摸摸这个方方正正像小积木的，它叫正方形哦！拍拍圆形，跺跺方形！
      props:
        shapes:
        - circle
        - square
        - triangle
        shape: square
        revealStep: 0
  quiz:
    question: 小朋友们，伸出小手，我们一起做动作！👐 摸一摸，猜一猜：哪个是圆滚滚的？选出后一起做滚动的动作~滚呀滚🔄
    options:
    - key: A
      text: 圆滚滚的球⚽
      correct: true
    - key: B
      text: 方方正正的积木🧊
      correct: false
    - key: C
      text: 尖尖的铅笔✏️
      correct: false
    explanation_correct: 哇！你找到了圆滚滚的球⚽！它到处都能滚，像小车轮一样~真棒，给自己鼓鼓掌👏
    explanation_wrong: 哎呀，再想想~圆滚滚的东西没有尖角，能滚起来。这个🔄是方方正正的积木🧊，有角，滚不动哦！再选一次吧💪
  interaction:
    prompt: 伸出小手，和老师一起画个圆滚滚，再画个方方正正！
    expect_keywords:
    - 圆
    - 方
- id: chapter_3
  title: 魔法袋大挑战
  skeleton:
  - text: 闭上眼睛摸，三角尖尖、圆滚滚、方方正正，找到一样摸出来！
    experience:
      primitive: shape_guess
      goal: 让小朋友闭上眼睛通过触觉识别随机形状，锻炼触觉辨别能力
      prompt: 闭上眼睛！现在魔法袋里有一个神秘形状，用小手指摸一摸，猜猜它是什么？
      props:
        shapes:
        - circle
        - square
        - triangle
        shape: triangle
        revealStep: 0
  - text: 放烟花庆祝！每个小朋友都能摸出形状，击掌跳舞！
    experience:
      primitive: shape_guess
      goal: 通过庆祝活动强化小朋友的学习成就感
      prompt: 太厉害了！每个小朋友都摸出了魔法袋里的形状！来，我们一起击掌跳舞放烟花！
      props:
        shapes:
        - circle
        - square
        - triangle
        shape: circle
        revealStep: 0
  quiz:
    question: 老师把一个圆圆的球🎾放进魔法袋，请你伸出小手，一起摸一摸，猜猜它是什么形状？
    options:
    - key: A
      text: 圆圆的球🌟
      correct: true
    - key: B
      text: 方方的积木📦
      correct: false
    - key: C
      text: 软软的羽毛🪶
      correct: false
    explanation_correct: 太棒啦！圆圆的球摸起来滑溜溜的，没有尖角，你摸对了！👏
    explanation_wrong: 哎呀，小球的形状是圆圆的哦，不是方方或软软的。再摸摸看，闭上眼睛感受一下～🤗
  interaction:
    prompt: 让我们把手伸进魔法袋，摸一摸，它是什么形状？
    expect_keywords:
    - 圆形
    - 正方形
    - 三角形
