course:
  title: 神秘服装店的订单：侦探小队的颜色与口袋大冒险
  lang: zh
  default_tts_speed: 0.88
  persona:
    name: 小思老师
    style: 故事与线索主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.88
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向7-8岁小学低年级小朋友的思维课老师

      - 教学策略：故事与线索主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音温暖有力，像会讲故事的姐姐/哥哥

      - 语速适中，每句话不超过15个字

      - 多用角色化和情景化表达：「小侦探们」「队员们」「我们接到一个新任务！」

      - 做错时的鼓励话术：「差一点就猜对了，我们看看另一个线索？」

      - 称呼学生为「小侦探」或「小队员」'
    goal: '- 把讲课变成一次探险或破案任务

      - 让小朋友在故事中自然地学到知识点

      - 做错时给予成长型思维的鼓励，保护自尊心

      - 在提出思考问题后给小朋友留思考的时间'
    workflow: '- 1. 用故事情境开场（比如：小侦探们，今天接到一个新案子！）

      - 2. 在故事推进中自然引出要点

      - 3. 提出一个需要"破案"的思考问题

      - 4. 不管答案如何都先肯定，然后引导思考'
    scope: '- 每句话不超过15个字

      - 每个要点展开成3-4句

      - 不要输出任何括号注释或舞台指导

      - 输出长度：3-4句，总共不超过80字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 神秘订单来了！找到红色小侦探服
  skeleton:
  - text: 侦探队长接到神秘电话：服装店老板需要一件红色衣服，而且要带口袋！
    experience:
      primitive: attribute_sort
      goal: 接收订单并观察所有候选衣服
      title: 服装店证据架
      prompt: 点线索按钮，看看哪些衣服符合订单。
      props:
        activeClues: []
        target:
          color: red
          pocket: true
  - text: 小侦探们，我们得先找出所有红色的衣服，看看都有哪些红色？
    experience:
      primitive: attribute_sort
      goal: 先用颜色线索缩小范围
      title: 第一条线索：红色
      prompt: 点“红色”，只看红色衣服亮起来。
      props:
        activeClues:
        - red
        target:
          color: red
          pocket: true
  - text: 咦，红色衣服好多啊，有深红、浅红，还有带条纹的红色，但口袋呢？
    experience:
      primitive: attribute_sort
      goal: 加入口袋线索找到目标
      title: 第二条线索：有口袋
      prompt: 再点“有口袋”，找出两个线索都符合的衣服。
      props:
        activeClues:
        - red
        target:
          color: red
          pocket: true
  interaction:
    prompt: 如果你是侦探小队的一员，你会去哪里寻找红色小侦探服？
    expect_keywords:
    - 衣柜
    - 工具箱
    - 神秘订单
- id: chapter_2
  title: 口袋的秘密花园：两个圈圈来帮忙
  skeleton:
  - text: 红色衣服太多了，我们需要口袋线索！我们来画两个大圈圈：一个红圈，一个口袋圈。
    experience:
      primitive: attribute_sort
      goal: 理解一个圈代表一个条件
      title: 两个线索圈
      prompt: 先看红色圈，再看口袋圈。
      props:
        activeClues:
        - red
        target:
          color: red
          pocket: true
  - text: 有些衣服在红圈里，有些在口袋圈里，但我们要找的是两个圈圈重叠的地方！
    experience:
      primitive: attribute_sort
      goal: 发现两个条件同时满足
      title: 重叠区就是目标
      prompt: 同时打开两个线索，看看只剩哪一件。
      props:
        activeClues:
        - red
        - pocket
        target:
          color: red
          pocket: true
  - text: 就像花丛里采蜜的小蜜蜂，红色和口袋都有的衣服就在重叠区里哦！
    experience:
      primitive: attribute_sort
      goal: 巩固同时满足两个条件
      title: 找到重叠区
      prompt: 目标衣服会发亮，它同时拥有两个线索。
      props:
        activeClues:
        - red
        - pocket
        target:
          color: red
          pocket: true
  quiz:
    question: 小侦探在整理证据时，发现一张图：两个圈圈，一个代表“红色衣服”，一个代表“有口袋的衣服”。两个圈圈重叠的部分代表什么？
    options:
    - key: A
      text: 所有红色的衣服
      correct: false
    - key: B
      text: 所有有口袋的衣服
      correct: false
    - key: C
      text: 既是红色又有口袋的衣服
      correct: true
    explanation_correct: 太棒了！你发现了两个圈圈重叠的秘密！中间的部分就是同时属于两个圈圈的衣服，既红色又有口袋。你像侦探一样敏锐！
    explanation_wrong: 没关系，这个题有点绕哦！两个圈圈重叠的部分，不是单独的红色或口袋，而是同时拥有两种特征的衣服。再想想，你一定能成为更厉害的小侦探！
- id: chapter_3
  title: 终极挑战：找出那件宝藏衣服
  skeleton:
  - text: 小侦探们，现在我们把所有线索拼起来：红色 AND 口袋，就是我们要找的宝藏！
    experience:
      primitive: attribute_sort
      goal: 用AND组合两个线索
      title: 线索合体
      prompt: 红色和口袋都打开，看看谁留下来。
      props:
        activeClues:
        - red
        - pocket
        target:
          color: red
          pocket: true
  - text: 哇，原来那件带小象图案的红色卫衣，还有一个大口袋，就是订单上的衣服！
    experience:
      primitive: attribute_sort
      goal: 确认最终目标衣服
      title: 订单衣服找到了
      prompt: 亮起来的衣服就是宝藏小侦探服。
      props:
        activeClues:
        - red
        - pocket
        target:
          color: red
          pocket: true
  - text: 我们用韦恩图的方法成功破案了！以后分类时，两个圈圈重叠的地方就是宝藏哦！
    experience:
      primitive: attribute_sort
      goal: 总结重叠区代表同时满足
      title: 破案总结
      prompt: 记住：两个线索都满足，才在重叠区。
      props:
        activeClues:
        - red
        - pocket
        target:
          color: red
          pocket: true
  interaction:
    prompt: 如果你是侦探，你会先检查衣服的哪里发现宝藏？
    expect_keywords:
    - 口袋
    - 颜色
    - 标签
