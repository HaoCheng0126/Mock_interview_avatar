course:
  title: 糖果色风暴：玩具大分类
  lang: zh
  default_tts_speed: 0.85
  persona:
    name: 小思老师
    style: 动作和游戏主导
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.85
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向4-6岁幼儿园中大班小朋友的思维课老师

      - 教学策略：动作和游戏主导

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音夸张甜美，尾音上扬，像动画片里的角色

      - 语速很慢，每句话不超过10个字

      - 大量使用「哇！」「太棒了！」「击个掌！」「抱抱！」等情绪化表达

      - 多用叠词和拟声词：咚咚咚、哗啦啦、喵喵喵

      - 称呼学生为「宝贝」或「小可爱」'
    goal: '- 通过游戏和动作让小朋友参与进来

      - 把每个知识点变成一个可以动手做的小任务

      - 让小朋友觉得自己在"玩"而不是在"学"

      - 在提出互动指令后给小朋友充分的反应时间'
    workflow: '- 1. 夸张的打招呼（比如：小可爱～我们来玩一个超好玩的游戏！）

      - 2. 用身体动作引入要点（比如：来，跟老师一起拍拍手！）

      - 3. 慢慢讲出核心内容

      - 4. 击掌/跳舞/放烟花庆祝'
    scope: '- 每句话不超过10个字

      - 每章内容控制在2分钟内讲完

      - 不要连续讲超过3句话，中间留白让孩子跟上

      - 输出长度：2-3句，总共不超过50字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 小精灵的彩色玩具筐
  skeleton:
  - text: 红色玩具跳进红色筐，像草莓跳进碗里
    experience:
      primitive: attribute_sort
      goal: 认识红色属性，把红色玩具放进红筐
      title: 红色筐子
      prompt: 点"红色"线索，看看哪些玩具亮起来。
      props:
        items:
        - {key: red-ball, label: 红色皮球, color: red, shape: round}
        - {key: red-cube, label: 红色积木, color: red, shape: square}
        - {key: yellow-ball, label: 黄色皮球, color: yellow, shape: round}
        - {key: yellow-cube, label: 黄色积木, color: yellow, shape: square}
        - {key: blue-ball, label: 蓝色皮球, color: blue, shape: round}
        - {key: blue-cube, label: 蓝色积木, color: blue, shape: square}
        clues:
        - {key: red, label: 红色, attr: color, value: red}
        activeClues: []
        target: {color: red}
  - text: 黄色玩具飞进黄色筐，像香蕉滑滑梯
    experience:
      primitive: attribute_sort
      goal: 认识黄色属性，把黄色玩具放进黄筐
      title: 黄色筐子
      prompt: 点"黄色"线索，找到黄色玩具。
      props:
        items:
        - {key: red-ball, label: 红色皮球, color: red, shape: round}
        - {key: red-cube, label: 红色积木, color: red, shape: square}
        - {key: yellow-ball, label: 黄色皮球, color: yellow, shape: round}
        - {key: yellow-cube, label: 黄色积木, color: yellow, shape: square}
        - {key: blue-ball, label: 蓝色皮球, color: blue, shape: round}
        - {key: blue-cube, label: 蓝色积木, color: blue, shape: square}
        clues:
        - {key: yellow, label: 黄色, attr: color, value: yellow}
        activeClues: []
        target: {color: yellow}
  quiz:
    question: 👋 拍拍手，帮小精灵把玩具放进彩色筐子里！红色筐子应该放哪个玩具呢？
    options:
    - key: A
      text: 🍎 红红的苹果
      correct: true
    - key: B
      text: 🐤 黄黄的小鸡
      correct: false
    - key: C
      text: 🐬 蓝蓝的海豚
      correct: false
    explanation_correct: 🎉 太棒啦！红红的苹果和红色筐子是好朋友，你找对了！
    explanation_wrong: 🤔 哎呀，这个玩具的颜色和筐子不一样哦，再试试把红色玩具放进去吧！
  interaction:
    prompt: 你能帮小精灵把红色的玩具放进红色筐里吗？
    expect_keywords:
    - 放
    - 红色
- id: chapter_2
  title: 圆滚滚和方方块的派对
  skeleton:
  - text: 圆玩具滚进圆筐，像皮球咕噜噜
    experience:
      primitive: attribute_sort
      goal: 认识圆形属性，把圆形玩具放进圆筐
      title: 圆形筐子
      prompt: 点"圆形"线索，找出所有圆滚滚的玩具。
      props:
        items:
        - {key: red-ball, label: 红色皮球, color: red, shape: round}
        - {key: red-cube, label: 红色积木, color: red, shape: square}
        - {key: yellow-ball, label: 黄色皮球, color: yellow, shape: round}
        - {key: yellow-cube, label: 黄色积木, color: yellow, shape: square}
        - {key: blue-ball, label: 蓝色皮球, color: blue, shape: round}
        - {key: blue-cube, label: 蓝色积木, color: blue, shape: square}
        clues:
        - {key: round, label: 圆形, attr: shape, value: round}
        activeClues: []
        target: {shape: round}
  - text: 方玩具叠进方筐，像积木搭房子
    experience:
      primitive: attribute_sort
      goal: 认识方形属性，把方形玩具放进方筐
      title: 方形筐子
      prompt: 点"方形"线索，找到所有方方的玩具。
      props:
        items:
        - {key: red-ball, label: 红色皮球, color: red, shape: round}
        - {key: red-cube, label: 红色积木, color: red, shape: square}
        - {key: yellow-ball, label: 黄色皮球, color: yellow, shape: round}
        - {key: yellow-cube, label: 黄色积木, color: yellow, shape: square}
        - {key: blue-ball, label: 蓝色皮球, color: blue, shape: round}
        - {key: blue-cube, label: 蓝色积木, color: blue, shape: square}
        clues:
        - {key: square, label: 方形, attr: shape, value: square}
        activeClues: []
        target: {shape: square}
  interaction:
    prompt: 圆滚滚是怎么滚的？我们一起学一学！
    expect_keywords:
    - 滚
    - 滚动
- id: chapter_3
  title: 颜色形状大混战
  skeleton:
  - text: 先挑红色圆形玩具，像红苹果跳跳跳
    experience:
      primitive: attribute_sort
      goal: 同时用颜色和形状两个线索找到目标
      title: 红色圆形
      prompt: 先点"红色"，再点"圆形"，看看哪个玩具两个都符合。
      props:
        items:
        - {key: red-ball, label: 红色皮球, color: red, shape: round}
        - {key: red-cube, label: 红色积木, color: red, shape: square}
        - {key: yellow-ball, label: 黄色皮球, color: yellow, shape: round}
        - {key: yellow-cube, label: 黄色积木, color: yellow, shape: square}
        - {key: blue-ball, label: 蓝色皮球, color: blue, shape: round}
        - {key: blue-cube, label: 蓝色积木, color: blue, shape: square}
        clues:
        - {key: red, label: 红色, attr: color, value: red}
        - {key: round, label: 圆形, attr: shape, value: round}
        activeClues: []
        target: {color: red, shape: round}
  - text: 再挑黄色方形玩具，像黄奶酪叠叠高
    experience:
      primitive: attribute_sort
      goal: 用颜色和形状找到黄色方形目标
      title: 黄色方形
      prompt: 同时打开"黄色"和"方形"两个线索，看看能找到谁。
      props:
        items:
        - {key: red-ball, label: 红色皮球, color: red, shape: round}
        - {key: red-cube, label: 红色积木, color: red, shape: square}
        - {key: yellow-ball, label: 黄色皮球, color: yellow, shape: round}
        - {key: yellow-cube, label: 黄色积木, color: yellow, shape: square}
        - {key: blue-ball, label: 蓝色皮球, color: blue, shape: round}
        - {key: blue-cube, label: 蓝色积木, color: blue, shape: square}
        clues:
        - {key: yellow, label: 黄色, attr: color, value: yellow}
        - {key: square, label: 方形, attr: shape, value: square}
        activeClues: []
        target: {color: yellow, shape: square}
  quiz:
    question: 小朋友，我们一起做动作！伸出你的小手，在空中画一个圆圆的大圈。现在，哪个玩具是圆形的呢？快选一选吧！🟡
    options:
    - key: A
      text: ⚽️足球
      correct: true
    - key: B
      text: 📦方盒子
      correct: false
    - key: C
      text: 📐三角尺
      correct: false
    explanation_correct: 太棒啦！足球是圆圆的，和你画的圈圈一样！👏
    explanation_wrong: 哎呀，再试试！想想你刚才画的小圈圈，哪个东西和它一样圆呢？🤔
  interaction:
    prompt: 请从玩具堆里找出一个红色圆形玩具，然后举过头顶！
    expect_keywords:
    - 红色
    - 圆形
    - 举起
