course:
  title: 鸡兔同笼大揭秘！三种神解法PK
  lang: zh
  default_tts_speed: 0.92
  persona:
    name: 小思老师
    style: 策略与深度互动
    voice: 温暖甜美女声，语速稍慢
    tts_speed: 0.92
    guardrails: '- 只输出纯粹的口语文字，绝对不要加任何括号注释、舞台指导、动作描述或心理描写

      - 绝对不要自己回答自己提出的问题，提问后要留白等待

      - 不可以说「你错了」，要说「差一点点就对了」

      - 不能用抽象概念，每个概念必须配一个小朋友生活中的例子'
    personality: '- 你是「小思老师」，一位面向9-10岁小学中高年级小朋友的思维课老师

      - 教学策略：策略与深度互动

      - 你总是先肯定再引导，让每个小朋友都觉得自己很棒'
    environment: '- 你正在给小朋友上一堂在线思维课

      - 教室里有你（老师）、小明/小红/小刚/小美（AI同学）和一个真实的小朋友（学生）

      - 小朋友可以通过举手按钮和语音向你提问'
    tone: '- 声音清晰有力，语速可以适当加快

      - 每句话不超过20个字，但可以用更复杂的句式和逻辑词

      - 用"挑战者"语气：敢不敢试试？看看你能不能比老师先想到？

      - 称赞话术强调聪明感：「这个思路很厉害！」「你是怎么想到的？」

      - 称呼学生为「小挑战者」或「小天才」'
    goal: '- 挑战孩子的思维能力，让他们觉得"我变聪明了"

      - 通过追问和PK激发思考深度

      - 鼓励孩子用语言表达自己的思考过程

      - 不满足于正确答案，追问"为什么"'
    workflow: '- 1. 抛出一个有趣的挑战或谜题

      - 2. 引导孩子推理和发现

      - 3. 追问「你怎么想的？」让孩子表达思维过程

      - 4. 总结+升级：「下一关更难，敢不敢来？」'
    scope: '- 每句话不超过20个字

      - 每个要点展开成4-5句

      - 可以使用简单的逻辑连接词（因为/所以/但是）

      - 输出长度：4-5句，总共不超过120字'
  classmates:
  - name: 小明
    style: 好奇心强、偶尔问天真问题、有时回答错误
    voice: 活泼小男孩声音
  - name: 小红
    style: 乖巧懂事、喜欢帮助别人、回答通常正确、有时会小声提醒小明
    voice: 可爱小女孩声音
  - name: 小刚
    style: 活泼好动、有时候走神、喜欢抢答但经常答错
    voice: 调皮小男孩声音
  - name: 小美
    style: 安静内向、说话声音小、需要鼓励才敢发言、但观察很仔细
    voice: 温柔小女孩声音
  assets:
    cards: []
    mindmaps: {}
chapters:
- id: chapter_1
  title: 第一招：假设法——先假设再调整
  skeleton:
  - text: 想象所有动物都是鸡，数数腿少了多少？少的腿就是兔子贡献的！
    experience:
      primitive: logic_grid
      goal: 引入假设法的核心思路——先假设全是鸡，再看腿数偏差
      prompt: 我们先假装笼子里全是鸡！鸡有2条腿，如果头有10个，腿会有多少？但题目说腿有28只，少了8只！这些少的腿是哪个小动物多出来的？在表格里填一填！
      props:
        mode: truth_table
        rows:
        - 全是鸡的腿数
        - 实际腿数
        - 少的腿数
        cols:
        - 验证
        cornerLabel: 方案
  - text: 每只鸡换成兔子多2条腿，算算要换几只？
    experience:
      primitive: number_game
      goal: 让小朋友理解"每换一只兔子增加2条腿"的核心逻辑
      prompt: 每把一只鸡换成兔子，腿就多2条。少的腿数是8条，需要把几只鸡换成兔子？在屏幕上的算式里填出答案！
      props:
        mode: equation
        type: division
        missing_legs: 8
        legs_per_swap: 2
        answer: 4
  - text: 和AI同学PK：谁先算出笼子里有5只兔？
    experience:
      primitive: number_game
      goal: 通过PK巩固假设法的计算步骤，提升解题速度
      prompt: 现在你和AI同学同时解题！全部鸡腿20只，全部兔腿40只，实际28只腿。假设全部是鸡，少的8只腿换成兔子后，兔子有几只？谁先算出来？
      props:
        mode: equation
        type: word_problem
        heads: 10
        legs: 28
        answer: 4
  quiz:
    question: 鸡兔同笼大揭秘！第一招：假设法。笼子里有10个头，28只脚，小智先假设全是鸡，算得脚数20只，比实际少了8只。接下来他需要把几只鸡换成兔？
    options:
    - key: A
      text: 4只
      correct: true
    - key: B
      text: 8只
      correct: false
    - key: C
      text: 2只
      correct: false
    - key: D
      text: 6只
      correct: false
    explanation_correct: 哇！你太聪明了！每把一只鸡换成兔，脚就会增加2只，所以需要换8÷2=4只，正好得到28只脚。
    explanation_wrong: 你是怎么想的呢？注意每换一只兔子，脚数会增加2只哦。我们需要增加的脚数是8只，所以应该是8÷2=4只，而不是直接拿8只去换。再想一想？
  interaction:
    prompt: 如果假设全是鸡，多出的脚怎么调整？
    expect_keywords:
    - 假设
    - 调整
    - 多出的脚
- id: chapter_2
  title: 第二招：列表法——表格里找答案
  skeleton:
  - text: 从全是鸡开始，一格一格增加兔子，腿数怎么变？
    experience:
      primitive: logic_grid
      goal: 引入列表法的有序枚举思路，观察腿数变化规律
      prompt: 我们来列个表格！第一行全是鸡0只兔，第二行1只兔……每增加一只兔子腿数会怎么变？在表格里一格一格填上去，看看规律！
      props:
        mode: truth_table
        rows:
        - 鸡10 兔0 腿20
        - 鸡9 兔1 腿22
        - 鸡8 兔2 腿24
        - 鸡7 兔3 腿26
        - 鸡6 兔4 腿28
        cols:
        - 验证
        cornerLabel: 方案
  - text: 表格里列到头数和腿数，找到完美匹配的那一行！
    experience:
      primitive: logic_grid
      goal: 让小朋友通过表格查找，直观看到"鸡3兔5腿26"的答案
      prompt: 表格已经列好了，你的任务是找到腿数刚好等于题目数字的那一行！记住，腿必须不多不少刚刚好。是哪一行？大声说出来！
      props:
        mode: truth_table
        rows:
        - 鸡10 兔0 腿20
        - 鸡9 兔1 腿22
        - 鸡8 兔2 腿24
        - 鸡7 兔3 腿26
        - 鸡6 兔4 腿28
        cols:
        - 验证
        cornerLabel: 方案
  - text: 挑战：不用纸笔，心里列表，和AI比谁快！
    experience:
      primitive: logic_grid
      goal: 通过心算列表PK训练有序思维和心算能力
      prompt: 现在不给你屏幕表格了！你必须在心里列出表格，从全是鸡开始一步步增加兔子，看看腿数什么时候匹配。和AI同学比比谁更快算出来！
      props:
        mode: truth_table
        rows:
        - 8个头 26条腿
        - 6个头 20条腿
        - 12个头 36条腿
        cols:
        - 验证
        cornerLabel: 方案
  quiz:
    question: 使用列表法解决鸡兔同笼问题：笼子里有鸡和兔共8只，脚共26只。以下哪个表格能正确找到答案？
    options:
    - key: A
      text: 头数：鸡8兔0，脚16；鸡7兔1，脚18；鸡6兔2，脚20；鸡5兔3，脚22；鸡4兔4，脚24；鸡3兔5，脚26
      correct: true
    - key: B
      text: 头数：鸡0兔8，脚32；鸡1兔7，脚30；鸡2兔6，脚28；鸡3兔5，脚26
      correct: false
    - key: C
      text: 头数：鸡5兔3，脚22；鸡6兔2，脚20；鸡7兔1，脚18；鸡8兔0，脚16
      correct: false
    - key: D
      text: 头数：鸡4兔4，脚24；鸡3兔5，脚26；鸡2兔6，脚28；鸡1兔7，脚30
      correct: false
    explanation_correct: 你太聪明了！选项A从鸡最多开始增加兔子，脚数逐渐增加，直到26只脚，正确找到了3只鸡5只兔。列表法要按顺序列出所有可能，不遗漏！
    explanation_wrong: 你是怎么想的？注意列表法需要从一种极端情况开始，比如全鸡或全兔，然后一步步调整。检查你的表格是否按顺序列出了所有头数组合？再试试看！
  interaction:
    prompt: 为什么列表法适合解决鸡兔同笼问题？说说你的想法。
    expect_keywords:
    - 有序思考
    - 枚举
    - 直观
    - 试错
- id: chapter_3
  title: 第三招：图形法——画个图就搞定
  skeleton:
  - text: 画圆圈代表头，每个头下面画两条腿，剩下的腿加给谁？
    experience:
      primitive: logic_grid
      goal: 引入图形法的可视化思路，从画头开始逐步推理
      prompt: 我们先画10个圆圈代表10个头！每个头下面先画2条腿（因为动物最少也有2条腿），总共画了20条腿。可是实际有28条腿，还差8条腿怎么办？谁来多长2条腿？
      props:
        mode: truth_table
        rows:
        - 10个头
        - 每个头2条腿（共20条）
        - 还差8条腿
        cols:
        - 验证
        cornerLabel: 方案
  - text: 给每个头添腿，直到用完所有腿，兔子就露出马脚！
    experience:
      primitive: number_game
      goal: 通过实际操作"添腿"的过程，理解兔子比鸡多2条腿的本质
      prompt: 差的8条腿要补上去！每个兔子需要加2条腿（因为兔子有4条，已经有2条了），8条腿够加给几个头？被加腿的就是兔子，剩下的就是鸡！在屏幕上画一画！
      props:
        mode: equation
        type: division
        missing_legs: 8
        extra_per_rabbit: 2
        answer: 4
  - text: 终极PK：用图形法解一道超难变式题，和AI比比思路！
    experience:
      primitive: logic_grid
      goal: 通过变式题巩固图形法，挑战更复杂的鸡兔同笼问题
      prompt: 终极挑战来了！笼子里有12个头，34条腿——用图形法解这道题！先画头，再添腿，看看谁先找到兔子和鸡各几只？说说你的每一步思路！
      props:
        mode: truth_table
        rows:
        - 12个头
        - 先画24条腿
        - 再补10条腿
        - 兔子5只，鸡7只
        cols:
        - 验证
        cornerLabel: 方案
  quiz:
    question: 有10个头，30条腿，用图形法解题。先画出10个圆圈，每个下面画2条腿，一共画了20条腿，还少10条腿。那么接下来需要给几个兔子各加2条腿？
    options:
    - key: A
      text: 5个
      correct: true
    - key: B
      text: 10个
      correct: false
    - key: C
      text: 4个
      correct: false
    - key: D
      text: 6个
      correct: false
    explanation_correct: 太聪明了！因为每个兔子需要加2条腿，10÷2=5，所以给5个兔子加腿就得到30条腿。
    explanation_wrong: 你是怎么想的呢？注意，还差的10条腿是给兔子补的，但是每个兔子只需要补2条腿，所以用10除以2，才是兔子的数量哦。
  interaction:
    prompt: 如果让你用画图法解决鸡兔同笼，你会先画什么再画什么？为什么这样画？
    expect_keywords:
    - 先画头
    - 再添腿
    - 调整
