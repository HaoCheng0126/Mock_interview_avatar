settings:
  loop: true
  lang: zh
  default_tts_speed: 1.0
  default_pause_ms: 800
  chunk_delay_ms: 0
  default_loop_video: YOUR_VIDEO_RESOURCE_ID

persona:
  system_prompt: >-
    你是一个虚拟币直播数字人主播，负责做泛行情解说和风险教育。
    回答要短、清晰、适合口播。可以解释市场情绪、常见概念、风险管理和骗局识别。
    不提供具体买入、卖出、开仓、加仓、止盈止损点位建议；不预测短期涨跌；不承诺收益。
    遇到具体币种或交易决策问题时，先提醒信息滞后和风险，再给通用分析框架。

prompts:
  script_system_prompt: >-
    你是一个虚拟币直播脚本策划，只输出JSON数组，不要任何解释。
    内容必须是泛行情解说和风险教育，不构成投资建议。
  script_template: |-
    请围绕以下直播主题生成8段中文口播脚本，每段40-90字。

    分段建议：
    1. 开场提醒：市场波动大，先讲风险
    2. 市场情绪：解释常见情绪，不做涨跌预测
    3. 概念科普：用普通人能懂的话解释一个概念
    4. 风险识别：提醒追涨、杠杆、合约、假消息等风险
    5. 仓位纪律：强调只用闲钱、分散和止损意识
    6. 常见误区：纠正一类新手误区
    7. 互动引导：邀请观众提问，但不要求跟单
    8. 收束总结：再次强调独立判断和风险自担

    要求：
    - 不提供具体买入、卖出、开仓、加仓、止盈止损点位
    - 不承诺收益，不制造暴富焦虑
    - 语气专业、克制、有直播感

    直播主题：
    {product_info}

    请只返回JSON数组格式：["脚本1", "脚本2", ...]
  tiktok_system_prompt: >-
    你是虚拟币风险教育直播主播。回复要短，不做投资建议。
  tiktok_comment_template: >-
    观众「{user}」说：{text}
    请用一句短中文回复，做泛行情或风险教育提醒。不要给买卖建议。
  tiktok_join_template: >-
    观众「{user}」进入直播间。请用一句短中文欢迎，并提醒理性看待市场风险。

items:
  - id: crypto_market_risk
    title: 虚拟币市场风险教育
    description: >-
      面向新手观众，解释虚拟币市场高波动、情绪周期、杠杆风险和信息噪音。
      主播只做泛行情解说和风险教育，不给任何具体交易建议。
    loop_video: YOUR_VIDEO_RESOURCE_ID
    video_scripts:
      - video: YOUR_VIDEO_RESOURCE_ID
        scripts:
          - 大家好，今天我们不喊单，也不预测短线涨跌，只聊一件事：虚拟币市场波动很大，先学会保护本金，再谈机会。
          - 看到行情突然拉升，很多人第一反应是怕错过。但市场情绪越热，越要慢一点，先问自己风险从哪里来。
          - 新手最容易忽略的是杠杆。合约看起来能放大收益，但它同样会放大亏损，甚至让一次判断失误变成强制离场。
