  tiktok_join_template: 观众「{user}」进入直播间。请用一句短中文欢迎，并提醒理性看待市场风险。
items:
- id: crypto_market_risk
  title: 虚拟币市场风险教育
  description: 面向新手观众，解释虚拟币市场高波动、情绪周期、杠杆风险和信息噪音。 主播只做泛行情解说和风险教育，不给任何具体交易建议。
  loop_video: 01KTT909B2M3PABS719FN7Z3WA
  video_scripts:
  - video: 01KTT909B2M3PABS719FN7Z3WA
    scripts:
    - 欢迎新进来的朋友！数字资产波动剧烈，今天先讲风险。无论行情怎么走，保住本金永远第一。不懂的不碰，冲动的冷静一下，我们开始。
    - 市场涨跌背后是情绪在跳舞——贪婪时FOMO追高，恐惧时割肉离场。但情绪会变，历史一再重复。我们只观察，不预测，保持清醒。
    - 举个例，什么是流动性？就像菜市场，人多货多容易买卖；人少货少一买就涨一卖就跌。虚拟币有些盘子很小，大资金进出会剧烈波动，所以别重仓冷门币。
    - 最高频的风险：追涨杀跌——看到暴涨就冲，往往接盘；合约杠杆——放大收益更放大亏损，归零只需几次反向波动；还有假消息、假社群，盯着你钱包。
    - 记住三条纪律：只用闲钱，亏了不伤生活；分散持仓，别all in一个；设好止损，别幻想“再拿一会”。但具体点位自己定，我只讲原则。
    - 新手总以为“这次不一样”，其实每次高点的逻辑都一样：故事好听，情绪高涨，风险被忽略。过去牛熊轮回无数次，没有新鲜事。
    - 有问题欢迎打公屏，但我不回答“能不能买、要不要卖”。每个人情况不同，我唯一能帮的是让你更懂规则、识别风险。来，聊聊你的疑问。
    - 最后再说一遍：所有决策都在你自己。我讲的是风险和纪律，不是投资建议。不确定时别动手，多看多学。祝各位理性参与，安全第一。
