settings:
  loop: true
  lang: zh
  batch_size: 6
  regenerate_at_ratio: 0.75
  opening_enabled: true
  idle_timeout_s: 30
  pause_after_opening_ms: 800
  pause_after_segment_ms: 1200
  pause_after_bridge_ms: 500
persona:
  name: 阿麦
  style: 观察生活，轻微自嘲，节奏快，不攻击观众。
  boundaries:
  - 不讲政治
  - 不讲低俗黄色内容
  - 不嘲笑弱势群体
show:
  title: 今晚不加班
  opening: 大家好，欢迎来到今晚不加班。今天咱们不解决问题，只负责把问题讲得好笑一点。
voice:
  voice_config:
    volume: 72
    speed: 1.08
    pitch: 1.03
    style: 0.65
topics:
- id: workplace
  title: 职场日常
  description: 会议、加班、摸鱼、老板画饼。
- id: city_life
  title: 城市生活
  description: 通勤、租房、外卖、健身房。
fallback_segments:
- topic_id: workplace
  title: 备用段子
  beats:
  - 从会议不是解决问题切入。
  - 递进到会议纪要像破案报告。
  - 用沟通成本收束。
  text: 我一直觉得，会议不是为了解决问题，会议是为了确认这个问题确实存在，而且存在得很有仪式感。进去之前，大家都知道卡在哪；出来以后，大家多知道了一件事：下周二下午三点还要再确认一次。最神奇的是会议纪要，写得特别像破案报告，嫌疑人是需求，作案工具是排期，最后凶手永远是沟通成本。
seed_batch:
  batch_title: 当代生存日志
  segments:
  - topic_id: workplace
    title: 周报的文学追求
    beats:
    - 周报的格式要求
    - 周报的字数玄学
    - 周报里的自我表扬
    text: '周报这个东西，本来是个工作总结，现在写成了个人传记。

      开头必须是一句振奋人心的摘要，比如本周共协调资源八次。

      然后中间要写细节，但细节不能太细，太细显得你只做了一件小事。

      我们领导特别看重字数，八百字以下等于没干活。

      所以我的周报里经常出现“深入探讨”这种词，其实我是看了三十分钟网页学来的。'
  - topic_id: city_life
    title: 找房时的心理博弈
    beats:
    - 网上照片的落差
    - 中介的经典话术
    - 看房时的心理活动
    text: '租房第一步，先在网上筛选，照片看起来像在住民宿。

      到了现场发现，民宿是隔壁房间，你这个是厨房改的。

      中介会说，这房子户型方正，就是方方正正一个盒子。

      我开始思考，人到底需不需要窗户？

      最后你签了合同，因为中介说后面还有五个人等着，你立刻觉得自己赢了。

      其实那个五个人是中介幻想的，但那一刻你觉得自己在抢购。'
  - topic_id: workplace
    title: 团建里的自愿
    beats:
    - 团建通知的语气
    - 活动项目的尴尬
    - 团建结束后的朋友圈
    text: '公司发通知说，本周六组织团建，请大家自愿参加。

      自愿这个词在职场的意思是：你最好自愿。

      于是大家来到一个拓展基地，教练让我们手拉手围成圈。

      我只想和我的工位手拉手。

      最后所有人发朋友圈，配文案：团队真棒。

      配图里每个人都笑得很用力，像是被加了滤镜的痛苦。'
  - topic_id: city_life
    title: 健身房的自我欺骗
    beats:
    - 办卡时的雄心
    - 教练的推销
    - 健身后的自我安慰
    text: '每次办健身卡都像买彩票，觉得自己这次一定能中大奖。

      教练过来跟我说，哥，你这个体测报告有点问题。

      我说什么问题？他说你属于易胖体质。

      我说那怎么练？他说先买二十节私教课。

      我买了，然后去了一次，觉得易胖体质可能是我注定要当个快乐的胖子。

      后来我把卡转给了同事，他到现在还没开卡。

      我们都觉得对方亏了。'
  - topic_id: workplace
    title: 离职的悲伤演出
    beats:
    - 提出离职的忐忑
    - 交接时的客套
    - last day的告别
    text: '提出离职那天，我练了三天台词。

      然后领导说，你再考虑考虑。

      我就开始考虑怎么把这句话变成我的辞职理由。

      交接工作的时候，对方说，这个文档在哪？我说我也找过，没找到。

      最后一天，我在群里发了一段感人肺腑的告别小作文，然后退群。

      三小时后，有人拉我进新群，说是给我补个欢送会。

      我感动得又退了一次。'
  - topic_id: city_life
    title: 快递柜的生存法则
    beats:
    - 快递员的电话
    - 取件码的焦虑
    - 超时后的抉择
    text: '快递员打电话说，你的快递放快递柜了。

      我说好的，然后我收到了取件码。

      那个取件码我根本记不住，每次都要翻短信。

      然后我发现，快递柜开始收费了，超时两小时一块钱。

      我开始思考，快递滞留到底是谁的责任？

      是我没及时拿，还是它不送到家？

      最后我得出一个结论：我的快递比我本人更渴望住进一个柜子里，而我还在外面漂泊。'
  bridges:
  - from_title: 周报的文学追求
    to_title: 找房时的心理博弈
    text: 刚才说周报里写深入探讨，其实就是上网。租房也是，中介说户型方正，其实就是角落。找房就跟写周报一样，都是靠想象力。
  - from_title: 找房时的心理博弈
    to_title: 团建里的自愿
    text: 租房最后签了合同，因为觉得抢到了。团建也是，你自愿参加，结果发现是去抢一个皮划艇。但至少租房还能选户型，团建连选都不给选。
  - from_title: 团建里的自愿
    to_title: 健身房的自我欺骗
    text: 团建结束发朋友圈说团队真棒，其实每个人都在想下周能不能请假。健身房也是，办卡的时候觉得自己能练成施瓦辛格，去了之后发现连跑步机都抢不到。
  - from_title: 健身房的自我欺骗
    to_title: 离职的悲伤演出
    text: 健身卡转给同事后，我还在想什么时候自己再开一张。后来我发现，最有效的健身就是离职，每天上下楼梯跑中介办手续，一个月瘦五斤。
  - from_title: 离职的悲伤演出
    to_title: 快递柜的生存法则
    text: 离职最后一天退群，又被拉回来，感觉像快递柜超时了还得再付钱。后来我想通了，不管是离职还是取快递，拖延的代价都一样——要么交钱，要么尴尬。
